# URL Inspector API — org-scoped endpoints for brand presence citation data.
# Route pattern: GET /org/{spaceCatId}/url-inspector/<resource>?siteId=...
# All endpoints are currently stubs returning HTTP 501.

url-inspector-stats:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
  get:
    tags:
      - llmo
      - url-inspector
    summary: Not implemented yet — URL Inspector aggregate stats
    description: |
      Not implemented yet. Returns aggregate citation statistics and weekly sparkline
      trends for the URL Inspector dashboard stats cards.
      Query parameters: siteId (required), startDate, endDate, category, region, channel, platform.
    operationId: getUrlInspectorStats
    parameters:
      - name: siteId
        in: query
        required: true
        schema:
          type: string
        description: Customer site ID
      - name: startDate
        in: query
        schema:
          type: string
          format: date
        description: Start date (YYYY-MM-DD)
      - name: endDate
        in: query
        schema:
          type: string
          format: date
        description: End date (YYYY-MM-DD)
      - name: category
        in: query
        schema:
          type: string
        description: Filter by category
      - name: region
        in: query
        schema:
          type: string
        description: Filter by region
      - name: channel
        in: query
        schema:
          type: string
        description: Filter by content type / channel
      - name: platform
        in: query
        schema:
          type: string
        description: Platform filter
    responses:
      '200':
        description: Aggregate stats with weekly sparkline data
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorStatsResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '501':
        description: Not implemented yet
    security:
      - ims_key: []

