externalId:
  name: externalId
  description: The external ID from the identity provider
  in: path
  required: true
  schema:
    type: string
    example: 'user123@adobe.com'

sandboxAuditType:
  name: auditType
  description: |
    Comma-separated list of audit types to run on sandbox sites.
    Use 'product-metatags' for specialized Product Detail Page (PDP) analysis of commerce sites.
  in: query
  required: false
  schema:
    type: string
    description: |
      Comma-separated list of audit types:
      - meta-tags: General meta tag analysis
      - product-metatags: PDP-focused audit for e-commerce sites (scrapes SKU, thumbnail, catalog/store view codes)
      - commerce-product-enrichments: Commerce page enrichment audit for analyzing and enriching commerce pages
      - alt-text: Image alternative text analysis
    example: "meta-tags,product-metatags,commerce-product-enrichments,alt-text"
    enum:
      - 'meta-tags'
      - 'product-metatags'
      - 'commerce-product-enrichments'
      - 'alt-text'

llmoConfigVersion:
  name: version
  description: The version ID of the LLMO configuration to retrieve. If not provided, returns the latest version.
  in: query
  required: false
  schema:
    type: string
    description: S3 object version ID
    example: "abc123def456"

limit:
  name: limit
  description: The maximum number of items to return per page
  in: path
  required: true
  schema:
    type: integer
    minimum: 1
    maximum: 1000
    default: 100
    example: 100

cursor:
  name: cursor
  description: The cursor for pagination to fetch the next page of results
  in: path
  required: false
  schema:
    type: string
    example: "eyJzayI6IjIwMjQtMDEtMTVUMTI6MzA6MDBaIiwiaWQiOiIxMjNlNDU2Ny1lODliLTEyZDMtYTQ1Ni00MjY2MTQxNzQwMDAifQ=="

xPromiseToken:
  name: x-promise-token
  description: |
    IMS session-based promise token for authenticated CMS operations (from `POST /auth/v2/promise`).
    On `POST /preflight/jobs`, **required** for promise-based authoring types (CS, CS_CW, AMS).
    If absent for those sites, the API returns **400** with invalid request error.
    Ignored for other site types.
    On endpoints that also accept this header (e.g. opportunity suggestion autofix), it may be
    omitted when the service can resolve a promise token another way. Listed as optional here
    because requirement depends on the operation and site authoring type.
  in: header
  required: false
  schema:
    type: string
  example: eyJhbGciOiJSUzI1NiIs...

locale:
  name: locale
  description: |
    BCP 47 locale code in underscore form (e.g. `fr_fr`, `ja_jp`, `de_de`).
    When provided and a translation exists, localizable fields (`title`, `description` on
    opportunities; AI-generated fields inside `data` on suggestions) are replaced by the
    stored translation. Falls back to the original English value when the locale is absent
    or no translation has been stored yet for that locale.
  in: query
  required: false
  schema:
    type: string
    pattern: '^[a-z]{2}_[a-z]{2}$'
    example: fr_fr

suggestionView:
  name: view
  description: |
    Projection view for suggestion response data. Controls which fields are returned.
    - `minimal`: Returns id, status, timestamps (createdAt, updatedAt), and URL-related data fields (lightest payload for selection lists)
    - `summary`: Returns key fields: id, opportunityId, type, rank, status, url, timestamps (excludes heavy data and kpiDeltas)
    - `full`: Returns all fields including data and kpiDeltas (default, backward compatible)
  in: query
  required: false
  schema:
    type: string
    enum:
      - minimal
      - summary
      - full
    default: full
  example: summary

suggestionStatus:
  name: status
  description: |
    Filter suggestions by status. Supports single status or comma-separated multiple statuses.
    When provided, only suggestions matching any of the specified statuses are returned.
    
    **Valid values:** NEW, APPROVED, SKIPPED, FIXED, ERROR, IN_PROGRESS, OUTDATED, PENDING_VALIDATION
    
    Returns 400 Bad Request if invalid status values are provided.
  in: query
  required: false
  schema:
    type: string
    description: Single status or comma-separated statuses (e.g., "NEW" or "NEW,APPROVED")
  examples:
    single:
      value: NEW
      summary: Filter by single status
    multiple:
      value: NEW,APPROVED,IN_PROGRESS
      summary: Filter by multiple statuses (comma-separated)

agentTypes:
  name: agentTypes
  description: |
    Additive inclusion list of agent types — comma-separated string (or
    a repeated/array query value). Accepted canonical values: `Chatbots`,
    `Research`, `Training bots` (case-insensitive on the wire). Unknown
    values are silently dropped (defence-in-depth; matches the existing
    `agentType` scalar behaviour and the DB allowlist). Omit to receive
    the unfiltered baseline. Used by the URL Inspector PG page to enforce
    `Agent Type ∈ {Chatbots, Research}`.

    NOTE: do not combine with the scalar `agentType` parameter — the
    server AND-intersects them, which silently returns zero rows when
    they disagree. Use exactly one.
  in: query
  required: false
  schema:
    type: string
    description: Comma-separated canonical agent-type values
  examples:
    single:
      value: Chatbots
      summary: Filter to a single agent type
    multiple:
      value: Chatbots,Research
      summary: URL Inspector PG inclusion list
akamaiHost:
  name: x-akamai-host
  in: header
  required: true
  description: >-
    Akamai EdgeGrid API host for the customer's account, e.g.
    `akab-xxxxx.luna.akamaiapis.net`. Client-supplied per request; never
    persisted or logged by the service.
  schema:
    type: string
akamaiClientToken:
  name: x-akamai-client-token
  in: header
  required: true
  description: Akamai EdgeGrid client token. Client-supplied per request; never persisted or logged.
  schema:
    type: string
akamaiClientSecret:
  name: x-akamai-client-secret
  in: header
  required: true
  description: Akamai EdgeGrid client secret. Client-supplied per request; never persisted or logged.
  schema:
    type: string
akamaiAccessToken:
  name: x-akamai-access-token
  in: header
  required: true
  description: Akamai EdgeGrid access token. Client-supplied per request; never persisted or logged.
  schema:
    type: string
akamaiAccountSwitchKey:
  name: x-akamai-account-switch-key
  in: header
  required: false
  description: >-
    Optional Akamai account switch key, for partners operating across multiple
    Akamai accounts. Client-supplied per request; never persisted or logged.
  schema:
    type: string
fields:
  name: fields
  in: query
  required: false
  description: >-
    Optional sparse-fieldset selector (JSON:API / Google `fields` convention). A
    comma-separated list of top-level field names to include in each returned
    item, e.g. `fields=id,baseURL,name`. When omitted, the full representation is
    returned (fully backwards compatible). `id` is always included even if not
    listed. Unknown field names are ignored; if none of the requested names match
    a returned item, the request returns 400. Use this to reduce response payload
    size for size-constrained consumers. Max 50 fields, max 1000 characters.

    Note: `fields` is applied against the response shape produced by any `view`
    parameter, not the full representation. If a requested field is absent from
    the selected view (e.g. `view=minimal&fields=data` where `data` is excluded
    from the minimal view), the request returns 400.
  schema:
    type: string
    example: 'id,baseURL,name'
