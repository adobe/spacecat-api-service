drs-bp-pg-audit:
  get:
    tags:
      - monitoring
    summary: Query projection_audit rows for DRS monitoring
    description: |
      Proxy endpoint used by DRS monitoring workers to query the `projection_audit` table in
      PostgREST (which lives at `http://data-svc.internal`, a private Route53 hostname inside
      the Mysticat VPC). DRS Lambda functions run in a separate AWS account and cannot reach
      that hostname directly; this endpoint bridges the network gap.

      Server-side filters applied to every request (not reflected as query params):
      - `skipped = false` — only non-skipped projection rows are returned
      - Results are ordered by `projected_at DESC`

      Performance note: the underlying PostgREST query filters on
      `(scope_prefix, handler_name, projected_at, skipped)`. A composite index on these
      columns is required for acceptable query performance on large tables.

      Auth note: DRS workers call this endpoint via admin `x-api-key`. The `drsBpPgAudit:read`
      capability gates S2S JWT callers only; admin key access bypasses capability checks. This
      is intentional — DRS runs in a separate AWS account without an S2S consumer registration.

      Results are paginated. Inspect `hasMore` in the response to determine whether additional
      pages exist. Increment `offset` by `limit` (default 500) and repeat while `hasMore` is
      `true`.
    operationId: getDrsBpPgAudit
    security:
      - admin_key: [ ]
    parameters:
      - in: query
        name: siteId
        required: true
        schema:
          type: string
          format: uuid
        description: Site UUID — maps to `scope_prefix` in `projection_audit`.
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
      - in: query
        name: dateStart
        required: true
        schema:
          type: string
          format: date
        description: |
          Start date (inclusive) in YYYY-MM-DD format.
          Rows with `projected_at >= dateStartT00:00:00Z` are returned.
        example: '2026-04-14'
      - in: query
        name: dateEnd
        required: true
        schema:
          type: string
          format: date
        description: |
          End date (exclusive) in YYYY-MM-DD format. Must be after `dateStart`.
          Rows with `projected_at < dateEndT00:00:00Z` are returned.
        example: '2026-04-15'
      - in: query
        name: handlerName
        required: false
        schema:
          type: string
          default: wrpc_import_brand_presence
        description: Filter by handler name.
        example: wrpc_import_brand_presence
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 500
        description: Maximum number of rows to return per page. Capped at 500, floored at 1.
      - in: query
        name: offset
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        description: |
          Row offset for pagination. Increment by `limit` to fetch subsequent pages.
          Ignored when `hasMore` is `false` in the previous response.
    responses:
      '200':
        description: Paginated projection_audit rows matching the query.
        content:
          application/json:
            schema:
              type: object
              required:
                - rows
                - hasMore
              properties:
                rows:
                  type: array
                  description: Projection audit rows for this page, ordered by `projected_at DESC`.
                  items:
                    type: object
                    properties:
                      correlation_id:
                        type: string
                      scope_prefix:
                        type: string
                        format: uuid
                      output_count:
                        type: integer
                      metadata:
                        type: object
                        additionalProperties: true
                      projected_at:
                        type: string
                        format: date-time
                hasMore:
                  type: boolean
                  description: |
                    `true` when the number of rows returned equals `limit`, indicating that
                    a subsequent page may exist. `false` when the final page has been reached.
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
