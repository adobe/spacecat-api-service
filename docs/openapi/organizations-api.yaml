organizations:
  post:
    tags:
      - organization
    summary: Create a new organization
    description: |
      Creates a new organization (or returns the existing one with HTTP 200 if an organization
      with the same `imsOrgId` already exists).
    operationId: createOrganization
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/OrganizationCreate'
    responses:
      '200':
        description: Existing organization returned (idempotent create — an organization with the same `imsOrgId` already exists)
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/Organization'
      '201':
        description: Organization created successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/Organization'
      '400':
        $ref: './responses.yaml#/400-empty-request-body-validation-failure'
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - admin_key: [ ]
  get:
    tags:
      - organization
    summary: Retrieve all organizations
    description: |
      This endpoint is useful for retrieving all organizations.
    operationId: getOrganizations
    responses:
      '200':
        description: A list of organizations
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/OrganizationList'
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]

organizations-by-product-type:
  get:
    tags:
      - organization
    summary: Retrieve all organizations entitled to a given product
    description: |
      Returns only the organizations that have an entitlement for the given product code
      (LLMO, ASO or ACO). Non-admin callers only see organizations whose entitlement tier
      is customer-visible.
    operationId: getOrganizationsByProductType
    parameters:
      - $ref: './parameters.yaml#/productType'
    responses:
      '200':
        description: A list of organizations entitled to the given product
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/OrganizationList'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]

organization-projects:
  get:
    tags:
      - organization
    summary: Retrieve all projects for an organization
    description: |
      This endpoint is useful for retrieving all projects belonging to a specific organization.
    operationId: getProjectsForOrganization
    parameters:
      - name: organizationId
        in: path
        description: The ID of the organization
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
    responses:
      '200':
        description: A list of projects for the organization
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './schemas.yaml#/Project'
      '401':
        $ref: './responses.yaml#/401'
      '404':
        $ref: './responses.yaml#/404-organization-not-found-with-id'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]

organization-project-by-id:
  get:
    tags:
      - organization
    summary: Retrieve a specific project within an organization by ID
    description: |
      This endpoint is useful for retrieving a specific project by its ID within an organization.
    operationId: getOrganizationProjectById
    parameters:
      - name: organizationId
        in: path
        description: The ID of the organization
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: projectId
        in: path
        description: The ID of the project
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
    responses:
      '200':
        description: Project found
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/Project'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404-organization-not-found-with-id'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]

organization-project-sites:
  get:
    tags:
      - organization
    summary: Retrieve all sites for a project within an organization
    description: |
      This endpoint is useful for retrieving all sites belonging to a specific project within an organization.
    operationId: getSitesByProjectIdAndOrganizationId
    parameters:
      - name: organizationId
        in: path
        description: The ID of the organization
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: projectId
        in: path
        description: The ID of the project
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
    responses:
      '200':
        description: A list of sites for the project within the organization
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './schemas.yaml#/Site'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404-organization-not-found-with-id'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]

organization-project-sites-by-name:
  get:
    tags:
      - organization
    summary: Retrieve all sites for a project by project name within an organization
    description: |
      This endpoint is useful for retrieving all sites belonging to a specific project (identified by name) within an organization.
    operationId: getSitesByProjectNameAndOrganizationId
    parameters:
      - name: organizationId
        in: path
        description: The ID of the organization
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: projectName
        in: path
        description: The name of the project
        required: true
        schema:
          type: string
    responses:
      '200':
        description: A list of sites for the project within the organization
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './schemas.yaml#/Site'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404-organization-not-found-with-id'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]
