            gemini: gemini-2.5-flash
            openai: gpt-5
            chatgpt: search-gpt
      - name: platform
        in: query
        required: false
        description: Legacy alias for `model`; `model` takes precedence when both are given.
        schema: { type: string }
      - name: regionCode
        in: query
        required: false
        description: |
          One region+language code (e.g. `US`), resolved to a single Semrush
