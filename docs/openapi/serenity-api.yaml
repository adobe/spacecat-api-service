      exceed 56 days (8 weeks) — matching the URL Inspector time-range
      filter's most cost-bounded window and the `weeklyTrends` fan-out cap; a
      wider range 400s.

      One known approximation gap vs. the Postgres-backed reference endpoint:
      `totalPromptsCited` sums a per-URL count rather than a true distinct
      count (Semrush has no distinct-prompts-cited element) — see
      `SerenityUrlInspectorStatsValues`.
