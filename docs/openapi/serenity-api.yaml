        description: |
          AI model to scope stats to. Accepts a Semrush Elements model name
          directly, or a SpaceCat/UI platform code (translated server-side).
          Defaults to `search-gpt` when omitted or unrecognized.
        schema:
          type: string
          x-canonical-values:
            - google-ai-mode
            - grok-3
            - google-ai-overview
            - microsoft-copilot
            - open-evidence
            - gemini-2.5-flash
            - claude-sonnet-4
            - gpt-5
            - deepseek
            - search-gpt
            - perplexity
          x-known-aliases:
            copilot: microsoft-copilot
            gemini: gemini-2.5-flash
            openai: gpt-5
            chatgpt: search-gpt
      - name: platform
        in: query
        required: false
        description: Legacy alias for `model`; `model` takes precedence when both are given.
        schema: { type: string }
      - name: siteId
        in: query
        required: false
        description: Must resolve to the same brand as `:brandId`; 400 if it belongs to a different brand. Used only as a cross-check — does not itself narrow the Semrush query.
        schema: { type: string, format: uuid }
      - name: site_id
        in: query
        required: false
        description: Snake_case alias for `siteId`.
        schema: { type: string, format: uuid }
      - name: region
        in: query
        required: false
        description: |
          A single region code (e.g. `US`). Resolves to a single Semrush
          project via the Markets element; 404 if it doesn't match any of the
          brand's markets. Omitted or `all` aggregates across every project
          the brand owns.
        schema: { type: string }
      - name: categoryId
        in: query
        required: false
        description: Category label, mapped to a Semrush tag (`category__<label>`).
        schema: { type: string }
      - name: category
        in: query
