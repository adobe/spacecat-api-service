v2-serenity-brand-presence-topic-prompts:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID-only on the /serenity/* surface)
      schema:
        type: string
        format: uuid
    - name: topicId
      in: path
      required: true
      description: |
        The topic NAME (URL-encoded). Semrush topics have no UUID — the topic name
        IS the identifier, scoped upstream via the element's `CBF_topic` filter.
      schema: { type: string }
  get:
    tags: [serenity]
    summary: Per-prompt drill-down for a single Data Insights topic
    description: |
      Returns the individual prompts belonging to one topic, with their per-prompt
      mentions, citations, visibility, position, sentiment, volume and primary intent.
      Sourced from the Semrush "Prompts by Topic" element (78864493) — the same rich
      element that backs the topic table — scoped by `CBF_topic` (the topic name).

      Brand-scoped via the brand's Semrush sub-workspace (resolved from `:brandId`);
      `region` (when not `all`) resolves to a Semrush `project_id` server-side, and
      `model`/`platform` translate to a Semrush model server-side. Pagination is
      applied server-side over the full result (Semrush has no native paging).
    operationId: listSerenityBrandPresenceTopicPrompts
    security:
      - ims_key: []
    parameters:
      - name: startDate
        in: query
        required: false
        description: Inclusive range start (YYYY-MM-DD). Optional; both dates required together.
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        description: Inclusive range end (YYYY-MM-DD). Optional; both dates required together.
        schema: { type: string, format: date }
      - name: model
        in: query
        required: false
        description: |
          AI model to scope to. Accepts a Semrush Elements model name directly, or a
          SpaceCat/UI platform code (translated server-side). Defaults to `search-gpt`.
        schema: { type: string }
      - name: platform
        in: query
        required: false
        description: Legacy alias for `model`; `model` takes precedence when both are given.
        schema: { type: string }
      - name: region
        in: query
        required: false
        description: |
          UI region code (e.g. `US`) resolved server-side to a Semrush `project_id`.
          `all` or omitted → across the brand's markets.
        schema: { type: string }
      - name: page
        in: query
        required: false
        description: Zero-based page index. Defaults to 0.
        schema: { type: integer, minimum: 0, default: 0 }
      - name: pageSize
        in: query
        required: false
        description: Page size (1..1000). Defaults to 50.
        schema: { type: integer, minimum: 1, maximum: 1000, default: 50 }
    responses:
      '200':
        description: Topic prompts retrieved.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityBrandPresenceTopicPrompts' }
      '400': { $ref: './responses.yaml#/400' }
      '403':
        description: Caller lacks access to the organization.
      '404':
        description: Organization not found, brand not found for this organization, the brand has no Semrush sub-workspace, or no Semrush market resolves for the requested region.
      '502':
        description: Upstream returned a non-2xx response.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityErrorResponse' }
      '503':
        description: PostgREST client not available (required to resolve the brand's Semrush workspace before the element call).
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityErrorResponse' }
      '500': { $ref: './responses.yaml#/500' }

v2-serenity-brand-presence-stats:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID-only on the /serenity/* surface)
      schema:
        type: string
        format: uuid
  get:
    tags: [serenity]
    summary: Aggregated Brand Presence KPI stats for a brand
    description: |
      Elements-backed equivalent of the Postgres-RPC `/brand-presence/stats`
      endpoint. Returns rolled-up KPI numbers (total executions, average
      visibility score, total mentions, total citations) for the selected date
      range, sourced from the Semrush Total Executions, Mentions, Visibility,
      and Citations elements. Optionally includes per-week trend data
      (`trends`) for sparklines, split backward from `endDate` into up to 8
      7-day weeks.

      The effective `[startDate, endDate]` range (after defaulting) must not
      exceed 56 days (8 weeks) — matching the Brand Presence date picker's
      maximum selectable range and the trends fan-out cap; a wider range 400s.

      `categoryId`/`categoryIds`, `topicIds`, `origin`, `userIntent`, and
      `promptBranding` are accepted by the reference Postgres-backed endpoint
      but are not yet supported here — the Elements API has no confirmed
      filter equivalent for them today; they are currently no-ops.
    operationId: getSerenityBrandPresenceStats
    security:
      - ims_key: []
    parameters:
      - name: startDate
        in: query
        required: false
        description: Range start (YYYY-MM-DD). Defaults to 28 days before today.
        schema: { type: string, format: date }
      - name: start_date
        in: query
        required: false
        description: Snake_case alias for `startDate`.
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        description: Range end (YYYY-MM-DD). Defaults to today.
        schema: { type: string, format: date }
      - name: end_date
        in: query
        required: false
        description: Snake_case alias for `endDate`.
        schema: { type: string, format: date }
      - name: model
        in: query
        required: false
        description: |
          AI model to scope stats to. Accepts a Semrush Elements model name
          directly, or a SpaceCat/UI platform code (translated server-side).
          Defaults to `search-gpt` when omitted or unrecognized.
        schema:
          type: string
          x-canonical-values:
            - google-ai-mode
            - grok-3
            - google-ai-overview
            - microsoft-copilot
            - open-evidence
            - gemini-2.5-flash
            - claude-sonnet-4
            - gpt-5
            - deepseek
            - search-gpt
            - perplexity
          x-known-aliases:
            copilot: microsoft-copilot
            gemini: gemini-2.5-flash
            openai: gpt-5
            chatgpt: search-gpt
      - name: platform
        in: query
        required: false
        description: Legacy alias for `model`; `model` takes precedence when both are given.
        schema: { type: string }
      - name: siteId
        in: query
        required: false
        description: Must resolve to the same brand as `:brandId`; 400 if it belongs to a different brand. Used only as a cross-check — does not itself narrow the Semrush query.
        schema: { type: string, format: uuid }
      - name: site_id
        in: query
        required: false
        description: Snake_case alias for `siteId`.
        schema: { type: string, format: uuid }
      - name: regionCode
        in: query
        required: false
        description: |
          One region+language code (e.g. `US`). Resolves to a single Semrush
          project via the Markets element; 404 if it doesn't match any of the
          brand's markets. When omitted, aggregates across every project the
          brand owns.
        schema: { type: string }
      - name: region_code
        in: query
        required: false
        description: Snake_case alias for `regionCode`.
        schema: { type: string }
      - name: region
        in: query
        required: false
        description: Alias for `regionCode`.
        schema: { type: string }
      - name: showTrends
        in: query
        required: false
        description: When truthy (`true`/`1`), includes the weekly `trends` array.
        schema: { type: string }
      - name: show_trends
        in: query
        required: false
        description: Snake_case alias for `showTrends`.
        schema: { type: string }
    responses:
      '200':
        description: Brand Presence stats retrieved.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityBrandPresenceStats' }
      '400': { $ref: './responses.yaml#/400' }
      '403':
        description: Caller lacks access to the organization.
      '404':
        description: Organization not found, brand not found for this organization, the brand has no resolvable Semrush workspace, `regionCode` doesn't match any Semrush market, or (when no `regionCode` is given) the brand has no Semrush projects configured at all.
      '502':
        description: Upstream returned a non-2xx response.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityErrorResponse' }
      '503':
        description: PostgREST client not configured for this deployment.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SerenityErrorResponse' }
      '500': { $ref: './responses.yaml#/500' }

