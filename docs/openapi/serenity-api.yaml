            schema: { $ref: './schemas.yaml#/SerenityUrlInspectorStats' }
      '400': { $ref: './responses.yaml#/400' }
      '403':
        description: Caller lacks access to the organization.
      '404':
        description: Organization not found, brand not found for this organization, the brand has no resolvable Semrush workspace, `region` doesn't match any Semrush market, or (when no `region` is given) the brand has no Semrush projects configured at all.
      '502':
