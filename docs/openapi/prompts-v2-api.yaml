# ── Brand-scoped prompts CRUD (Aurora) ──

v2-prompts-by-brand:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID, config id, or brand name)
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 100
      description: Page size
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based)
    - name: categoryId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: |
        Filter by category UUID (categories.id). A categoryId that does not
        resolve to a category in this organization returns an empty page
        (the filter fails closed; it is never silently dropped).
    - name: topicId
      in: query
      required: false
      schema:
        type: string
      description: Filter by topic business key
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [active, pending, deleted]
      description: Filter by status; default excludes deleted
    - name: search
      in: query
      required: false
      schema:
        type: string
      description: Free-text search across prompt text and name (ILIKE match)
    - name: region
      in: query
      required: false
      schema:
        type: string
      description: >-
        Filter by region code (e.g. `us`). Matches prompts whose `regions`
        array contains the value, case-insensitively — region codes are stored
        with inconsistent casing depending on the onboarding path, so both
        lower- and upper-case variants are matched.
    - name: origin
      in: query
      required: false
      schema:
        type: string
        enum: [ai, human]
      description: Filter by origin (ai or human)
    - name: source
      in: query
      required: false
      schema:
        type: string
      description: >-
        Filter by prompt source (the producing system), e.g. `gsc`, `semrush`,
        `base-url`, `config`. Matched across a producer's two drift spellings, so
        `citation-attempt` also finds rows stored as `citation_attempt` (WP-S2
        interim: a raw-column match on both the `_` and `-` forms; WP-S4's
        `source_canonical` column replaces this with full canonical + case folding).
        Free-form string — sources are open-ended and added by upstream producers
        (e.g. DRS) without API changes, so no enum is enforced.
    - name: sort
      in: query
      required: false
      schema:
        type: string
        enum: [topic, prompt, category, origin, source, status, updatedAt]
      description: >-
        Sort column. Default is updatedAt descending. `source` sorts on the stored
        value; a producer's drift spellings (`citation_attempt` / `citation-attempt`)
        may interleave until they fold to one canonical ordering (WP-S4).
    - name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc
      description: Sort direction. Default is desc
  get:
    tags:
      - customer-config
    summary: List prompts for a brand
    description: |
      Returns a paginated list of prompts for the given brand.
      Upsert uniqueness: match by id or by (text, regions).
    operationId: listPromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    responses:
      '200':
        description: Prompts retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2PromptListResponse'
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable (DATA_SERVICE_PROVIDER=postgres required)
      '500':
        $ref: './responses.yaml#/500'
  post:
    tags:
      - customer-config
    summary: Create or upsert prompts (bulk)
    description: |
      Upserts prompts. Match by id or by (text, regions). If match found, update; else insert.
      If a matched prompt has status `deleted`, it is reactivated to `active` and counted as
      updated. Prompts with status `pending` or other non-active statuses are left unchanged
      (counted as skipped, not returned in the response).
    operationId: createPromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            minItems: 1
            maxItems: 3000
            items:
              $ref: './schemas.yaml#/V2PromptInput'
    responses:
      '201':
        description: Prompts created/updated
        content:
          application/json:
            schema:
              type: object
              properties:
                created:
                  type: integer
                updated:
                  type: integer
                prompts:
                  type: array
                  description: Simplified prompt objects (no uuid, category, or topic — use GET to fetch full details)
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Business key (prompt_id)
                      prompt:
                        type: string
                      regions:
                        type: array
                        items:
                          type: string
                      categoryId:
                        type:
                          - string
                          - 'null'
                      topicId:
                        type:
                          - string
                          - 'null'
                      status:
                        type: string
                      origin:
                        type: string
                      source:
                        type: string
                      updatedBy:
                        type:
                          - string
                          - 'null'
                      updatedAt:
                        type:
                          - string
                          - 'null'
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'

v2-prompts-by-brand-and-id:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      schema:
        type: string
    - name: promptId
      in: path
      required: true
      schema:
        type: string
      description: prompt_id (business key)
  get:
    tags:
      - customer-config
    summary: Get a single prompt
    operationId: getPromptByBrandAndId
    security:
      - ims_key: [ ]
      - api_key: [ ]
    responses:
      '200':
        description: Prompt retrieved
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2Prompt'
      '404':
        description: Organization, brand, or prompt not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'
  patch:
    tags:
      - customer-config
    summary: Update a single prompt
    description: >-
      Updates a single prompt. `origin` is NOT patchable — it is fixed by the
      writer that created the row and is never re-derived on update
      (origin-dimension.md §3 item 3); an `origin` in the body is ignored,
      leaving the stored value untouched.
    operationId: updatePromptByBrandAndId
    security:
      - ims_key: [ ]
      - api_key: [ ]
    requestBody:
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/V2PromptInput'
    responses:
      '200':
        description: Prompt updated
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2Prompt'
      '404':
        description: Organization, brand, or prompt not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'
  delete:
    tags:
      - customer-config
    summary: Soft-delete a prompt
    description: Sets status to 'deleted'.
    operationId: deletePromptByBrandAndId
    security:
      - ims_key: [ ]
      - api_key: [ ]
    responses:
      '204':
        description: Prompt deleted
      '404':
        description: Organization, brand, or prompt not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'

v2-prompts-by-brand-bulk-delete:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID, config id, or brand name)
      schema:
        type: string
  post:
    tags:
      - customer-config
    summary: Bulk soft-delete prompts
    description: |
      Soft-deletes multiple prompts by setting their status to 'deleted'.
      Uses POST instead of DELETE because the body-data middleware does not parse DELETE request bodies.
      See ADR-001 for details.
    operationId: bulkDeletePromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/V2PromptBulkDeleteRequest'
    responses:
      '200':
        description: Bulk delete completed
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2PromptBulkDeleteResponse'
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'

v2-prompts-by-brand-check:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID, config id, or brand name)
      schema:
        type: string
  post:
    tags:
      - customer-config
    summary: Batch prompt existence check
    description: |
      Given a list of {text, region} pairs, returns the subset that already
      exist in the prompts table for the given brand with status active,
      deleted, or ignored. Used by the UI to filter suggestion panels without
      fetching all paginated prompt pages client-side. Max 500 pairs per request.
      Region values are normalized to lowercase 2-char codes before comparison.
    operationId: checkPromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - prompts
            properties:
              prompts:
                type: array
                minItems: 1
                maxItems: 500
                items:
                  type: object
                  required:
                    - text
                    - region
                  properties:
                    text:
                      type: string
                      maxLength: 2000
                      description: Prompt text to look up
                    region:
                      type: string
                      description: Region code (e.g. "US", "gb"). Normalized to lowercase 2-char before comparison.
    responses:
      '200':
        description: Existence check completed
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  description: Subset of the input pairs that already exist in the DB
                  items:
                    type: object
                    properties:
                      text:
                        type: string
                      region:
                        type: string
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'
