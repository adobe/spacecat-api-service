    - name: brandId
      in: path
      required: true
      description: Brand UUID; execution must belong to this brand
      schema:
        type: string
        format: uuid
    - name: executionId
      in: path
      required: true
      description: brand_presence_executions.id (UUID)
      schema:
        type: string
        format: uuid
    - name: startDate
      in: query
      required: true
      description: Start of execution lookup window (YYYY-MM-DD). Alias start_date.
      schema:
        type: string
        format: date
    - name: endDate
      in: query
      required: true
      description: End of execution lookup window (YYYY-MM-DD). Alias end_date.
      schema:
        type: string
        format: date
    - name: platform
