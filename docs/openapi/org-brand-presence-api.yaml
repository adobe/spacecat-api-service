      description: Optional region filter. Aliases region, region_code.
      schema:
        type: string
    - name: origin
      in: query
      required: false
      description: Optional origin filter (case-insensitive partial match).
      schema:
        type: string
  get:
    tags:
      - llmo
      - customer-config
    summary: List sources for a brand presence execution (scoped brand)
