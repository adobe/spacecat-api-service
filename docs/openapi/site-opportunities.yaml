site-opportunity-suggestions-edge-deploy:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - $ref: './parameters.yaml#/opportunityId'
  post:
    operationId: deploySuggestionsToEdge
    summary: Deploy suggestions to edge
    description: |
      Deploys one or more suggestions to the edge. Supports two modes:

      **Synchronous (default):** Deploys suggestions directly via the Tokowaka client
      and returns a 207 Multi-Status response with per-suggestion results.

      **Async experiment mode (with `Prefer: respond-async` header):** Initiates a
      geo-experiment with DRS pre/post analysis. Creates a GeoExperiment record,
      uploads prompts to S3, submits a pre-analysis schedule to DRS, creates an
      AsyncJob for tracking, and returns a 207 Multi-Status with experiment details.
      The experiment proceeds through: pre-analysis -> edge deploy -> post-analysis.

      Requires LLMO administrator role and site ownership.
    tags:
      - opportunity-suggestions
    parameters:
      - name: Prefer
        in: header
        required: false
        schema:
          type: string
          enum: [respond-async]
        description: |
          Set to `respond-async` to initiate a geo-experiment with DRS pre/post
          analysis instead of a direct synchronous deployment.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - suggestionIds
            properties:
              suggestionIds:
                type: array
                items:
                  type: string
                  format: uuid
                minItems: 1
                description: Array of suggestion UUIDs to deploy
              name:
                type: string
                description: Optional experiment name (defaults to opportunity type). Only used in async experiment mode.
    responses:
      '207':
        description: |
          Multi-Status response. Each suggestion has its own status code.
          In async experiment mode, includes additional experiment tracking fields.
        content:
          application/json:
            schema:
              oneOf:
                - title: Synchronous deployment response
                  type: object
                  properties:
                    suggestions:
                      type: array
                      items:
                        type: object
                        properties:
                          uuid:
                            type: string
                            format: uuid
                          index:
                            type: integer
                            description: Position in the original request array
                          statusCode:
                            type: integer
                            description: Per-suggestion HTTP status (200 for success, 400/404/500 for failure)
                          suggestion:
                            type: object
                            description: Full suggestion object (present on success)
                          message:
                            type: string
                            description: Error message (present on failure)
                    metadata:
                      type: object
                      properties:
                        total:
                          type: integer
                        success:
                          type: integer
                        failed:
                          type: integer
                        autoCovered:
                          type: integer
                          description: Number of additional suggestions auto-marked as deployed by domain-wide config
                        message:
                          type: string
                          description: Present when autoCovered > 0
                - title: Async experiment response
                  type: object
                  properties:
                    suggestions:
                      type: array
                      items:
                        type: object
                        properties:
                          uuid:
                            type: string
                            format: uuid
                          index:
                            type: integer
                          statusCode:
                            type: integer
                            description: 202 for accepted, 400/404 for failed
                          suggestion:
                            type: object
                            description: Full suggestion object (present on accepted)
                          message:
                            type: string
                            description: Error message (present on failure)
                    metadata:
                      type: object
                      properties:
                        total:
                          type: integer
                        success:
                          type: integer
                        failed:
                          type: integer
                    jobId:
                      type: string
                      format: uuid
                      description: AsyncJob ID for tracking experiment progress
                    geoExperimentId:
                      type: string
                      format: uuid
                      description: GeoExperiment record ID
                    geoExperimentStatus:
                      type: string
                      enum: [pre_analysis_submitted]
                    prePhaseScheduleId:
                      type: string
                      format: uuid
                      description: DRS schedule ID for the pre-analysis phase
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - ims_key: [ ]

site-geo-experiments:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    operationId: listGeoExperiments
    summary: List geo experiments for a site
    description: |
      Returns all geo experiments associated with the given site.
      Prompts are not included in the list response; use the detail endpoint
      to fetch prompts and associated async jobs.
    tags:
      - geo-experiments
    responses:
      '200':
        description: List of geo experiments
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/GeoExperiment'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - ims_key: [ ]

site-geo-experiment:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - name: geoExperimentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The GeoExperiment ID
  get:
    operationId: getGeoExperiment
    summary: Get geo experiment details
    description: |
      Returns the full details of a geo experiment, including associated async jobs
      and prompts (fetched from S3).
    tags:
      - geo-experiments
    responses:
      '200':
        description: Geo experiment details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/GeoExperiment'
                - type: object
                  properties:
                    jobs:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          status:
                            type: string
                          startedAt:
                            type:
                              - string
                              - 'null'
                            format: date-time
                          endedAt:
                            type:
                              - string
                              - 'null'
                            format: date-time
                          error:
                            type:
                              - object
                              - 'null'
                    prompts:
                      type:
                        - array
                        - 'null'
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          prompt:
                            type: string
                          origin:
                            type: string
                          source:
                            type: string
                          regions:
                            type: array
                            items:
                              type: string
                      description: Prompts from S3, or null if not yet available
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - ims_key: [ ]

GeoExperiment:
  type: object
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    type:
      type: string
      enum:
        - onsite_opportunity_deployment
    status:
      type: string
      enum:
        - initiated
        - pre_analysis_submitted
        - pre_analysis_done
        - pre_analysis_failed
        - optimisation_deployed
        - post_analysis_submitted
        - post_analysis_done
        - post_analysis_failed
        - failed
    siteId:
      type: string
      format: uuid
    opportunityId:
      type: string
      format: uuid
    preScheduleId:
      type:
        - string
        - 'null'
      description: DRS schedule ID for the pre-analysis phase
    postScheduleId:
      type:
        - string
        - 'null'
      description: DRS schedule ID for the post-analysis phase
    suggestionIds:
      type: array
      items:
        type: string
        format: uuid
    promptsCount:
      type: integer
    metadata:
      type:
        - object
        - 'null'
      properties:
        urls:
          type: array
          items:
            type: string
            format: uri
        jobType:
          type: string
        profile:
          type: object
          properties:
            email:
              type: string
    error:
      type:
        - object
        - 'null'
      properties:
        message:
          type: string
    startTime:
      type:
        - string
        - 'null'
      format: date-time
    endTime:
      type:
        - string
        - 'null'
      format: date-time
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    updatedBy:
      type: string

site-opportunity-suggestions-auto-fix:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - $ref: './parameters.yaml#/opportunityId'
    - $ref: './parameters.yaml#/xPromiseToken'
  patch:
    operationId: autoFixSiteOpportunitySuggestions
    summary: |
        Trigger autofix for one or multiple suggestions
    description: |
      Triggers the autofix worker for the given suggestions. By default, suggestions are
      transitioned to IN_PROGRESS status before the message is queued. When `action` is set
      to `"assess"`, suggestions remain in their current status (no IN_PROGRESS transition)
      and the worker performs a read-only fixability assessment instead. When `precheckOnly`
      is true (for assess or assess-urls), the worker runs only checks that do not require
      AEM CS access and does not need a valid promise token; when omitted or false, behavior
      is unchanged (full assessment with AEM when possible).
    tags:
      - opportunity-suggestions
    requestBody:
        required: true
        content:
          application/json:
            schema:
              description: |
                Use the assess-urls shape (action + pages) for URL-based assessment; use the
                suggestion-based shape (suggestionIds required) for assess, fix, or other actions.
              oneOf:
                - type: object
                  description: Request body when action is assess-urls (URL-based assessment).
                  required:
                    - action
                    - pages
                  properties:
                    action:
                      type: string
                      enum: ['assess-urls']
                    pages:
                      type: array
                      minItems: 1
                      items:
                        oneOf:
                          - type: string
                            format: uri
                            description: Page URL to assess
                          - type: object
                            required: [pageUrl]
                            properties:
                              pageUrl:
                                type: string
                                format: uri
                                description: Page URL to assess
                              imageUrls:
                                type: array
                                items:
                                  type: string
                                  format: uri
                                description: Optional list of image URLs on that page to assess
                      description: |
                        List of pages to assess. Each item is either a URL string or an object with
                        pageUrl and optional imageUrls (array of image URLs on that page).
                    precheckOnly:
                      type: boolean
                      description: |
                        Optional. When true, the worker runs only no-AEM checks.
                - type: object
                  description: Request body for suggestion-based actions (assess, fix, etc.).
                  required:
                    - suggestionIds
                  properties:
                    suggestionIds:
                      type: array
                      items:
                        $ref: './schemas.yaml#/Id'
                    action:
                      type: string
                      description: |
                        Optional. When `"assess"`, no IN_PROGRESS transition; worker does read-only
                        fixability assessment. When `"assess-urls"`, use the other request shape
                        (pages required instead of suggestionIds).
                    variations:
                      type: array
                    url:
                      type: string
                      format: uri
                    precheckOnly:
                      type: boolean
                      description: |
                        Optional. Meaningful for action assess or assess-urls. When true, worker
                        runs only no-AEM checks; for assess, promise token is not required.
                    customData:
                      description: Additional custom data to forward to the autofix worker

    responses:
      '202':
        description: |
          Returned when action is `"assess-urls"`. Assess-urls job has been queued. The SQS
          payload sent to the worker contains siteId, action, pages, and optionally precheckOnly;
          opportunityId is intentionally omitted because the worker derives context differently
          for URL-based assessments.
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Assess-urls job queued
                siteId:
                  $ref: './schemas.yaml#/Id'
                pagesCount:
                  type: integer
                  description: Number of page URLs in the job
      '207':
        description: |
          A list of suggestions that are sent to autofix,
          or the status code and error message for the ones failed.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/SuggestionStatusUpdateListResponse'
            examples:
              broken-backlinks-suggestions-status-update-response:
                $ref: './examples.yaml#/broken-backlinks-suggestions-status-update-response'
    security:
      - ims_key: [ ]

