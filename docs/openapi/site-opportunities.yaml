site-opportunity-suggestions-edge-live-preview:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - $ref: './parameters.yaml#/opportunityId'
  post:
    operationId: edgeLivePreview
    summary: |
      Fetch live content from a URL using Edge Optimize specific User-Agent
    description: |
      Fetches live content from a given URL using the Edge Optimize specific User-Agent.
      This is useful for previewing what content is currently deployed or accessible
      from a specific URL.
    tags:
      - opportunity-suggestions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - url
            properties:
              url:
                type: string
                format: uri
                description: The URL to fetch content from
                example: https://www.lovesac.com/sactionals
    responses:
      '200':
        description: Successfully fetched content from the URL
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [success, error]
                  description: Fetch status
                statusCode:
                  type: integer
                  description: HTTP status code from the URL
                message:
                  type: string
                  description: Error message if fetch failed
                html:
                  type: object
                  description: HTML content object (similar to edge-preview response)
                  properties:
                    url:
                      type: string
                      description: The requested URL
                    content:
                      type: string
                      description: The fetched HTML content (null if fetch failed)
              example:
                status: success
                statusCode: 200
                html:
                  url: https://www.lovesac.com/sactionals
                  content: "<html>...</html>"
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '404':
        $ref: './responses.yaml#/404'
      '429':
        $ref: './responses.yaml#/429'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: [ ]

