      type: string
      description: Unique identifier for the category
      example: "photoshop-photo-editing"
    name:
      type: string
      description: Name of the category
      example: "Photo Editing"
    status:
      type: string
      description: Status of the category
      enum: ["active", "deleted"]
      example: "active"
    origin:
      type: string
      enum: ["ai", "human"]
      description: Source of the category
    updatedAt:
      $ref: '#/DateTime'
      description: When the category was last updated
    updatedBy:
      type: string
      description: Who last updated the category
      example: "system"
CustomerConfigTopic:
  type: object
  description: A topic within a category (top-level collection)
  required:
    - id
    - name
    - status
    - categoryId
  properties:
    id:
      type: string
      description: Unique identifier for the topic
      example: "photoshop-topic-1"
    name:
      type: string
      description: Name of the topic
      example: "Photo Retouching"
    status:
      type: string
      description: Status of the topic
      enum: [active, deleted]
      example: "active"
    categoryId:
      type: string
      description: ID of the category this topic belongs to
      example: "photoshop-photo-editing"
V2PromptListResponse:
  type: object
  description: Paginated list of prompts for a brand
  required:
    - items
    - total
    - limit
    - page
  properties:
    items:
      type: array
      items:
        $ref: '#/V2Prompt'
    total:
      type: integer
      description: Total number of prompts matching the filter
    limit:
      type: integer
      description: Page size (items per page)
    page:
      type: integer
      description: Current page number (1-based)

V2Prompt:
  type: object
  description: A prompt with brand, category, and topic enrichment
  properties:
    id:
      type: string
      description: Business key (prompt_id)
      example: "photoshop-prompt-1"
    uuid:
      type: string
      format: uuid
      description: UUID primary key (prompts.id)
    prompt:
      type: string
      description: The search query prompt text
    name:
      type: string
      description: Display name
    regions:
      type: array
      items:
        type: string
      description: Regions where this prompt is applicable
    categoryId:
      type: string
      format: uuid
      description: Category UUID (categories.id)
    topicId:
      type: string
      description: Topic business key
    status:
      type: string
      enum: [active, pending, deleted]
      default: active
    origin:
      type: string
      enum: [ai, human]
      default: human
    source:
      type: string
      description: The source system or process that created the prompt
      example: "config"
      default: "config"
    intent:
      type: [string, 'null']
      description: >-
        Canonical search-intent bucket persisted for the prompt, or null when
        unknown/unclassified. One of the canonical buckets (mirrors DRS prompt
        generation).
      enum:
        - informational
        - instructional
        - comparative
        - transactional
        - planning
        - delegation
        - null
      example: informational
    updatedAt:
      $ref: '#/DateTime'
    updatedBy:
      type: string
    brandId:
      type: string
      format: uuid
      description: brands.id (uuid)
    brandName:
      type: string
    category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: |
            UUID primary key (categories.id). The sole category identifier
            (the legacy category_id business key was retired — LLMO-5515).
            `id` and `uuid` carry the same value; either works for FK linkage.
        uuid:
          type: string
          format: uuid
          description: |
            UUID primary key (categories.id). Alias of `id`, kept for
            backward compatibility.
        name:
          type: string
        origin:
          type: string
    topic:
      type: object
      properties:
        id:
          type: string
          description: |
            Currently the UUID PK (topics.id) for backward compat —
            aligning this to the topic_id business key is a deferred
            breaking change. Use `uuid` for FK linkage today.
        uuid:
          type: string
          format: uuid
          description: UUID primary key (topics.id)
        name:
          type: string

V2PromptInput:
  type: object
  description: Input for creating/updating a prompt
  required:
    - prompt
  properties:
    id:
      type: string
      description: Optional business key; auto-generated if omitted
    prompt:
      type: string
      description: The search query prompt text
    name:
      type: string
      description: Display name (defaults to prompt slice)
    regions:
      type: array
      items:
        type: string
      default: []
    categoryId:
      type: string
    topicId:
      type: string
    status:
      type: string
      enum: [active, pending, deleted]
      default: active
    origin:
      type: string
      enum: [ai, human]
      default: human
    source:
      type: string
      description: The source system or process that created the prompt
      default: "config"
    intent:
      type: string
      description: >-
        Optional search-intent bucket for the prompt. Normalized on write:
        the value is lowercased, legacy aliases are remapped
        (`statistical`/`navigational` -> `informational`,
        `commercial` -> `transactional`), and the result is validated against
        the canonical buckets. An absent, empty, or (post-remap) invalid
        value is stored as null (NULL) — it is NOT coerced to a default
        bucket. Canonical buckets (mirror DRS prompt generation):
        `informational`, `instructional`, `comparative`, `transactional`,
        `planning`, `delegation`. No `enum` constraint is applied to the
        input: legacy aliases (`statistical`, `navigational`, `commercial`)
        are accepted and normalized on write.
      example: informational

V2PromptBulkDeleteRequest:
  type: object
  description: Request body for bulk-deleting prompts
  required:
    - promptIds
  properties:
    promptIds:
      type: array
      items:
        type: string
      minItems: 1
      maxItems: 100
      description: Array of prompt business keys to soft-delete

V2PromptBulkDeleteResponse:
  type: object
  description: Response from bulk-deleting prompts
  properties:
    metadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of prompt IDs in request
        success:
          type: integer
          description: Number of successfully deleted prompts
        failure:
          type: integer
          description: Number of failed deletions
    failures:
      type: array
      items:
        type: object
        properties:
          promptId:
            type: string
          reason:
            type: string

CustomerConfigPrompt:
  type: object
  description: A search prompt with category and topic ID references
  required:
    - id
    - prompt
    - regions
    - categoryId
    - topicId
  properties:
    id:
      type: string
      description: Unique identifier for the prompt
      example: "photoshop-prompt-1"
    prompt:
      type: string
      description: The search query prompt
      example: "What is the best photo editing software for portraits?"
    status:
      type: string
      enum: ["active", "pending", "deleted"]
      description: Status of the prompt
      default: "active"
    regions:
      type: array
      items:
        type: string
      description: Regions where this prompt is applicable
      example: ["us", "gb"]
    origin:
      type: string
      enum: ["ai", "human"]
      description: Source of the prompt (AI-generated or human-created)
      default: "human"
    source:
      type: string
      description: The source system or process that created the prompt
      example: "api"
      default: "config"
    updatedAt:
      $ref: '#/DateTime'
      description: When the prompt was last updated
    updatedBy:
      type: string
      description: Who last updated the prompt
      example: "system"
      default: "system"
    categoryId:
      type: string
      description: ID of the category this prompt belongs to
      example: "photoshop-photo-editing"
    topicId:
      type: string
      description: ID of the topic this prompt belongs to
      example: "photoshop-topic-1"
CustomerConfigUrl:
  type: object
  description: A URL associated with a brand
  required:
    - value
  properties:
    value:
      type: string
      format: uri
      description: The URL
      example: "https://www.adobe.com/products/photoshop.html"
    siteId:
      type: string
      description: Site ID for this URL (used for backwards compatibility with V1)
      example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
    type:
      type: string
      description: Type of URL
      example: "url"
    regions:
      type: array
      items:
        type: string
      description: Regions where this URL is applicable
      example: ["GL", "US", "GB"]
CustomerConfigSocialAccount:
  type: object
  description: A social media account for a brand
  required:
    - platform
    - url
    - regions
  properties:
    platform:
      type: string
      description: Social media platform name
      example: "twitter"
    url:
      type: string
      format: uri
      description: URL to the social media account
      example: "https://x.com/Photoshop"
    regions:
      type: array
      items:
        type: string
      description: Regions where this account is relevant
      example: ["GL"]
CustomerConfigBrandAlias:
  type: object
  description: An alternative name for a brand
  required:
    - name
    - regions
  properties:
    name:
      type: string
      description: Alternative brand name
      example: "PS"
    regions:
      type: array
      items:
        type: string
      description: Regions where this alias is used
      example: ["US", "GB"]
CustomerConfigCompetitor:
  type: object
  description: A competitor brand
  required:
    - name
    - url
    - regions
  properties:
    name:
      type: string
      description: Competitor brand name
      example: "Affinity Photo"
    url:
      type: string
      format: uri
      description: Competitor website URL
      example: "https://affinity.serif.com/photo"
    regions:
      type: array
      items:
        type: string
      description: Regions where this competitor is relevant
      example: ["US", "GB"]
CustomerConfigRelatedBrand:
  type: object
  description: A related brand (partner, sister brand, etc.)
  required:
    - name
    - url
    - regions
  properties:
    name:
      type: string
      description: Related brand name
      example: "Wacom"
    url:
      type: string
      format: uri
      description: Related brand website URL
      example: "https://www.wacom.com"
    regions:
      type: array
      items:
        type: string
      description: Regions where this relationship is relevant
      example: ["GL"]
CustomerConfigEarnedContent:
  type: object
  description: Earned media content source
  required:
    - name
    - type
    - coverage_scope
    - url
    - regions
  properties:
    name:
      type: string
      description: Name of the media source
      example: "Wikipedia"
    type:
      type: string
      description: Type of media source
      example: "encyclopedia"
    coverage_scope:
      type: string
      description: Description of what this source covers
      example: "product history and feature overview"
    url:
      type: string
      format: uri
      description: URL to the media source
      example: "https://en.wikipedia.org/wiki/Adobe_Photoshop"
    regions:
      type: array
      items:
        type: string
      description: Regions where this source is relevant
      example: ["GL"]
CustomerConfigBrand:
  type: object
  description: A brand configuration with all associated metadata
  required:
    - id
    - name
    - status
    - region
  properties:
    id:
      type: string
      description: Unique identifier for the brand
      example: "pending-adobe-photoshop"
    v1SiteId:
      type: string
      description: Legacy V1 site ID for backwards compatibility
      example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
    name:
      type: string
      description: Brand name
      example: "Adobe Photoshop"
    status:
      type: string
      enum: ["active", "pending", "deleted"]
      description: Current status of the brand
    origin:
      type: string
      enum: ["ai", "human"]
      description: How the brand was created
    region:
      type: array
      items:
        type: string
      description: Regions where this brand operates
      example: ["GL", "US", "GB"]
    description:
      type: string
      description: Detailed description of the brand
      example: "Adobe's flagship image editing software"
    brandContext:
      type:
        - string
        - 'null'
      maxLength: 4000
      description: Optional claims extraction context for this brand. Blank values clear the stored value.
      example: "Adobe Photoshop is Adobe's image editing product for creative professionals."
    mentionSentimentGuidance:
      type:
        - string
        - 'null'
      maxLength: 4000
      description: Optional guidance for classifying brand mention sentiment. Blank values clear the stored value.
      example: "Treat comparisons about subscription cost as neutral unless the answer explicitly recommends against the brand."
    updatedAt:
      $ref: '#/DateTime'
      description: When the brand was last updated
    updatedBy:
      type: string
      description: Who last updated the brand
      example: "system"
    vertical:
      type: string
      description: Industry vertical for the brand
      example: "Software & Technology"
    urls:
      type: array
      items:
        $ref: '#/CustomerConfigUrl'
      description: URLs associated with the brand
    socialAccounts:
      type: array
      items:
        $ref: '#/CustomerConfigSocialAccount'
      description: Social media accounts for the brand
    brandAliases:
      type: array
      items:
        $ref: '#/CustomerConfigBrandAlias'
      description: Alternative names for the brand
    competitors:
      type: array
      items:
        $ref: '#/CustomerConfigCompetitor'
      description: Competitor brands
    relatedBrands:
      type: array
      items:
        $ref: '#/CustomerConfigRelatedBrand'
      description: Related brands
    earnedContent:
      type: array
      items:
        $ref: '#/CustomerConfigEarnedContent'
      description: Earned media sources
    prompts:
      type: array
      items:
        $ref: '#/CustomerConfigPrompt'
      description: Flat list of all prompts for this brand with category/topic facets
CustomerConfigCustomer:
  type: object
  description: Complete customer configuration including brands and verticals
  required:
    - customerName
    - imsOrgID
    - brands
  properties:
    customerName:
      type: string
      description: Name of the customer organization
      example: "Adobe"
    imsOrgID:
      type: string
      description: Adobe IMS Organization ID
      example: "1234567890ABCDEF@AdobeOrg"
    categories:
      type: array
      items:
        $ref: '#/CustomerConfigCategory'
      description: Top-level collection of categories
    topics:
      type: array
      items:
        $ref: '#/CustomerConfigTopic'
      description: Top-level collection of topics
    brands:
      type: array
      items:
        $ref: '#/CustomerConfigBrand'
      description: List of brands for this customer
    availableVerticals:
      type: array
      items:
        type: string
      description: List of available industry verticals
      example: ["Software & Technology", "Professional Services"]
CustomerConfig:
  type: object
  description: Top-level customer configuration response
  required:
    - customer
  properties:
    customer:
      $ref: '#/CustomerConfigCustomer'
      description: The step of the preflight job when this result was generated

# =============================================================================
# Sentiment Guidelines Schemas
# =============================================================================

SentimentTopic:
  type: object
  description: A sentiment analysis topic defining a subject of interest
  properties:
    siteId:
      type: string
      format: uuid
      description: Parent site identifier
    topicId:
      type: string
      format: uuid
      description: Unique topic identifier
    name:
      type: string
      description: Topic name/subject to analyze
      example: "2026 Corvette Stingray"
    description:
      type: string
      description: Optional description for context
    urls:
      type: array
      description: URLs associated with this topic, each with citation data and sub-prompts
      default: []
      items:
        type: object
        required:
          - url
          - timesCited
        properties:
          url:
            type: string
            description: The URL where the topic was cited
            example: "https://en.wikipedia.org/wiki/BMW_XM"
          timesCited:
            type: integer
            description: Number of times cited on this URL
            example: 12
          category:
            type: string
            description: Classification category for this URL
            example: "automotive"
          subPrompts:
            type: array
            items:
              type: string
            description: Sub-prompts specific to this URL
            default: []
            example: ["What do people say about performance?"]
    enabled:
      type: boolean
      description: Whether topic is active
      default: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    createdBy:
      type: string
      description: User/service who created
    updatedBy:
      type: string
      description: Last user/service to modify

SentimentTopicInput:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      description: Topic name/subject to analyze
      example: "2026 Corvette Stingray"
    description:
      type: string
      description: Optional description for context
      example: "Track sentiment about the latest Corvette model"
    urls:
      type: array
      description: URLs associated with this topic
      default: []
      items:
        type: object
        required:
          - url
          - timesCited
        properties:
          url:
            type: string
            example: "https://en.wikipedia.org/wiki/BMW_XM"
          timesCited:
            type: integer
            example: 0
          category:
            type: string
            example: "automotive"
          subPrompts:
            type: array
            items:
              type: string
            example: ["What do people say about performance?"]
    enabled:
      type: boolean
      default: true
      example: true

SentimentTopicUpdate:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
    urls:
      type: array
      items:
        type: object
        required:
          - url
          - timesCited
        properties:
          url:
            type: string
          timesCited:
            type: integer
          category:
            type: string
          subPrompts:
            type: array
            items:
              type: string
    enabled:
      type: boolean

SentimentTopicListResponse:
  type: object
  properties:
    items:
      type: array
      items:
        $ref: '#/SentimentTopic'
    pagination:
      type: object
      properties:
        limit:
          type: integer
        cursor:
          type: string
          description: Pagination cursor (absent when no more pages)
        hasMore:
          type: boolean

SentimentTopicBulkResponse:
  type: object
  properties:
    metadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items in request
        success:
          type: integer
          description: Number of successfully processed items
        failure:
          type: integer
          description: Number of failed items
    failures:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          reason:
            type: string
    items:
      type: array
      items:
        $ref: '#/SentimentTopic'

SentimentGuideline:
  type: object
  description: A sentiment analysis guideline defining how to analyze topics
  properties:
    siteId:
      type: string
      format: uuid
      description: Parent site identifier
    guidelineId:
      type: string
      format: uuid
      description: Unique guideline identifier
    name:
      type: string
      description: Display name
      example: "Product Quality Focus"
    instruction:
      type: string
      description: The actual guideline instruction
      example: "Focus on sentiment related to product quality, durability, and craftsmanship."
    audits:
      type: array
      items:
        type: string
      description: Enabled audit types
      example: ["wikipedia-analysis", "reddit-analysis", "youtube-analysis", "cited-analysis"]
    enabled:
      type: boolean
      description: Whether guideline is active
      default: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    createdBy:
      type: string
      description: User/service who created
    updatedBy:
      type: string
      description: Last user/service to modify

SentimentGuidelineInput:
  type: object
  required:
    - name
    - instruction
  properties:
    name:
      type: string
      description: Display name
      example: "Product Quality Focus"
    instruction:
      type: string
      description: The actual guideline instruction
      example: "Focus on sentiment related to product quality, durability, and craftsmanship."
    audits:
      type: array
      items:
        type: string
      description: Audit types to associate
      example: ["wikipedia-analysis", "reddit-analysis", "youtube-analysis", "cited-analysis"]
    enabled:
      type: boolean
      default: true
      example: true

SentimentGuidelineUpdate:
  type: object
  properties:
    name:
      type: string
    instruction:
      type: string
    audits:
      type: array
      items:
        type: string
    enabled:
      type: boolean

SentimentGuidelineListResponse:
  type: object
  properties:
    items:
      type: array
      items:
        $ref: '#/SentimentGuideline'
    pagination:
      type: object
      properties:
        limit:
          type: integer
        cursor:
          type: string
          description: Pagination cursor (absent when no more pages)
        hasMore:
          type: boolean

SentimentGuidelineBulkResponse:
  type: object
  properties:
    metadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items in request
        success:
          type: integer
          description: Number of successfully processed items
        failure:
          type: integer
          description: Number of failed items
    failures:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          reason:
            type: string
    items:
      type: array
      items:
        $ref: '#/SentimentGuideline'

SentimentConfig:
  type: object
  description: Combined sentiment configuration with topics and guidelines
  properties:
    topics:
      type: array
      items:
        $ref: '#/SentimentTopic'
      description: All enabled topics
    guidelines:
      type: array
      items:
        $ref: '#/SentimentGuideline'
      description: Guidelines (optionally filtered by audit type)

StageDomainsRequest:
  type: object
  description: Request body for adding staging domains to a prod LLMO site
  required:
    - stagingDomains
  properties:
    stagingDomains:
      type: array
      items:
        type: string
        description: Staging domain (hostname, e.g. staging.lovesac.com)
      minItems: 1
      example: ['staging.lovesac.com', 'stage1.lovesac.com']

StageConfigItem:
  type: object
  description: Full edge optimize metaconfig for one stage site (domain plus metaconfig fields)
  required:
    - domain
    - siteId
  properties:
    domain:
      type: string
      description: Staging domain (e.g. staging.lovesac.com)
      example: 'staging.lovesac.com'
    siteId:
      type: string
      format: uuid
      description: Spacecat site ID for the stage site
    apiKeys:
      type: array
      items:
        type: string
      description: API keys for the stage site
    tokowakaEnabled:
      type: boolean
  additionalProperties: true

StageConfigsResponse:
  type: array
  description: Response is the array of stage configs (one per staging domain). Each item is domain plus full edge optimize metaconfig for that stage site.
  items:
    $ref: '#/StageConfigItem'
Token:
  type: object
  description: A token allocation for a site within a billing cycle
  properties:
    id:
      $ref: '#/Id'
    siteId:
      $ref: '#/Id'
    tokenType:
      type: string
      description: Token type key, e.g. `grant_cwv`, `grant_broken_backlinks`
      example: grant_cwv
    cycle:
      type: string
      description: Billing cycle identifier, e.g. `2025-03`
      example: '2025-03'
    total:
      type: integer
      description: Total tokens allocated for this cycle
      example: 3
    used:
      type: integer
      description: Tokens consumed so far in this cycle
      example: 1
    remaining:
      type: integer
      description: Tokens remaining (total - used)
      example: 2
    createdAt:
      $ref: '#/DateTime'
    updatedAt:
      $ref: '#/DateTime'
  required:
    - id
    - siteId
    - tokenType
    - cycle
    - total
    - used
    - remaining
    - createdAt
    - updatedAt

PresignedUrlResponse:
  type: object
  description: A short-lived presigned S3 URL and its expiry time
  properties:
    presignedUrl:
      type: string
      format: uri
      description: Presigned S3 URL to download the resource
    expiresAt:
      type: string
      format: date-time
      description: ISO 8601 timestamp when the presigned URL expires
      example: '2026-06-15T12:00:00.000Z'
  required:
    - presignedUrl
    - expiresAt
  additionalProperties: false

# ── V2 Brand schemas (PostgREST-backed, /v2/orgs/{spaceCatId}/brands) ──

V2BrandUrl:
  type: object
  properties:
    value:
      type: string
      description: Full URL (base URL + optional path) as submitted by the user
      example: 'https://www.example.com/products'
    onboarded:
      type: boolean
      description: >-
        Response-only. True when the URL's base resolves to a site in the
        brand's organization. Onboarded URLs feed the CDN / Search Console
        configuration; non-onboarded URLs are stored but excluded. Ignored on
        input.
    siteId:
      type:
        - string
        - 'null'
      format: uuid
      description: >-
        Response-only. Set to the matching site's UUID when onboarded is true.
        Ignored on input.
  required:
    - value

V2BrandSocialAccount:
  type: object
  properties:
    url:
      type: string
      description: Social media account URL
      example: 'https://twitter.com/example'
    regions:
      type: array
      items:
        type: string
      description: ISO-3166 country codes this account targets
      example: ['US', 'DE']

V2BrandEarnedContent:
  type: object
  properties:
    name:
      type: string
      description: Name of the earned content source
      example: 'TechCrunch'
    url:
      type: string
      description: URL of the earned content source
      example: 'https://techcrunch.com/example'
    regions:
      type: array
      items:
        type: string
      description: ISO-3166 country codes
      example: ['US']

V2BrandAlias:
  type: object
  properties:
    name:
      type: string
      description: Alias name for the brand
      example: 'Example Corp'
    regions:
      type: array
      items:
        type: string
      description: ISO-3166 country codes
      example: ['US']

V2BrandCompetitor:
  type: object
  properties:
    name:
      type: string
      description: Competitor name
      example: 'Acme Inc'
    url:
      type:
        - string
        - 'null'
      description: Competitor URL
      example: 'https://www.acme.com'
    regions:
      type: array
      items:
        type: string
      description: ISO-3166 country codes
      example: ['US']

V2Brand:
  type: object
  description: A brand managed via the v2 PostgREST-backed API
  properties:
    id:
      type: string
      format: uuid
      description: Brand UUID
    name:
      type: string
      description: Brand name (unique per organization)
    status:
      type: string
      enum: [active, pending, deleted]
      description: Brand status
      default: active
    origin:
      type: string
      enum: [human, ai]
      description: How the brand was created
      default: human
    description:
      type:
        - string
        - 'null'
      description: Brand description
    brandContext:
      type:
        - string
        - 'null'
      maxLength: 4000
      description: Optional claims extraction context for this brand. Blank values clear the stored value.
