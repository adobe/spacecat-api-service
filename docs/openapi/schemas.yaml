      type: string
      example: 'Chatbots'
    responseCodes:
      type: array
      items:
        type: integer
      example: [200, 301]
    successRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 98.5
    avgTtfbMs:
      oneOf:
        - type: number
        - type: 'null'
      example: 120.5
    categoryName:
      type: string
      example: 'Poster Maker'
    avgCitabilityScore:
      oneOf:
        - type: number
        - type: 'null'
      example: 65.0
    deployedAtEdge:
      type: boolean
      example: true
    hitsTrend:
      type: array
      description: |
        Multi-week sparkline for this URL — array of `{weekStart, value}` points
        scoped by the same filters (including `agentTypes`). Used by the URL
        Inspector PG dialog to render per-URL agentic charts without a second
        request. Empty array when the URL has no agentic activity in the
        requested window. The `value` field name (rather than `hits`) is
        preserved from the underlying `rpc_agentic_traffic_by_url` week_series
        payload to stay aligned with `UrlInspectorOwnedUrlRow.agenticHitsTrend`.
      items:
        type: object
        properties:
          weekStart:
            type: string
            format: date
            example: '2026-02-09'
          value:
            type: integer
            example: 12
        required: [weekStart, value]
  required:
    - host
    - urlPath
    - totalHits
    - uniqueAgents
    - topAgent
    - topAgentType
    - responseCodes
    - deployedAtEdge

AgenticTrafficByUrl:
  type: object
  description: Paginated per-URL performance analysis
  properties:
    totalCount:
      type: integer
      description: Total number of URLs matching the filters (across all pages)
      example: 1240
    rows:
      type: array
      items:
        $ref: '#/AgenticTrafficByUrlRow'
      description: URLs for the requested page
  required:
    - totalCount
    - rows

AgenticTrafficUrlsExportRequest:
  type: object
  description: Filter set for an asynchronous URL-level agentic traffic CSV export
  properties:
    startDate:
      type: string
      format: date
    endDate:
      type: string
      format: date
    platform:
      type: string
      description: AI platform UI code, mapped to the DB platform value before export
      example: 'chatgpt'
    categoryName:
      type: string
      example: 'Poster Maker'
    agentType:
      type: string
      example: 'Chatbots'
    userAgent:
      type: string
      example: 'ChatGPT-User'
    contentType:
      type: string
      example: 'owned'
    successRate:
      type: string
      description: Success-rate bucket accepted by the agentic traffic RPC helpers
      example: 'high'
    urlPathSearch:
      type: string
      description: Substring filter applied to url_path server-side
      example: '/express/create'

AgenticTrafficUrlsExportResponse:
  type: object
  description: Status and download metadata for an asynchronous URL-level CSV export
  properties:
    exportId:
      type: string
      pattern: '^[a-f0-9]{64}$'
      example: 'b8d70f4ce07b44a1c46ef6d1a9f83a0678d8c0c14f82121161db725e9d4c7b9a'
    status:
      type: string
      enum: [processing, ready, failed]
      example: 'ready'
    downloadUrls:
      type: array
      description: One or more presigned CSV URLs. Large DB exports may be split into multiple objects.
      items:
        type: string
        format: uri
    expiresAt:
      type: string
      format: date-time
      description: Expiry timestamp shared by all presigned URLs
      example: '2026-05-12T10:15:30.000Z'
    rowCount:
      oneOf:
        - type: integer
        - type: 'null'
      description: Number of CSV rows reported by Aurora S3 export
      example: 9900000
    filesUploaded:
      oneOf:
        - type: integer
        - type: 'null'
      description: Number of CSV objects reported by Aurora S3 export
      example: 3
    bytesUploaded:
      oneOf:
        - type: integer
        - type: 'null'
      description: Number of bytes reported by Aurora S3 export
      example: 1428000000
    failureReason:
      type: string
      description: Present only when status is failed
      example: 'aws_s3/aws_commons extensions are required to export agentic traffic URLs to S3'
  required:
    - exportId
    - status

AgenticTrafficFilterDimensions:
  type: object
  description: Distinct filter values available for the selected site and date range
  properties:
    categories:
      type: array
      items:
        type: string
      example: ['Poster Maker', 'Electronics']
    agentTypes:
      type: array
      items:
        type: string
      example: ['Chatbots', 'Research']
    platforms:
      type: array
      items:
        type: string
      example: ['ChatGPT', 'Perplexity']
    contentTypes:
      type: array
      items:
        type: string
      example: ['html', 'pdf']
    userAgents:
      type: array
      items:
        type: string
      example: ['ChatGPT-User', 'GPTBot']
  required:
    - categories
    - agentTypes
    - platforms
    - contentTypes
    - userAgents

AgenticTrafficWeekEntry:
  type: object
  description: An ISO week for which the site has agentic traffic data
  properties:
    week:
      type: string
      description: ISO week label (YYYY-WNN)
      example: '2026-W10'
    startDate:
      oneOf:
        - type: string
          format: date
        - type: 'null'
      example: '2026-03-02'
    endDate:
      oneOf:
        - type: string
          format: date
        - type: 'null'
      example: '2026-03-08'
  required:
    - week

AgenticTrafficWeeks:
  type: object
  description: Available ISO weeks for the site's agentic traffic data
  properties:
    weeks:
      type: array
      items:
        $ref: '#/AgenticTrafficWeekEntry'
  required:
    - weeks

AgenticTrafficMoverRow:
  type: object
  description: A URL with significant traffic change between the oldest and newest date in range
  properties:
    host:
      type: string
      example: 'www.adobe.com'
    urlPath:
      type: string
      example: '/express/create/poster'
    previousHits:
      type: integer
      description: Hits on the oldest date in the range
      example: 100
    currentHits:
      type: integer
      description: Hits on the newest date in the range
      example: 200
    hitsChange:
      type: integer
      description: Absolute change (positive = top mover, negative = bottom mover)
      example: 100
    changePercent:
      oneOf:
        - type: number
        - type: 'null'
      description: Percentage change; null when previousHits is zero
      example: 100.0
    direction:
      type: string
      enum: ['up', 'down']
      example: 'up'
  required:
    - host
    - urlPath
    - previousHits
    - currentHits
    - hitsChange
    - direction

AgenticTrafficMovers:
  type: array
  items:
    $ref: '#/AgenticTrafficMoverRow'
  description: |
    Top and bottom URL movers ordered by `direction DESC, abs(hitsChange) DESC`.
    Returns up to `limit` rows each for direction=up and direction=down.

# ── URL Inspector schemas ─────────────────────────────────────────────────────

UrlInspectorStats:
  type: object
  properties:
    stats:
      type: object
      properties:
        totalPromptsCited:
          type: integer
          description: Number of prompts where the site was cited
          example: 10
        totalPrompts:
          type: integer
          description: Total prompts evaluated
          example: 50
        uniqueUrls:
          type: integer
          description: Number of distinct site URLs cited
          example: 5
        totalCitations:
          type: integer
          description: Total citation count across all prompts
          example: 100
      required: [totalPromptsCited, totalPrompts, uniqueUrls, totalCitations]
    weeklyTrends:
      type: array
      items:
        type: object
        properties:
          week:
            type: string
            description: ISO week identifier
            example: '2026-W10'
          totalPromptsCited:
            type: integer
          totalPrompts:
            type: integer
          uniqueUrls:
            type: integer
          totalCitations:
            type: integer
        required: [week, totalPromptsCited, totalPrompts, uniqueUrls, totalCitations]
  required: [stats, weeklyTrends]

UrlInspectorOwnedUrlRow:
  type: object
  properties:
    url:
      type: string
      format: uri
      example: 'https://www.adobe.com/products/photoshop'
    citations:
      type: integer
      example: 42
    promptsCited:
      type: integer
      example: 12
    products:
      type: array
      items:
        type: string
      example: ['Creative Cloud']
    regions:
      type: array
      items:
        type: string
      example: ['US', 'DE']
    weeklyCitations:
      type: array
      items:
        type: object
      description: Weekly citation breakdown (JSONB from RPC)
    weeklyPromptsCited:
      type: array
      items:
        type: object
      description: Weekly prompts-cited breakdown (JSONB from RPC)
    agenticHits:
      type: integer
      description: |
        Total agentic Citation Attempts for this URL across the requested
        window, scoped by `agentTypes` if supplied (the URL Inspector PG
        page passes `Chatbots,Research`). Defaults to 0 when the URL has
        no agentic activity. Server-side join from `agentic_traffic_weekly`
        added in LLMO-4526 — replaces the previous client-side merge that
        silently truncated owned URLs ranked beyond 500.
      example: 1248
    agenticHitsTrend:
      type: array
      description: |
        Per-week agentic Citation Attempts for this URL — array of
        `{weekStart, value}` points scoped by the same filters. Empty
        array when there is no agentic activity. Added in LLMO-4526.
      items:
        type: object
        properties:
          weekStart:
            oneOf:
              - type: string
                format: date
              - type: 'null'
            example: '2026-02-09'
          value:
            type: integer
            example: 21
        required: [value]

UrlInspectorOwnedUrls:
  type: object
  properties:
    urls:
      type: array
      items:
        $ref: '#/UrlInspectorOwnedUrlRow'
    totalCount:
      type: integer
      description: Total number of owned URLs matching the filters
      example: 100
  required: [urls, totalCount]

UrlInspectorTrendingUrlPrompt:
  type: object
  properties:
    prompt:
      type: string
      example: 'What is the best photo editor?'
    category:
      type: string
      example: 'Creative Cloud'
    region:
      type: string
      example: 'US'
    topics:
      type: string
      example: 'Photo Editing'
    citationCount:
      type: integer
      example: 30
    executionCount:
      type: integer
      example: 5

UrlInspectorTrendingUrlEntry:
  type: object
  properties:
    url:
      type: string
      format: uri
      example: 'https://competitor.com/page'
    contentType:
      type: string
      example: 'earned'
    prompts:
      type: array
      items:
        $ref: '#/UrlInspectorTrendingUrlPrompt'
    totalCitations:
      type: integer
      description: Sum of citationCount across all prompts for this URL
      example: 55

UrlInspectorTrendingUrls:
  type: object
  properties:
    urls:
      type: array
      items:
        $ref: '#/UrlInspectorTrendingUrlEntry'
    totalNonOwnedUrls:
      type: integer
      description: Total non-owned URLs matching the filters
      example: 500
  required: [urls, totalNonOwnedUrls]

UrlInspectorCitedDomainRow:
  type: object
  properties:
    domain:
      type: string
      example: 'competitor.com'
    totalCitations:
      type: integer
      example: 100
    totalUrls:
      type: integer
      example: 25
    promptsCited:
      type: integer
      example: 15
    contentType:
      type: string
      example: 'earned'
    categories:
      type: string
      description: Comma-separated category names
      example: 'Category A,Category B'
    regions:
      type: string
      description: Comma-separated region codes
      example: 'US,DE'

UrlInspectorCitedDomains:
  type: object
  properties:
    domains:
      type: array
      items:
        $ref: '#/UrlInspectorCitedDomainRow'
    totalCount:
      type: integer
      description: Total number of cited domains matching the filters
      example: 50
  required: [domains, totalCount]

UrlInspectorDomainUrlRow:
  type: object
  properties:
    urlId:
      type: string
      description: URL identifier for prompt drilldown
      example: '44444444-4444-4444-4444-444444444444'
    url:
      type: string
      format: uri
      example: 'https://competitor.com/page1'
    contentType:
      type: string
      example: 'earned'
    citations:
      type: integer
      example: 42
    promptsCited:
      type: integer
      example: 12
    categories:
      type: string
      description: Comma-separated category names
      example: 'Category A'
    regions:
      type: string
      description: Comma-separated region codes
      example: 'US,DE'

UrlInspectorDomainUrls:
  type: object
  properties:
    urls:
      type: array
      items:
        $ref: '#/UrlInspectorDomainUrlRow'
    totalCount:
      type: integer
      description: Total URLs within the domain
      example: 100
  required: [urls, totalCount]

UrlInspectorUrlPromptRow:
  type: object
  properties:
    prompt:
      type: string
      example: 'What is the best photo editor?'
    category:
      type: string
      example: 'Creative Cloud'
    region:
      type: string
      example: 'US'
    topics:
      type: string
      example: 'Photo Editing'
    citations:
      type: integer
      example: 15

UrlInspectorUrlPrompts:
  type: object
  properties:
    prompts:
      type: array
      items:
        $ref: '#/UrlInspectorUrlPromptRow'
  required: [prompts]

UrlInspectorFilterDimensions:
  type: object
  description: |
    Distinct filter options for the URL Inspector PG dashboard, sourced from
    `url_inspector_domain_stats`. Each dimension is an array of id/label pairs.

    LLMO-4525 review note: `categories` and `regions` are open-ended strings
    (data is tenant-supplied), so we intentionally do NOT pin an enum on
    them — consumers must treat any string as valid. `content_types.id`
    however mirrors the Postgres `source_content_type` enum and IS pinned so
    breaking enum additions surface in the OpenAPI contract.
  properties:
    categories:
      type: array
      description: Distinct category names present in the site's data for the date range.
      items:
        type: object
        properties:
          id: { type: string }
          label: { type: string }
        required: [id, label]
    regions:
      type: array
      description: Distinct region codes present in the site's data for the date range.
      items:
        type: object
        properties:
          id: { type: string }
          label: { type: string }
        required: [id, label]
    content_types:
      type: array
      description: |
        Distinct source content types present in the site's data. `id` mirrors
        the Postgres `source_content_type` enum.
      items:
        type: object
        properties:
          id:
            type: string
            enum: [owned, earned, social, competitor]
            description: Postgres `source_content_type` enum value
          label: { type: string }
        required: [id, label]
  required: [categories, regions, content_types]

BrandPresenceFilterOption:
  type: object
  description: A single id/label option for a filter dropdown
  properties:
    id: { type: string }
    label: { type: string }
  required: [id, label]

BrandPresenceFilterDimensions:
  type: object
  description: |
    Filter dimensions for the Brand Presence configuration view.
    Each dimension is an array of id/label pairs except `stats`.
  properties:
    brands:
      type: array
      description: Brands accessible for the organization (and optionally a specific site).
      items:
        $ref: '#/BrandPresenceFilterOption'
    categories:
      type: array
      description: Prompt categories configured for the organization.
      items:
        $ref: '#/BrandPresenceFilterOption'
    topics:
      type: array
      description: Topics for the organization, optionally scoped to a category.
      items:
        $ref: '#/BrandPresenceFilterOption'
    regions:
      type: array
      description: Available region codes.
      items:
        $ref: '#/BrandPresenceFilterOption'
    origins:
      type: array
      description: Prompt origin values (e.g. `human`, `ai`).
      items:
        $ref: '#/BrandPresenceFilterOption'
    page_intents:
      type: array
      description: Page intent values derived from the brand's prompt data.
      items:
        $ref: '#/BrandPresenceFilterOption'
    stats:
      type: object
      description: Aggregate statistics for the current filter scope.
      properties:
        distinct_prompt_count:
          type: integer
          description: Number of distinct prompts matching the current filter scope.
      required: [distinct_prompt_count]
  required: [brands, categories, topics, regions, origins, page_intents, stats]

FanoutReport:
  type: object
  description: |
    Schema of the JSON document stored at
    `fanout/llmo/{spaceCatId}/{brandId}/data.json.gz` and served via the 302
    redirect from `GET /org/{spaceCatId}/brands/{brandId}/fanout-report`.

    Generated by `POST /org/{spaceCatId}/brands/{brandId}/fanout-report`. The
    document is overwritten on each regeneration (last writer wins).
  properties:
    schemaVersion:
      type: integer
      description: Bumped when this schema changes in a breaking way.
      example: 1
    generatedAt:
      type: string
      format: date-time
      description: ISO 8601 timestamp at which the curation finished.
      example: '2026-05-12T14:00:00Z'
    isoDate:
      type: string
      format: date
      description: Semrush snapshot date echoed from the upstream response. Drives the UI's "data as of …" stamp.
      example: '2026-05-08'
    orgId:
      type: string
      format: uuid
      description: Organization (SpaceCat) ID the report was generated for.
    brandId:
      type: string
      format: uuid
      description: Brand UUID the report was generated for.
    brandName:
      type: string
      description: Brand display name at the time of generation.
      example: 'Acme'
    brandDomains:
      type: array
      description: |
        `www.`-stripped hostnames that the curation considered as "the brand"
        when computing `brandPosition` against Semrush rankings. Derived
        server-side using the same logic the UI applies (see
        `collectBrandUrlDomains`). Empty array means the brand has no
        recognizable URLs configured — every sub-query will have
        `brandPosition: null`.
      items:
        type: string
      example: ['acme.com', 'blog.acme.com']
    country:
      type: string
      description: Market scope for SERP + keyword data. Hard-coded to `US` in MVP.
      example: 'US'
    llm:
      type: string
      description: LLM the citation/mention rates are scoped to. Hard-coded to `chatgpt` in MVP.
      example: 'chatgpt'
    windowDays:
      type: integer
      description: Trailing window (in days) used to compute `mentionRate` and `citationRate` per topic. Hard-coded to 7 in MVP.
      example: 7
    topics:
      type: array
      description: |
        Up to **5 topics**, ordered by `priorityScore` descending. May be empty
        when the brand has no tracked topics or none survives the
        `similarityScore >= 0.70` filter.
      maxItems: 5
      items:
        $ref: '#/FanoutReportTopic'
  required:
    - schemaVersion
    - generatedAt
    - isoDate
    - orgId
    - brandId
    - brandName
    - brandDomains
    - country
    - llm
    - windowDays
    - topics

FanoutReportTopic:
  type: object
  description: |
    One topic in a `FanoutReport`. Trimmed to the minimal set the UI consumes —
    debug-only and pre-filtered fields (Semrush internal IDs, similarity score,
    per-rate breakdown counts) are intentionally omitted.
  properties:
    topicUuid:
      type: string
      format: uuid
      description: Internal UUID from `public.topics.id`. Use this to deep-link to topic-scoped endpoints.
    name:
      type: string
      description: Human-readable topic name from `public.topics.name`.
      example: 'Best CRM for SMB'
    matchedTopicName:
      type: string
      description: |
        Semrush's canonical name for the matched topic. May differ from `name`
        when Semrush rewrote the input string (e.g. `"best crm for smb"` →
        `"Best CRM for small business"`). UI can surface this as a
        "matched to: X" hint.
      example: 'Best CRM for small business'
    volume:
      type: integer
      description: Monthly search volume for the matched topic in the requested country.
      example: 2400
    promptsTotal:
      type: integer
      description: |
        Number of distinct prompts under the topic that have at least one
        execution in the trailing window. Drives the "8 tracked prompts"
        header text in the UI (PDF Fig 2).
      example: 8
    mentionRate:
      type: [number, 'null']
      format: float
      minimum: 0
      maximum: 1
      description: |
        Fraction of `promptsTotal` where at least one execution had
        `mentions = true`. `null` when `promptsTotal = 0` (no execution data
        in the window).
      example: 0.47
    citationRate:
      type: [number, 'null']
      format: float
      minimum: 0
      maximum: 1
      description: |
        Fraction of `promptsTotal` where at least one execution had
        `citations = true`. `null` when `promptsTotal = 0`. Topics with
        `null` are treated as zero by the priority formula.
      example: 0.03
    priorityScore:
      type: number
      format: float
      description: |
        `volume × (1 − COALESCE(citationRate, 0))`. Pre-computed so the UI
        can sort/rank without recomputing. Higher score = larger opportunity.
      example: 2328.0
    subQueries:
      type: array
      description: Deduplicated fan-out sub-queries for this topic, in the order Semrush returned them.
      items:
        $ref: '#/FanoutReportSubQuery'
  required:
    - topicUuid
    - name
    - matchedTopicName
    - volume
    - promptsTotal
    - mentionRate
    - citationRate
    - priorityScore
    - subQueries

FanoutReportSubQuery:
  type: object
  description: One fan-out sub-query, with its SERP top-10 and the brand's position derived from it.
  properties:
    keyword:
      type: string
      description: The sub-query text as Semrush returned it. Displayed verbatim in the UI.
      example: 'HubSpot vs Salesforce for small teams'
    intent:
      type: string
      description: |
        Search-intent label assigned by Semrush. One of the values from
        `KEYWORD_INTENT_ENUM` in `third-party/ai-seo-ts/v2/fanout/enums_pb.d.ts`.

        Semrush returns a multi-label `intents` array per fan-out keyword;
        the curation step picks `intents[0]` and surfaces it here as a
        single value. Absent when Semrush returns an empty list.

        The PDF prototype shows labels like `Comparison` / `Commercial` /
        `Informational` — those were illustrative. The actual enum values
        are listed below.
      enum:
        - COMMERCIAL
        - INFORMATIONAL
        - NAVIGATIONAL
        - TRANSACTIONAL
        - UNSPECIFIED
      example: 'COMMERCIAL'
    volume:
      type: integer
      description: Monthly search volume for this sub-query in the requested country.
      example: 1900
    brandPosition:
      type: [integer, 'null']
      minimum: 1
      maximum: 10
      description: |
        Lowest (best) SERP position of any of the brand's configured domains
        in `rankings[]`. `null` when none of the brand's domains appears in
        the top 10. Matching is exact-hostname against `brandDomains`.
      example: null
    topDomain:
      type: string
      description: |
        Domain at position 1 in `rankings[]`. Equivalent to `rankings[0].domain`,
        denormalized for quick UI rendering.
      example: 'hubspot.com'
    rankings:
      type: array
      maxItems: 10
      description: |
        Top-10 SERP rankings for the sub-query. Hostname format (with `www.`
        stripped); subdomains are kept (e.g. `blog.adobe.com` and `adobe.com`
        are distinct entries).
      items:
        $ref: '#/FanoutReportRanking'
  required:
    - keyword
    - intent
    - volume
    - brandPosition
    - topDomain
    - rankings

FanoutReportRanking:
  type: object
  description: A single SERP entry — `(domain, position)` pair.
  properties:
    domain:
      type: string
      description: |
        `www.`-stripped hostname. Subdomains other than `www.` are kept
        (e.g. `blog.adobe.com` is distinct from `adobe.com`).
      example: 'hubspot.com'
    position:
      type: integer
      minimum: 1
      maximum: 10
      description: Google SERP position (1–10).
      example: 1
  required:
    - domain
    - position

WebhookAccepted:
  type: object
  properties:
    status:
      type: string
      enum: [accepted]
  required: [status]
WebhookUnauthorized:
  type: object
  properties:
    message:
      type: string
  required: [message]

PromptExecutionStatusItem:
  type: object
  description: Execution status for a single (topic, prompt, region) combination.
  properties:
    topicId:
      type: string
      format: uuid
      description: Topic UUID
      example: 'aaaaaaaa-0000-7000-8000-000000000001'
    prompt:
      type: string
      description: Prompt text
      example: 'What is the best photo editor?'
    regionCode:
      type: string
      description: Two-character region code
      example: 'US'
    matchedModels:
      type: array
      description: LLM models that have execution data for this (topic, prompt, region) in the queried date range
      items:
        type: string
      example: ['chatgpt-free', 'google']
  required: [topicId, prompt, regionCode, matchedModels]

PromptExecutionStatusResponse:
  type: object
  properties:
    items:
      type: array
      description: One item per unique (topicId, prompt, regionCode) combination
      items:
        $ref: '#/PromptExecutionStatusItem'
  required: [items]

# ── AI Visibility schemas ──────────────────────────────────────────────

AiVisibilityServiceUnavailable:
  type: object
  description: Returned when the AI Visibility gRPC backend is not configured
  properties:
    error:
      type: string
      example: aiVisibilityNotConfigured
    message:
      type: string
      example: Missing SEO_CLIENT_ID
  required: [error, message]

AiVisibilityEngineBreakdown:
  type: object
  description: Per-LLM-engine numeric breakdown
  properties:
    all:
      type: number
    chatgpt:
      type: number
    gemini:
      type: number
    googleAiMode:
      type: number
    googleAiOverview:
      type: number

AiVisibilityByDateEntry:
  type: object
  description: A single date-bucket in brand statistics
  properties:
    year:
      type: integer
    month:
      type: integer
    day:
      type: integer
    aiVisibility:
      type: number
    mentions:
      $ref: '#/AiVisibilityEngineBreakdown'
    citedPages:
      $ref: '#/AiVisibilityEngineBreakdown'
    visibilityByEngine:
      $ref: '#/AiVisibilityEngineBreakdown'
    ownedSources:
      type: integer
    audience:
      type: integer

AiVisibilityByCountryEntry:
  type: object
  description: Per-country breakdown row in brand statistics
  properties:
    country:
      type: string
    mentions:
      type: integer
    audience:
      type: integer
    citedPages:
      type: integer

AiVisibilitySrFilters:
  type: object
  description: Available filter dimensions extracted from the response
  properties:
    markets:
      type: array
      items:
        type: object
        properties:
          code:
            type: string
          name:
            type: string
    models:
      type: array
      items:
        type: object
        properties:
          code:
            type: string
          name:
            type: string

AiVisibilityBrandStats:
  type: object
  description: Brand visibility statistics response
  properties:
    visibility:
      type: number
    visibilityByEngine:
      $ref: '#/AiVisibilityEngineBreakdown'
    audience:
      type: integer
    mentions:
      $ref: '#/AiVisibilityEngineBreakdown'
    citedPages:
      $ref: '#/AiVisibilityEngineBreakdown'
    byDate:
      type: array
      items:
        $ref: '#/AiVisibilityByDateEntry'
    byCountry:
      type: array
      items:
        $ref: '#/AiVisibilityByCountryEntry'
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilityPaginatedResponse:
  type: object
  description: Generic paginated response for AI Visibility list endpoints
  properties:
    data:
      type: array
      items:
        type: object
        additionalProperties: true
    total:
      type: integer
      description: Total number of results matching the query
    offset:
      type: integer
    limit:
      type: integer
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilitySemrushCountry:
  type: string
  description: COUNTRY enum from ai-seo-ts common/types_pb
  enum:
    - UNKNOWN
    - AE
    - AU
    - BR
    - CA
    - DE
    - ES
    - FR
    - IN
    - IT
    - JP
    - MX
    - NL
    - SE
    - UK
    - US
    - AR
    - AT
    - BE
    - CH
    - CL
    - CO
    - DK
    - FI
    - IE
    - IL
    - NO
    - PA
    - PE
    - PL
    - UY
    - ZA
    - SA
    - HK
    - ID
    - KR
    - MY
    - PH
    - SG
    - TH
    - TR
    - TW
    - VN
    - WORLDWIDE

AiVisibilitySemrushDate:
  type: object
  description: Date message from ai-seo-ts common/types_pb
  properties:
    day:
      type: integer
    month:
      type: integer
    year:
      type: integer
  required: [day, month, year]
