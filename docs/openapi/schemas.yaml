      type: string
      example: 'Adobe Creative Cloud'
    volume:
      description: Updated volume or traffic context
      type: string
      example: 'high'
    importTime:
      description: Updated import time
      type: string
      format: date-time
      example: '2024-01-20T12:00:00Z'
    keyword:
      description: Updated associated keyword for the question
      type: string
      example: 'creative software'
    url:
      description: Updated URL context for the question
      type: string
      format: uri
      example: 'https://www.adobe.com/creativecloud.html'
    tags:
      description: Updated array of tags associated with the question
      type: array
      items:
        type: string
      example: ['product', 'pricing', 'features']
  additionalProperties: true

LlmoCustomerIntentItem:
  type: object
  description: A single customer intent key-value pair
  required:
    - key
    - value
  properties:
    key:
      description: The customer intent key identifier
      type: string
      example: 'target_audience'
    value:
      description: The customer intent value
      type: string
      example: 'small business owners'
  additionalProperties: false

LlmoCustomerIntent:
  type: array
  description: Array of customer intent key-value pairs
  items:
    $ref: '#/LlmoCustomerIntentItem'
  example:
    - key: 'target_audience'
      value: 'small business owners'
    - key: 'primary_goal'
      value: 'increase conversions'
    - key: 'user_persona'
      value: 'marketing director'

LlmoCustomerIntentInput:
  type: array
  description: Input format for adding new customer intent items
  items:
    $ref: '#/LlmoCustomerIntentItem'
  example:
    - key: 'target_audience'
      value: 'small business owners'
    - key: 'primary_goal'
      value: 'increase conversions'

LlmoCustomerIntentUpdate:
  type: object
  description: Update format for modifying an existing customer intent item
  properties:
    key:
      description: Updated customer intent key
      type: string
      example: 'updated_target_audience'
    value:
      description: Updated customer intent value
      type: string
      example: 'enterprise customers'
  additionalProperties: false

LlmoSheetRowUpdate:
  type: object
  description: |
    A single row update against an LLMO XLSX data sheet. The `match` keys identify
    exactly one row in the named worksheet; the `values` keys are written to that
    row. All keys in `match` and `values` must correspond to columns in the
    worksheet header row.
  required:
    - sheet
    - match
    - values
  properties:
    sheet:
      type: string
      description: Worksheet name within the XLSX (e.g. 'Semrush')
      example: 'Semrush'
    match:
      type: object
      description: Column-value pairs that must all match exactly one row
      additionalProperties:
        type: string
      example:
        topic_id: '14239648398373927587'
        prompt: "What's the best free online photo editor for non-designers?"
    values:
      type: object
      description: Column-value pairs to write to the matched row
      additionalProperties:
        type: string
      example:
        deleted: 'true'
  additionalProperties: false

LlmoSheetRowPatch:
  description: |
    Request body for a sheet-row PATCH. Either a single update at the top level, or
    a batch as `{ "updates": [...] }`. The batch form applies all updates against a
    single workbook download / upload / republish cycle and is strictly all-or-nothing:
    if any entry fails to match exactly one row, no rows are written.
  oneOf:
    - $ref: '#/LlmoSheetRowUpdate'
    - type: object
      required:
        - updates
      properties:
        updates:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/LlmoSheetRowUpdate'
      additionalProperties: false

LlmoSheetRowResult:
  type: object
  description: A single per-row result inside a sheet-row PATCH response.
  properties:
    sheet:
      type: string
      example: 'Semrush'
    rowNumber:
      type: integer
      description: 1-based Excel row number that was updated (header row is row 1)
      example: 42
    updated:
      type: object
      description: The column-value pairs that were written
      additionalProperties:
        type: string

LlmoSheetRowPatchResult:
  description: |
    Successful sheet-row PATCH response. For a single-update body, the row
    information is inlined at the top level (preserved for back-compat). For a
    batch body (`{ "updates": [...] }`), per-row results are returned in an
    `updates` array in input order.
  oneOf:
    - type: object
      required:
        - siteId
        - dataSource
        - sheet
        - rowNumber
      properties:
        siteId:
          type: string
          format: uuid
        sheetType:
          type: [string, 'null']
          description: Sheet type path segment, or null if the dataSource sits directly under dataFolder
          example: 'strategic-recommendations'
        dataSource:
          type: string
          example: 'strategic-recommendations-template'
        sheet:
          type: string
          example: 'Semrush'
        rowNumber:
          type: integer
          example: 42
        updated:
          type: object
          additionalProperties:
            type: string
    - type: object
      required:
        - siteId
        - dataSource
        - updates
      properties:
        siteId:
          type: string
          format: uuid
        sheetType:
          type: [string, 'null']
          example: 'strategic-recommendations'
        dataSource:
          type: string
          example: 'strategic-recommendations-template'
        updates:
          type: array
          items:
            $ref: '#/LlmoSheetRowResult'

LlmoCdnLogsFilter:
  type: array
  description: Array of CDN logs filter items
  items:
    type: object
    required:
      - key
      - value
    properties:
      key:
        type: string
        example: 'host'
      value:
        type: array
        items:
          type: string
        example: ['example.com', 'abc.com']
      type:
        type: string
        enum: ['include', 'exclude']
        example: 'include'
  example:
    - key: 'host'
      value: ['example.com', 'abc.com']
      type: 'include'
    - key: 'status'
      value: ['404', '500']
      type: 'exclude'

LlmoCdnBucketConfig:
  type: object
  description: CDN bucket configuration for LLMO
  properties:
    bucketName:
      description: The name of the S3 bucket for CDN logs
      type: string
      example: 'my-cdn-logs-bucket'
    orgId:
      description: The ID associated with the bucket, for adobe orgs this is the imsOrgId ID and for non-adobe orgs this is the org ID
      type: string
      example: 'org-12345'
    cdnProvider:
      description: The CDN provider (e.g., aem-cs-fastly, byocdn-fastly, etc.)
      type: string
      example: 'aem-cs-fastly'
  additionalProperties: false

LlmoConfig:
  type: object
  description: LLMO (Large Language Model Optimizer) configuration for a site
  required:
    - entities
    - categories
    - topics
    - aiTopics
    - brands
    - competitors
  properties:
    entities:
      type: object
      description: A record of entities keyed by UUID
      additionalProperties:
        $ref: '#/LlmoEntity'
      example:
        "123e4567-e89b-12d3-a456-426614174000":
          type: "category"
          name: "Technology"
    categories:
      type: object
      description: A record of categories keyed by UUID
      additionalProperties:
        $ref: '#/LlmoCategory'
      example:
        "123e4567-e89b-12d3-a456-426614174000":
          name: "Technology"
          region: "us"
          urls:
            - value: "https://example.com/tech"
              type: "url"
            - value: "https://example.com/technology/*"
              type: "prefix"
    topics:
      type: object
      description: A record of topics with nested prompts keyed by UUID
      additionalProperties:
        $ref: '#/LlmoTopic'
      example:
        "456e7890-e89b-12d3-a456-426614174001":
          name: "AI/ML"
          category: "123e4567-e89b-12d3-a456-426614174000"
          prompts:
            - prompt: "What are the latest AI trends?"
              regions: ["us"]
              origin: "human"
              source: "config"
    aiTopics:
      type: object
      description: A record of AI topics with nested AI prompts keyed by UUID
      additionalProperties:
        $ref: '#/LlmoTopic'
      example:
        "456e7890-e89b-12d3-a456-426614174001":
          name: "AI/ML"
          category: "123e4567-e89b-12d3-a456-426614174000"
          prompts:
            - prompt: "What are the latest AI trends?"
              regions: ["us"]
              origin: "ai"
              source: "config"
    brands:
      type: object
      description: Brand configuration with aliases
      required:
        - aliases
      properties:
        aliases:
          type: array
          description: Array of brand alias configurations
          items:
            $ref: '#/LlmoBrandAlias'
    competitors:
      type: object
      description: Competitor configuration
      required:
        - competitors
      properties:
        competitors:
          type: array
          description: Array of competitor configurations
          items:
            $ref: '#/LlmoCompetitor'
    deleted:
      type: object
      description: Deleted prompts configuration
      properties:
        prompts:
          type: object
          description: A record of deleted prompts keyed by UUID
          additionalProperties:
            $ref: '#/LlmoDeletedPrompt'
    ignored:
      type: object
      description: Ignored prompts configuration
      properties:
        prompts:
          type: object
          description: A record of ignored prompts keyed by UUID
          additionalProperties:
            $ref: '#/LlmoIgnoredPrompt'
    claims:
      $ref: '#/LlmoClaimsGuidance'
  additionalProperties: true

LlmoClaimsGuidance:
  type: object
  description: |
    Optional customer guidance for brand claims extraction and sentiment classification.
    Each field is limited to 4000 characters to keep downstream LLM prompts bounded.
    Guidance text is stored for processing but is never written to application logs.
  properties:
    brandContext:
      type: string
      maxLength: 4000
      description: Customer-provided brand context used as background guidance for claims extraction.
      example: "Treat Firefly as part of the Adobe product family."
    sentimentGuidance:
      type: string
      maxLength: 4000
      description: Customer-provided guidance for interpreting claim sentiment.
      example: "Claims about setup friction should be classified as unfavorable."
  # Keep claims guidance closed because these free-text fields are passed to downstream LLM prompts.
  additionalProperties: false

LlmoDeletedPrompt:
  type: object
  description: A deleted prompt entry in the LLMO configuration
  required:
    - prompt
    - regions
    - origin
    - source
    - topic
    - category
  properties:
    prompt:
      type: string
      description: The prompt text
      minLength: 1
    regions:
      type: array
      description: Array of two-letter region codes
      items:
        type: string
        pattern: '^[a-z][a-z]$'
    origin:
      type: string
      description: The origin of the prompt (human, ai, or custom)
    source:
      type: string
      description: The source of the prompt (config, api, or custom)
    topic:
      type: string
      description: The topic name this prompt belonged to
      minLength: 1
    category:
      type: string
      description: The category name this prompt belonged to
      minLength: 1
    categoryId:
      type: string
      format: uuid
      description: Optional UUID of the category
    updatedBy:
      type: string
      description: The user who last updated this entry
    updatedAt:
      type: string
      description: ISO timestamp of the last update
  additionalProperties: true

LlmoIgnoredPrompt:
  type: object
  description: An ignored prompt entry in the LLMO configuration
  required:
    - prompt
    - region
    - source
  properties:
    prompt:
      type: string
      description: The prompt text
      minLength: 1
    region:
      type: string
      pattern: '^[a-z][a-z]$'
      description: Two-letter region code
    source:
      type: string
      description: The source of the prompt (gsc or custom)
    updatedBy:
      type: string
      description: The user who last updated this entry
    updatedAt:
      type: string
      description: ISO timestamp of the last update
  additionalProperties: true

LlmoEntity:
  type: object
  description: An entity in the LLMO configuration
  required:
    - type
  properties:
    type:
      type: string
      description: The type of entity (category, topic, or custom type)
      example: "category"
    name:
      type: string
      description: The name of the entity (required for category and topic types)
      minLength: 1
      example: "Technology"
  additionalProperties: true

LlmoCategory:
  type: object
  description: A category in the LLMO configuration
  required:
    - name
    - region
  properties:
    name:
      type: string
      description: The name of the category
      minLength: 1
      example: "Technology"
    region:
      oneOf:
        - type: string
          pattern: '^[a-z][a-z]$'
          description: Two-letter region code
          example: "us"
        - type: array
          items:
            type: string
            pattern: '^[a-z][a-z]$'
          description: Array of two-letter region codes
          example: ["us", "eu"]
    urls:
      type: array
      description: Optional array of URLs associated with this category
      items:
        $ref: '#/LlmoCategoryUrl'
      example:
        - value: "https://example.com/tech"
          type: "url"
        - value: "https://example.com/news/*"
          type: "prefix"
  additionalProperties: true

LlmoCategoryUrl:
  type: object
  description: A URL configuration for a category
  required:
    - value
    - type
  properties:
    value:
      type: string
      description: The URL value - can be a complete URL or a URL prefix
      minLength: 1
      example: "https://example.com/tech"
    type:
      type: string
      enum: ["url", "prefix"]
      description: The type of URL - 'url' for exact URLs, 'prefix' for URL prefixes (ending with /*)
      example: "url"
  additionalProperties: false

LlmoTopic:
  type: object
  description: A topic in the LLMO configuration with nested prompts
  required:
    - name
    - prompts
    - category
  properties:
    name:
      type: string
      description: The name of the topic
      minLength: 1
      example: "AI/ML"
    prompts:
      type: array
      description: Array of prompts for this topic
      minItems: 1
      items:
        $ref: '#/LlmoPrompt'
    category:
      oneOf:
        - type: string
          format: uuid
          description: UUID reference to a category
          example: "123e4567-e89b-12d3-a456-426614174000"
        - type: string
          description: Category name as string
          minLength: 1
          example: "Technology"
  additionalProperties: true

LlmoPrompt:
  type: object
  description: A prompt configuration within a topic
  required:
    - prompt
    - regions
    - origin
    - source
  properties:
    prompt:
      type: string
      description: The prompt text
      minLength: 1
      example: "What are the latest AI trends?"
    regions:
      type: array
      description: Array of two-letter region codes
      items:
        type: string
        pattern: '^[a-z][a-z]$'
      example: ["us", "eu"]
    origin:
      oneOf:
        - type: string
          enum: ["human", "ai"]
          description: Standard origin types
        - type: string
          description: Custom origin type
          minLength: 1
      example: "human"
    source:
      oneOf:
        - type: string
          enum: ["config", "api"]
          description: Standard source types
        - type: string
          description: Custom source type
          minLength: 1
      example: "config"
  additionalProperties: true

LlmoBrandAlias:
  type: object
  description: A brand alias configuration
  required:
    - aliases
    - category
    - region
  properties:
    aliases:
      type: array
      description: Array of brand alias strings
      items:
        type: string
        minLength: 1
      example: ["Adobe", "Adobe Inc"]
    category:
      type: string
      format: uuid
      description: UUID reference to a category entity
      example: "123e4567-e89b-12d3-a456-426614174000"
    region:
      oneOf:
        - type: string
          pattern: '^[a-z][a-z]$'
          description: Two-letter region code
          example: "us"
        - type: array
          items:
            type: string
            pattern: '^[a-z][a-z]$'
          description: Array of two-letter region codes
          example: ["us", "eu"]

LlmoCompetitor:
  type: object
  description: A competitor configuration
  required:
    - category
    - region
    - name
    - aliases
  properties:
    category:
      type: string
      format: uuid
      description: UUID reference to a category entity
      example: "123e4567-e89b-12d3-a456-426614174000"
    region:
      oneOf:
        - type: string
          pattern: '^[a-z][a-z]$'
          description: Two-letter region code
          example: "us"
        - type: array
          items:
            type: string
            pattern: '^[a-z][a-z]$'
          description: Array of two-letter region codes
          example: ["us", "eu"]
    name:
      type: string
      description: The competitor name
      minLength: 1
      example: "Microsoft"
    aliases:
      type: array
      description: Array of competitor alias strings
      items:
        type: string
        minLength: 1
      example: ["MS", "Microsoft Corp"]
    urls:
      type: array
      description: Array of competitor URLs (optional)
      items:
        type: string
        format: uri
      example: ["https://microsoft.com", "https://office.com"]

LlmoSheetDataQuery:
  type: object
  description: Query parameters for LLMO sheet data
  properties:
    sheets:
      description: Sheets to include from the data
      type: object
      additionalProperties: true
    filters:
      description: Filters to apply to the data
      type: object
    include:
      description: Fields to include from the data
      type: array
      additionalProperties: true
    exclude:
      description: Fields to exclude from the data
      type: array
      items:
        type: string
    groupBy:
      description: Fields to group the data by
      type: array
      items:
        type: string
  additionalProperties: false

# New schemas for entitlements, trial users, and site enrollments APIs
Entitlement:
  type: object
  description: An entitlement represents product access and quotas for an organization

  properties:
    id:
      description: Unique identifier for the entitlement
      $ref: '#/Id'
    organizationId:
      description: Reference to the organization this entitlement belongs to
      $ref: '#/Id'
    productCode:
      description: The product code this entitlement provides access to
      type: string
      enum: [LLMO, ASO, ACO]
    tier:
      description: The tier level of the entitlement
      type: string
      enum: [FREE_TRIAL, PAID]
    quotas:
      description: Usage quotas and limits for the entitlement
      type: object
      properties:
        llmo_trial_prompts:
          type: number
          description: Number of LLMO trial prompts available
    createdAt:
      description: When the entitlement was created
      $ref: '#/DateTime'
    updatedAt:
      description: When the entitlement was last updated
      $ref: '#/DateTime'
    updatedBy:
      description: Who last updated the entitlement
      $ref: '#/Id'

  example:
    id: "123e4567-e89b-12d3-a456-426614174000"
    organizationId: "987fcdeb-51a2-43d7-9876-543210987654"
    productCode: "LLMO"
    tier: "FREE_TRIAL"
    quotas:
      llmo_trial_prompts: 100
    createdAt: "2024-01-15T10:30:00Z"
    updatedAt: "2024-01-15T10:30:00Z"
    updatedBy: "system"

FeatureFlagProduct:
  type: string
  description: Product surface for org-scoped feature flags (matches mysticat enum)
  enum: [ASO, LLMO]

FeatureFlag:
  type: object
  description: Org-scoped boolean feature flag (mysticat `feature_flags`)
  properties:
    id:
      description: Row id (UUIDv7)
      $ref: '#/Id'
    organizationId:
      description: Organization id (SpaceCat / mysticat `organizations.id`)
      $ref: '#/Id'
    product:
      $ref: '#/FeatureFlagProduct'
    flagName:
      description: Stable flag key
      type: string
    flagValue:
      description: Whether the flag is enabled
      type: boolean
    createdAt:
      $ref: '#/DateTime'
    updatedAt:
      $ref: '#/DateTime'
    updatedBy:
      description: IMS user id, service id, or similar; who last changed the row
      oneOf:
        - type: string
        - type: 'null'

FeatureFlagList:
  type: array
  items:
    $ref: '#/FeatureFlag'

AgenticTrafficGlobalWeek:
  type: object
  description: Weekly aggregate global agentic traffic row from mysticat `agentic_traffic_global`
  properties:
    id:
      $ref: '#/Id'
    year:
      type: integer
      minimum: 2000
      maximum: 9999
    week:
      type: integer
      minimum: 1
      maximum: 53
    hits:
      type: integer
      minimum: 0
    createdAt:
      $ref: '#/DateTime'
    updatedAt:
      $ref: '#/DateTime'
    updatedBy:
      oneOf:
        - type: string
        - type: 'null'
  required:
    - id
    - year
    - week
    - hits
    - createdAt
    - updatedAt

AgenticTrafficGlobalWeekList:
  type: array
  items:
    $ref: '#/AgenticTrafficGlobalWeek'

AgenticTrafficGlobalWeekUpsert:
  type: object
  properties:
    year:
      type: integer
      minimum: 2000
      maximum: 9999
    week:
      type: integer
      minimum: 1
      maximum: 53
    hits:
      type: integer
      minimum: 0
  required:
    - year
    - week
    - hits

SiteEnrollment:
  type: object
  description: A site enrollment represents a site's participation in a product or service

  properties:
    id:
      description: Unique identifier for the site enrollment
      $ref: '#/Id'
    siteId:
      description: Reference to the site this enrollment belongs to
      $ref: '#/Id'
    entitlementId:
      description: Reference to the entitlement this enrollment is based on
      $ref: '#/Id'
    createdAt:
      description: When the site enrollment was created
      $ref: '#/DateTime'
    updatedAt:
      description: When the site enrollment was last updated
      $ref: '#/DateTime'
    updatedBy:
      description: Who last updated the site enrollment
      $ref: '#/Id'
  example:
    id: "123e4567-e89b-12d3-a456-426614174000"
    siteId: "987fcdeb-51a2-43d7-9876-543210987654"
    entitlementId: "456e4567-e89b-12d3-a456-426614174000"
    createdAt: "2024-01-15T10:30:00Z"
    updatedAt: "2024-01-15T10:30:00Z"
    updatedBy: "system"

TrialUser:
  type: object
  description: A trial user represents a user participating in a trial program

  properties:
    id:
      description: Unique identifier for the trial user
      $ref: '#/Id'
    organizationId:
      description: Reference to the organization this trial user belongs to
      $ref: '#/Id'
    emailId:
      description: Email ID of the trial user
      type: string
      format: email
      example: 'user123@adobe.com'
    firstName:
      description: First name of the trial user
      type: string
      example: 'John'
    lastName:
      description: Last name of the trial user
      type: string
      example: 'Doe'
    externalUserId:
      description: External user ID from the identity provider
      type: string
      example: '1234567890'
    provider:
      description: The identity provider (IMS, Microsoft, Google, etc.)
      type: string
      example: 'IMS'
    status:
      description: Current status of the trial user
      type: string
      enum: [INVITED, REGISTERED, BLOCKED, DELETED]
    lastSeenAt:
      description: When the trial user was last seen/active
      $ref: '#/DateTime'
    metadata:
      description: Additional metadata for the trial user
      type: object
      properties:
        origin:
          description: Origin information for the trial user (e.g., "INVITED", "SELF_SIGNUP", "PARTNER")
