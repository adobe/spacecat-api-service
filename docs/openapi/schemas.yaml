HoolihanEvents:
  type: array
  items:
    $ref: '#/HoolihanEvent'
ProcessingStatus:
  type: string
  enum:
    - 'accepted'
    - 'rejected'
  example: 'accepted'
FulfillmentProcessingResults:
  type: array
  items:
    type: object
    required:
      - status
    properties:
      status:
        description: The acceptance status (whether or not the event was accepted for processing)
        $ref: '#/ProcessingStatus'
      requestId:
        description: The request ID
        $ref: '#/Id'
  example:
    - status: 'accepted'
      requestId: '123e4567-e89b-12d3-a456-426614174000'
    - status: 'rejected'
CDNXForwardedHostAlert:
  type: object
  additionalProperties: true
  properties:
    forwardedHost:
      description: value of x-forwarded-host header in the CDN log which trggered the domain discovery alert
      type: string
      example: 'blog.adobe.com, main--blog--adobecom.hlx.live, main--blog--adobecom.hlx.live, main--blog--adobecom.hlx-fastly.page'
RUMDomainDiscoveryAlert:
  type: object
  additionalProperties: true
  properties:
    url:
      description: URL of the page which triggered the domain discovery alert
      $ref: '#/URL'
    domain:
      description: Domain of the page which triggered the domain discovery alert
      $ref: '#/Domain'
SlackInviteToChannelByUserIdRequest:
  type: object
  required:
    - imsOrgId
    - imsUserAccessToken
  properties:
    imsOrgId:
      description: The ID of the Adobe IMS organization
      $ref: '#/ImsOrganizationId'
    imsUserAccessToken:
      description: The IMS access token of the user to invite to the Slack channel
      $ref: '#/ImsUserAccessToken'
Configuration:
  type: object
  properties:
    version:
      type: string
      readOnly: true
      description: Internal version of the configuration, managed and incremented by the system. Not exposed for external control via the API.
    jobs:
      type: array
      items:
        $ref: '#/Job'
      description: A list of job configurations, detailing job type, its group, and execution interval.
    queues:
      type: object
      properties:
        audits:
          type: string
          format: url
          description: The SQS queue name for audit jobs
        imports:
          type: string
          format: url
          description: The SQS queue name for import jobs
        reports:
          type: string
          format: url
          description: The SQS queue name for report jobs
Job:
  type: object
  properties:
    group:
      type: string
      description: The group or category to which the job belongs, helping in organizing jobs by their functional area.
    interval:
      type: string
      description: Specifies how often the job should run, e.g., 'daily'. This is part of job scheduling information.
    type:
      type: string
      description: The job type, indicating the specific action or task that the job performs, such as 'rum-to-aa' indicating a data import job from RUM to AA.
AnalyticsSiteIntegration:
  type: object
  additionalProperties: true
  required:
    - siteId
    - reporting
    - dataCollection
    - dataStore
    - dataMapping
  properties:
    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    reporting:
      description: The reporting details
      type: object
      required:
        - link
      additionalProperties: true
      properties:
        link:
          description: |
            The link to the report in the reporting tool.
            For Adobe Analytics and Customer Journey Analytics, the link to the Analysis Workspace report.
          $ref: '#/URL'
        timezone:
          description: The timezone for the data in the report
          type: string
    dataCollection:
      description: The configuration for the data collection to embed on the site.
      type: object
      required:
        - type
        - environments
      properties:
        type:
          description: The type of the data collection
          type: string
          enum:
            - 'adobe-tags'
            - 'aep-websdk'
        environments:
          description: |
            The environments for the data collection script.
            At least the script for the production environment is required.
            The keys represent the environments (development, staging, production).
            The values represent the URL or ID of the data collection script.
            For Adobe Analytics and Customer Journey Analytics, the values are either
            URL for the Adobe Launch script or the datastream ID.
          type: object
          additionalProperties:
            type: string
          required:
            - production
          properties:
            production:
              description: The URL or ID of the production data collection script
              type: string
    dataStore:
      description: The data store details
      type: object
      required:
        - id
        - type
      additionalProperties: true
      properties:
        id:
          description: The ID of the data store
          type: string
        type:
          description: The type of the data store
          type: string
          enum:
            - 'adobe-analytics'
            - 'aep'
    dataSchema:
      description: The data schema details
      type: object
      required:
        - id
      additionalProperties: true
      properties:
        id:
          description: The ID of the data schema
          type: string
    dataMapping:
      description: The data mapping details
      type: object
      required:
        - type
        - mappings
      properties:
        type:
          description: The type of the data mapping
          type: string
          enum:
            - 'adobe-analytics'
            - 'xdm'
        mappings:
          description: |
            The data mapping details. The keys represent human-friendly naming of metrics and dimensions captured by the
            instrumentation of the site. The values represent the corresponding metric and dimension names in the data store.
            For Adobe Analytics, the values are either evars or events.
            For XDM, the values are the paths in the data schema.
          type: object
          additionalProperties:
            type: string
  examples:
    - analytics-site-integration-aa-tags:
        $ref: './examples.yaml#/analytics-site-integration-aa-tags'
    - analytics-site-integration-aa-aep-websdk:
        $ref: './examples.yaml#/analytics-site-integration-aa-aep-websdk'
    - analytics-site-integration-cja-tags:
        $ref: './examples.yaml#/analytics-site-integration-cja-tags'
    - analytics-site-integration-cja-websdk:
        $ref: './examples.yaml#/analytics-site-integration-cja-websdk'
SiteTopPage:
  type: object
  required:
    - siteId
    - url
    - traffic
    - source
    - geo
    - importedAt
  properties:
    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    url:
      description: The URL of the top page
      $ref: '#/URL'
    traffic:
      description: The traffic of the top page
      type: integer
    source:
      description: The source of the top page listing
      type: string
    geo:
      description: The geo of the top page listing, or 'global' if not specific to a geo
      type: string
    importedAt:
      description: The date and time when the top page was imported
      $ref: '#/DateTime'
  example:
    siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    url: 'https://example-site.com/foo/bar'
    traffic: 360420000
    source: 'seo'
    geo: 'au'
    importedAt: '2024-04-29T15:14:33.653Z'
SiteTopPageList:
  type: array
  items:
    $ref: './schemas.yaml#/SiteTopPage'
AuditUrl:
  type: object
  required:
    - siteId
    - url
    - byCustomer
    - audits
    - createdAt
    - updatedAt
    - createdBy
    - updatedBy
  description: |
    AuditUrl entity representing a URL to be audited.
    Primary key is composite: siteId + url (no separate id field).
  properties:
    siteId:
      description: Parent site identifier
      $ref: '#/Id'
    url:
      description: URL after canonicalization
      $ref: '#/URL'
    byCustomer:
      description: Whether the URL was added by a customer (true) or system (false)
      type: boolean
      default: true
      example: true
    audits:
      description: Enabled audit types
      type: array
      uniqueItems: true
      items:
        type: string
      example: ['accessibility', 'broken-backlinks']
    createdAt:
      description: ISO 8601 timestamp when created
      $ref: '#/DateTime'
    updatedAt:
      description: ISO 8601 timestamp when last modified
      $ref: '#/DateTime'
    createdBy:
      description: User/service who created this URL
      type: string
      example: user-alice
    updatedBy:
      description: Last user/service to modify this URL
      type: string
      example: user-bob
  example:
    siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    url: 'https://example.com/documents/report.pdf'
    byCustomer: true
    audits: ['accessibility', 'broken-backlinks']
    createdAt: '2025-10-10T12:00:00Z'
    updatedAt: '2025-10-10T15:30:00Z'
    createdBy: 'user-alice'
    updatedBy: 'user-bob'
AuditUrlInput:
  type: object
  required:
    - url
    - audits
  properties:
    url:
      description: The URL to add
      $ref: '#/URL'
    byCustomer:
      description: Whether the URL was added by a customer (true) or system (false). Defaults to true.
      type: boolean
      default: true
    audits:
      description: Enabled audit types
      type: array
      uniqueItems: true
      items:
        type: string
      example: ['accessibility', 'broken-backlinks']
  example:
    url: 'https://example.com/page1.html'
    byCustomer: true
    audits: ['accessibility', 'broken-backlinks']
AuditUrlUpdate:
  type: object
  required:
    - url
    - audits
  properties:
    url:
      description: The URL to update
      $ref: '#/URL'
    audits:
      description: Enabled audit types (overrides existing)
      type: array
      uniqueItems: true
      items:
        type: string
      example: ['accessibility']
  example:
    url: 'https://example.com/page1.html'
    audits: ['accessibility']
AuditUrlListResponse:
  type: object
  required:
    - items
    - pagination
  properties:
    items:
      type: array
      items:
        $ref: './schemas.yaml#/AuditUrl'
    pagination:
      type: object
      required:
        - limit
        - hasMore
      properties:
        limit:
          type: integer
          description: Number of items per page
        cursor:
          type: string
          description: Pagination cursor for next page (null when no more data)
        hasMore:
          type: boolean
          description: Whether more items are available
  example:
    items:
      - siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
        url: 'https://example.com/page1.html'
        byCustomer: true
        audits: ['accessibility']
        createdAt: '2025-10-10T12:00:00Z'
        updatedAt: '2025-10-10T15:30:00Z'
        createdBy: 'user-alice'
        updatedBy: 'user-bob'
    pagination:
      limit: 100
      cursor: 'eyJsYXN0S2V5Ijp7InNpdGVJZCI6ImV4YW1wbGUtY29tIn19'
      hasMore: true
AuditUrlBulkResponse:
  type: object
  required:
    - metadata
    - failures
    - items
  properties:
    metadata:
      type: object
      required:
        - total
        - success
        - failure
      properties:
        total:
          type: integer
          description: Total number of URLs in the request
        success:
          type: integer
          description: Number of successfully processed URLs
        failure:
          type: integer
          description: Number of failed URLs
    failures:
      type: array
      items:
        type: object
        required:
          - url
          - reason
        properties:
          url:
            type: string
          reason:
            type: string
      description: Per-item error information
    items:
      type: array
      items:
        $ref: './schemas.yaml#/AuditUrl'
      description: Successfully processed URLs
  example:
    metadata:
      total: 3
      success: 2
      failure: 1
    failures:
      - url: 'https://example.com/invalid'
        reason: 'Invalid URL format'
    items:
      - siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
        url: 'https://example.com/page1.html'
        byCustomer: true
        audits: ['accessibility']
        createdAt: '2025-10-10T12:00:00Z'
        updatedAt: '2025-10-10T15:30:00Z'
        createdBy: 'user-alice'
        updatedBy: 'user-bob'
AuditUrlDeleteResponse:
  type: object
  required:
    - metadata
    - failures
  properties:
    metadata:
      type: object
      required:
        - total
        - success
        - failure
      properties:
        total:
          type: integer
          description: Total number of URLs in the request
        success:
          type: integer
          description: Number of successfully deleted URLs
        failure:
          type: integer
          description: Number of failed deletions
    failures:
      type: array
      items:
        type: object
        required:
          - url
          - reason
        properties:
          url:
            type: string
          reason:
            type: string
      description: Per-item error information
  example:
    metadata:
      total: 3
      success: 2
      failure: 1
    failures:
      - url: 'https://example.com/from-sitemap'
        reason: 'Can only delete customer-added URLs (byCustomer: true)'
SiteExperimentVariant:
  type: object
  properties:
    name:
      description: The name of the variant
      type: string
    label:
      description: The label of the variant
      type: string
    split:
      description: The split allocation of the traffic to the variant
      type: number
    url:
      description: The url of the variant
      $ref: '#/URL'
    views:
      description: The number of views for the variant
      type: integer
    samples:
      description: The number of data points (samples) used for this variant
      type: integer
    interactionsCount:
      description: The interactions count for the variant
      type: integer
    p_value:
      description: The p-value of the variant for the configured metric or clicks
      type: number
    power:
      description: The power of the variant for the configured metric or clicks
      type: number
    statsig:
      description: The statistical significance of the variant based on the configured metric or clicks
      type: boolean
    metrics:
      description: The metrics for the variant
      type: array
      items:
        type: object
        properties:
          selector:
            description: The css selector of the element on which the interaction was performed
            type: string
          value:
            description: The value of the metric on the selector
            type: number
          samples:
            description: The number of data points (samples) used for calculating this metric object
            type: integer
          type:
            description: The type of the metric
            type: string
            enum:
              - 'click'
              - 'convert'
              - 'formsubmit'
  example:
    name: 'challenger-1'
    label: 'Challenger 1'
    split: 0.5
    url: 'https://example-site.com/foo/bar'
    views: 1000
    samples: 10
    interactionsCount: 200
    p_value: 0.04
    power: 97.6
    statsig: true
    metrics:
      - selector: '.add-to-cart'
        value: 300
        samples: 3
        type: 'click'
SiteExperiment:
  type: object
  properties:
    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    experimentId:
      description: The ID of the experiment
      type: string
    name:
      description: The name of the experiment
      type: string
    url:
      description: The URL of the experiment
      $ref: '#/URL'
    status:
      description: The status of the experiment
      type: string
      enum:
        - 'ACTIVE'
        - 'COMPLETE'
        - 'INACTIVE'
    type:
      description: The type of the experiment
      type: string
      enum:
        - 'FULL'
        - 'AB'
        - 'MAB'
    startDate:
      description: The start date and time of the experiment
      $ref: '#/DateTime'
    endDate:
      description: The end date and time of the experiment
      $ref: '#/DateTime'
    variants:
      description: The variants of the experiment
      type: array
      items:
        $ref: './schemas.yaml#/SiteExperimentVariant'
    updatedAt:
      description: The date and time when the experiment was last updated
      $ref: '#/DateTime'
    updatedBy:
      description: The user/entity who last updated the experiment
      type: string
    conversionEventName:
      description: The name of the conversion event
      type: string
    conversionEventValue:
      description: The name of conversion event value
      type: string
  example:
    siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    experimentId: '1012-home-page-optimization'
    name: '1012 Home Page Optimization'
    url: 'https://example-site.com/foo/bar'
    type: 'AB'
    status: 'ACTIVE'
    startDate: '2024-04-29T15:14:33.653Z'
    endDate: '2024-05-29T15:14:33.653Z'
    variants:
      - name: 'challenger-1'
        label: 'Challenger 1'
        split: 0.5
        url: 'https://example-site.com/foo/bar'
        views: 1000
        samples: 10
        interactionsCount: 200
        p_value: 0.04
        power: 97.6
        statsig: true
        metrics:
          - selector: '.add-to-cart'
            value: 300
            samples: 3
            type: 'click'
    updatedAt: '2024-05-31T15:14:33.653Z'
    updatedBy: 'admin'
    conversionEventName: 'click'
    conversionEventValue: '.add-to-cart'
SiteExperimentList:
  type: array
  items:
    $ref: './schemas.yaml#/SiteExperiment'
SiteMetric:
  type: object
  required:
    - siteId
    - source
    - name
    - value
    - time
