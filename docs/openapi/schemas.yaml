    fileName:
      type: string
      description: Suggested CSV file name from `ExportResponse.file_name`.
      example: brand-topics.csv
    contentType:
      type: string
      description: MIME type from `ExportResponse.content_type`.
      example: text/csv
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilityV1TopicBrandTopicsTotalsResponse:
  type: object
