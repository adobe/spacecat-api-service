V2Category:
  type: object
  description: A category in the normalized categories table
  required:
    - id
    - uuid
    - name
    - status
    - origin
  properties:
    id:
      type: string
      format: uuid
      description: |
        UUID primary key (categories.id) — the sole category identifier.
        Use this value on the CRUD path params and the `?categoryId=` prompt
        filter. The legacy category_id business key was retired (LLMO-5515).
      example: 'a1b2c3d4-5678-90ab-cdef-1234567890ab'
    uuid:
      type: string
      format: uuid
      description: UUID primary key (categories.id). Alias of `id`.
    name:
      type: string
      description: |
        Human-readable category name. Stored canonicalized (trim +
        whitespace-collapse + NFC). Matching on POST is case-insensitive.
      example: 'Discovery & Research'
    status:
      type: string
      enum: [active, pending, deleted, ignored]
      description: Category status
      example: 'active'
    origin:
      type: string
      enum: [human, ai]
      description: |
        Provenance of this category. `human` is sticky — idempotent reposts
        with `origin: ai` do NOT downgrade a human-curated category.
      example: 'human'
    createdAt:
      type: string
      format: date-time
      description: Creation timestamp
    createdBy:
      type: string
      description: User or system that created the category
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp
    updatedBy:
      type: string
      description: User or system that last updated the category

V2CategoryInput:
  type: object
  description: |
    Request body for creating a category. POST is idempotent by name — see
    `categories-v2-api.yaml` for the 200/201 semantics and the provenance
    guard on `origin`.
  required:
    - name
  properties:
    name:
      type: string
      description: Human-readable category name. Canonicalized on write.
      example: 'Discovery & Research'
    origin:
      type: string
      enum: [human, ai]
      default: 'human'
      description: |
        Provenance. Subject to the human→ai downgrade guard on existing rows.
    status:
      type: string
      enum: [active, pending, ignored]
      default: 'active'

V2CategoryUpdateInput:
  type: object
  description: Request body for updating a category (partial update).
  properties:
    name:
      type: string
      description: Human-readable category name. Canonicalized on write.
    origin:
      type: string
      enum: [human, ai]
    status:
      type: string
      enum: [active, pending, deleted, ignored]

