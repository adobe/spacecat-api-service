AiVisibilitySemrushTopicIntent:
  type: string
  description: TOPIC_INTENT from ai-seo-ts common/types_pb
  enum:
    - UNSPECIFIED
    - TASK
    - INFORMATIONAL
    - NAVIGATIONAL
    - COMMERCIAL
    - TRANSACTIONAL

AiVisibilitySemrushLlm:
  type: string
  description: LLM enum from ai-seo-ts common/types_pb (response fields; query engine uses UI slugs).
  enum:
    - UNSPECIFIED
    - CHAT_GPT
    - GOOGLE_AI_OVERVIEW
    - GOOGLE_AI_MODE
    - GEMINI
    - ALL

AiVisibilitySemrushPromptCategory:
  type: string
  description: PROMPT_CATEGORY from ai-seo-ts v2/prompt/enums_pb
  enum:
    - UNSPECIFIED
    - MENTIONS_TARGET
    - MISSES_TARGET
    - CITES_TARGET

AiVisibilitySemrushBrand:
  type: object
  description: Brand from ai-seo-ts common/types_pb
