BrandProfile:
  type: object
  description: The brand voice profile generated by the brand-profile agent. Note this schema contains a representative subset; additional fields may be added over time.
  properties:
    version:
      type: integer
      description: Incrementing version whenever the profile changes
      example: 3
    updatedAt:
      $ref: '#/DateTime'
      description: ISO timestamp for the last update
    contentHash:
      type: string
      description: Deterministic hash of the profile content used for change detection
    summary:
      type: string
      description: Short description of the profile or summary text
    discovery:
      type: object
      additionalProperties: true
      description: Discovery data such as site coverage, URL structure, analyzed sections, etc.
      example:
        url_structure:
          main_sections:
            - '/'
            - '/products'
    clustering:
      type: object
      additionalProperties: true
      description: Voice clustering output.
    competitiveContext:
      type: object
      additionalProperties: true
      description: Competitive positioning and comparative insights.
    mainProfile:
      type: object
      additionalProperties: true
      description: Primary brand voice profile (tone, vocabulary, guidelines, etc.).
    subBrands:
      type: array
      description: Optional sub-brand voice profiles.
      items:
        type: object
        additionalProperties: true
    metadata:
      type: object
      additionalProperties: true
      description: Free-form metadata bucket for future extensions.
BotBlockerResult:
  type: object
  description: Result of bot blocker detection for a site. Indicates whether the site is crawlable by bots, what type of blocking was detected (if any), and the confidence level of the detection.
  properties:
    crawlable:
      type: boolean
      description: Whether the site can be crawled by bots
      example: false
    type:
      type: string
      description: The type of bot blocker detected or infrastructure present
      enum:
        - 'cloudflare'
        - 'imperva'
        - 'akamai'
        - 'fastly'
        - 'cloudfront'
        - 'cloudflare-allowed'
        - 'imperva-allowed'
        - 'akamai-allowed'
        - 'fastly-allowed'
        - 'cloudfront-allowed'
        - 'http2-block'
        - 'none'
        - 'unknown'
      example: 'cloudflare'
    confidence:
      type: number
      format: float
      minimum: 0
      maximum: 1
      description: Confidence level of the detection (0.0 to 1.0). Values >= 0.95 indicate reliable detection. Lower values suggest uncertain situations.
      example: 0.99
    reason:
      type: string
      description: Optional reason or additional context for the detection result
      example: 'HTTP 403 Forbidden - access denied'
  required:
    - crawlable
    - type
    - confidence
Id:
  type: string
  format: uuid
  readOnly: true
  example: '123e4567-e89b-12d3-a456-426614174000'
BrandId:
  type: string
  format: urn
  readOnly: true
  example: 'urn:aaid:sc:VA6C2:e64205e7-13ca-51e8-8b83-8d8ef1ebf911'
DateTime:
  type: string
  format: date-time
  example: '2024-01-19T14:20:30Z'
DeliveryType:
  type: string
  enum:
    - 'aem_edge'
    - 'aem_cs'
    - 'other'
  example: 'aem_edge'
DeliveryConfig:
  type: object
  properties:
    programId:
      description: The program ID
      type: string
      example: '12652'
    environmentId:
      description: The environment ID
      type: string
      example: '16854'
    authorURL:
      description: The author URL
      type: string
      format: url
      example: 'https://author-p12652-e16854-cmstg.adobeaemcloud.com/'
    siteId:
      description: The site ID
      type: string
      example: '1234'
    contentSourcePath:
      description: >-
        AEM content root path for a site. Corresponds to `/content/<site-name>` in the AEM repository.
        Used to disambiguate multiple sites that share the same Cloud Manager program and environment.
      type: string
      example: '/content/aboutus'
  additionalProperties: true
AuditType:
  type: string
  enum:
    - '404'
    - 'apex'
    - 'cwv'
    - 'lhs'
    - 'lhs-desktop'
    - 'lhs-mobile'
    - 'broken-backlinks'
    - 'canonical'
    - 'sitemap'
    - 'structured-data'
    - 'costs'
    - 'meta-tags'
    - 'product-metatags'
    - 'commerce-product-enrichments'
    - 'broken-internal-links'
    - 'experimentation-opportunities'
    - 'llm-error-pages'
    - 'prerender'
    - 'related-urls'
    - 'summarization'
    - 'faqs'
    - 'money-pages'
  example: 'cwv'
URL:
  type: string
  format: url
  example: 'https://www.example.com'
Domain:
  type: string
  format: domain
  example: 'www.example.com'
ScopeName:
  type: string
  enum:
    - 'imports.write'
    - 'imports.read'
ImsOrganizationId:
  type: string
  example: '1234567890ABCDEF12345678@AdobeOrg'
SemrushWorkspaceId:
  type: string
  description: |
    Semrush workspace identifier mapped to this Adobe organization.
    UNIQUE across organizations (DB-enforced). Setting this field via
    PATCH is restricted to admin users.
  example: 'ws_12345'
ImsUserAccessToken:
  type: string
  example: 'eyJhbGciOiJIUzI1NiJ9.eyJpZCI6IjEyMzQ1IiwidHlwZSI6ImFjY2Vzc190b2tlbiIsImNsaWVudF9pZCI6ImV4YW1wbGVfYXBwIiwidXNlcl9pZCI6Ijk4NzY1NDc4OTBBQkNERUYxMjM0NTY3OEBhYmNkZWYxMjM0NTY3ODkuZSIsImFzIjoiaW1zLW5hMSIsImFhX2lkIjoiMTIzNDU2Nzg5MEFCQ0RFRjEyMzQ1Njc4QGFkb2JlLmNvbSIsImNyZWF0ZWRfYXQiOiIxNzEwMjQ3MDAwMDAwIn0.MRDpxgxSHDj4DmA182hPnjMAnKkly-VUJ_bXpQ-J8EQ'
SlackMentionConfig:
  type: object
  properties:
    slack:
      type: array
      items:
        type: string
HandlerConfig:
  type: object
  additionalProperties: false
  properties:
    mentions:
      $ref: '#/SlackMentionConfig'
    excludedURLs:
      description: URLs to be excluded from the handler's processing
      type: array
      items:
        type: string
        format: uri
    includedURLs:
      description: URLs to be included in the handler's processing
      type: array
      items:
        type: string
        format: uri
    groupedURLs:
      description: List of grouped URL patterns for categorization. Each entry should include a name and a URL pattern. If empty, previously grouped URLs will be removed
      type: array
      items:
        type: object
        properties:
          name:
            description: Name of the URL group
            type: string
          pattern:
            description: Pattern representing the URL path structure to group
            type: string
  patternProperties:
    '^(404|broken-backlinks)$':
      type: object
      properties:
        mentions:
          $ref: '#/SlackMentionConfig'
        # Define other properties specific to the alert type here
  example:
    excludedURLs:
      - 'https://www.adobe.com/excluded-page'
      - 'https://www.adobe.com/another-excluded-page'
    includedURLs:
      - 'https://www.adobe.com/included-page'
    groupedURLs:
      - name: 'catalog'
        pattern: '/products/'
      - name: 'blog'
        pattern: '/post/'
SlackConfig:
  type: object
  additionalProperties: true
  properties:
    channel:
      description: The Slack channel ID to send notifications to
      type: string
      example: 'C1234567890'
    workspace:
      description: The Slack workspace name to send notifications to
      type: string
      example: 'example-workspace'
    invitedUserCount:
      description: The number of external users invited to the Slack channel
      type: integer
      example: 5
    channel-url:
      description: Slack URL of the channel to send notifications to
      type: string
      example: 'https://example-workspace.slack.com/archives/C1234567890'
Config:
  type: object
  additionalProperties: true
  properties:
    slack:
      description: Optional. The Slack configuration
      $ref: '#/SlackConfig'
    handlers:
      description: Optional. The Alert configuration
      $ref: '#/HandlerConfig'
    contentAiConfig:
      description: Optional. The ContentAi configuration
      $ref: '#/ContentAiConfig'
    cdnLogsConfig:
      description: Optional. The CDN logs configuration
      $ref: '#/CdnLogsConfig'
    brandProfile:
      description: Optional. The Brand Profile determined during on-boarding.
      type: object
      additionalProperties: true
    edgeOptimizeConfig:
      description: Optional. The edge optimize configuration for the site.
      $ref: '#/EdgeOptimizeConfig'
    enableMoneyPageUrls:
      description: Optional. Whether money page URLs are included in audit targets. Defaults to true.
      type: boolean
      default: true
    auditTargetURLs:
      description: Optional. Custom audit target URLs grouped by source (manual, moneyPages).
      $ref: '#/AuditTargetURLs'
AuditTargetURLs:
  type: object
  description: Custom audit target URLs grouped by source. HTTPS only, hostname must match the site base URL.
  properties:
    manual:
      description: Manually curated list of URLs to include in audits. Maximum 500 entries.
      type: array
      maxItems: 500
      items:
        $ref: '#/AuditTargetURL'
    moneyPages:
      description: Revenue generating pages. Maximum 1000 entries.
      type: array
      maxItems: 1000
      items:
        $ref: '#/AuditTargetURL'
  additionalProperties: true
AuditTargetURL:
  type: object
  required:
    - url
  additionalProperties: false
  properties:
    url:
      type: string
      format: uri
      description: The URL to audit. Must use HTTPS and hostname must match the site base URL (www prefix is treated as equivalent).
      example: 'https://example.com/high-value-page'
EdgeOptimizeConfig:
  type: object
  description: Edge optimize configuration for a site
  properties:
    enabled:
      description: Indicates when edge optimization was enabled for the site
      oneOf:
        - type: boolean
          deprecated: true
          example: true
          description: Deprecated. Use timestamp format instead.
        - type: number
          example: 1772531669121
          description: Timestamp (milliseconds since epoch) indicating when edge optimization was enabled for the site.
    opted:
      description: Timestamp (milliseconds since epoch) when the site opted into edge optimize
      type: number
      example: 1772531669121
    stagingDomains:
      description: Staging domains associated with this site for edge optimize
      type: array
      items:
        type: object
        required:
          - domain
          - id
        properties:
          domain:
            type: string
            description: Staging domain hostname
            example: 'staging.example.com'
          id:
            type: string
            format: uuid
            description: Spacecat site ID for the stage site
  additionalProperties: true
ContentAiConfig:
  type: object
  properties:
    index:
      description: Optional. The index name for website in the content AI service
      type: string
CdnLogsConfig:
  type: object
  properties:
    bucketName:
      description: The name of the S3 bucket to store CDN logs
      type: string
    outputLocation:
      description: The output location for sharepoint folder
      type: string
    filters:
      description: The filters for CDN logs
      type: array
      items:
        type: object
        properties:
          key:
            description: The key to filter
            type: string
          value:
            description: The value to filter
            type: array
            items:
              type: string
  example:
    bucketName: 'test-bucket'
    filters: [{ key: 'test-key', value: ['test-value'] }]
    outputLocation: 'test-output-location'
ScraperConfig:
  type: object
  description: |
    Per-site configuration consumed by the content scraper. Use `headers`
    to attach request headers (for example, Accept-Language) when fetching pages
    for sites behind bot-protection rules.
  properties:
    headers:
      description: Map of HTTP header name to value. Forwarded by the scraper to the upstream request.
      type: object
      additionalProperties:
        type: string
  example:
    headers:
      Accept-Language: 'en-US,en;q=0.9'
OrganizationConfig:
  allOf:
    - $ref: '#/Config'
SiteConfig:
  allOf:
    - $ref: '#/Config'
Organization:
  type: object
  properties:
    id:
      description: The organization ID in uuid format
      $ref: '#/Id'
    name:
      description: The name of the organization
      type: string
    imsOrgId:
      description: Optional. The ID of the Adobe IMS organization
      $ref: '#/ImsOrganizationId'
    semrushWorkspaceId:
      description: Optional. The Semrush workspace ID mapped to this organization.
      $ref: '#/SemrushWorkspaceId'
    config:
      description: Optional. The configuration of the organization
      $ref: '#/OrganizationConfig'
    createdAt:
      description: The date and time when the organization was created
      $ref: '#/DateTime'
    updatedAt:
      description: The date and time when the organization was last updated
      $ref: '#/DateTime'
  example:
    id: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
    name: 'Example Organization'
    imsOrgId: '1234567890ABCDEF12345678@AdobeOrg'
    semrushWorkspaceId: 'ws_12345'
    config:
      slack:
        channel: '#example-channel'
        workspace: 'example-workspace'
        invitedUserCount: 5
      handlers:
        '404':
          byOrg: true
          mentions:
            slack:
              - '@user1'
              - '@user2'
        'cwv':
          byOrg: false
          mentions:
            slack:
              - '@user5'
              - '@user6'
      contentAiConfig:
        index: 'example-index-name'
    createdAt: '2023-12-15T09:30:00Z'
    updatedAt: '2024-01-19T11:20:00Z'
OrganizationList:
  type: array
  items:
    $ref: './schemas.yaml#/Organization'
OrganizationCreate:
  type: object
  required:
    - name
  properties:
    name:
      description: The name of the organization
      type: string
    imsOrgId:
      description: Optional. The ID of the Adobe IMS organization
      $ref: '#/ImsOrganizationId'
    semrushWorkspaceId:
      description: |
        Optional. The Semrush workspace ID to bind to this organization at
        creation time. Admin-only endpoint - non-admins cannot reach this
        path. UNIQUE across organizations.
      $ref: '#/SemrushWorkspaceId'
    config:
      description: Optional. The configuration of the organization
      $ref: '#/OrganizationConfig'
  example:
    name: 'Example Organization'
    imsOrgId: '1234567890ABCDEF12345678@AdobeOrg'
    config:
      slack:
        channel: '#example-channel'
        workspace: 'example-workspace'
      handlers:
        '404':
          mentions:
            slack:
              - '@user3'
              - '@user4'
        'cwv':
          byOrg: false
          mentions:
            slack:
              - '@user5'
              - '@user6'
      contentAiConfig:
        index: 'example-index-name'
OrganizationUpdate:
  type: object
  properties:
    name:
      description: The name of the organization
      type: string
    imsOrgId:
      description: Optional. The ID of the Adobe IMS organization
      $ref: '#/ImsOrganizationId'
    semrushWorkspaceId:
      description: |
        Optional. The Semrush workspace ID to bind to this organization.
        Admin-only - non-admin users PATCHing this field receive a 403.
      $ref: '#/SemrushWorkspaceId'
    config:
      description: Optional. The configuration of the organization
      $ref: '#/OrganizationConfig'
  example:
    name: 'Example Organization'
    imsOrgId: '1234567890ABCDEF12345678@AdobeOrg'
    config:
      slack:
        channel: '#example-channel'
        workspace: 'example-workspace'
      handlers:
        '404':
          mentions:
            slack:
              - '@user3'
              - '@user4'
        'cwv':
          mentions:
            slack:
              - '@user5'
              - '@user6'
      contentAiConfig:
        index: 'example-index-name'
Project:
  type: object
  properties:
    id:
      description: The project ID in uuid format
      $ref: '#/Id'
    name:
      description: The name of the project
      type: string
    organizationId:
      description: The ID of the organization this project belongs to
      $ref: '#/Id'
    createdAt:
      description: The date and time when the project was created
      $ref: '#/DateTime'
    updatedAt:
      description: The date and time when the project was last updated
      $ref: '#/DateTime'
  example:
    id: 'p1r2o3j4-e5c6-t7i8-d9a0-b11c12d13e14'
    name: 'Example Project'
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
    createdAt: '2023-12-15T09:30:00Z'
    updatedAt: '2024-01-19T11:20:00Z'
ProjectList:
  type: array
  items:
    $ref: './schemas.yaml#/Project'
ProjectCreate:
  type: object
  required:
    - name
    - organizationId
  properties:
    name:
      description: The name of the project
      type: string
    organizationId:
      description: The ID of the organization this project belongs to
      $ref: '#/Id'
  example:
    name: 'New Project'
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
ProjectUpdate:
  type: object
  properties:
    name:
      description: The name of the project
      type: string
    organizationId:
      description: The ID of the organization this project belongs to
      $ref: '#/Id'
  example:
    name: 'Updated Project Name'
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
Site:
  type: object
  properties:
    id:
      description: The site ID in uuid format
      $ref: '#/Id'
    organizationId:
      description: The optional ID of the organization this site belongs to
      $ref: '#/Id'
    projectId:
      description: The optional ID of the project this site belongs to
      $ref: '#/Id'
    isPrimaryLocale:
      description: Whether this site is the primary locale for the project
      type: boolean
    language:
      description: The language code in ISO 639-1 format (2 lowercase letters)
      type: string
      pattern: '^[a-z]{2}$'
      example: 'en'
    region:
      description: The region code in ISO 3166-1 alpha-2 format (2 uppercase letters)
      type: string
      pattern: '^[A-Z]{2}$'
      example: 'US'
    baseURL:
      description: The base URL of the site
      $ref: '#/URL'
    name:
      description: The name of the site
      type: string
    deliveryType:
      description: The type of the delivery this site is using
      $ref: '#/DeliveryType'
    deliveryConfig:
      description: The delivery configuration of the site
      $ref: '#/DeliveryConfig'
    gitHubURL:
      description: The optional GitHub URL of the site
      $ref: '#/URL'
    goLiveDate:
      description: The date and time when the site went live on AEM Edge
      nullable: true
      $ref: '#/DateTime'
    config:
      description: Optional. The configuration of the site. May override the organization configuration.
      $ref: '#/SiteConfig'
    createdAt:
      description: The date and time when the site was created
      $ref: '#/DateTime'
    updatedAt:
      description: The date and time when the site was last updated
      $ref: '#/DateTime'
  example:
    id: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
    baseURL: 'https://example-site.com'
    name: 'Example Site'
    deliveryType: 'aem_edge'
    deliveryConfig:
      programId: '12652'
      environmentId: '16854'
      authorURL: 'https://author-p12652-e16854-cmstg.adobeaemcloud.com/'
      siteId: '1234'
    gitHubURL: 'https://github.com/example/repo'
    goLiveDate: '2024-01-20T10:00:00Z'
    config:
      slack:
        channel: 'C1234567890'
        workspace: 'example-workspace'
      handlers:
        '404':
          mentions:
            slack:
              - '@user1'
              - '@user2'
        'broken-backlinks':
          mentions:
            slack:
              - '@user5'
              - '@user6'
          excludedURLs:
            description: URLs to be excluded from the alert
            type: array
            items:
              type: string
              format: uri'
          groupedURLs:
            description: List of grouped URL patterns for categorization. Each entry should include a name and a URL pattern. If empty, previously grouped URLs will be removed
            type: array
            items:
              type: object
              properties:
                name:
                  description: Name of the URL group
                  type: string
                pattern:
                  description: Pattern representing the URL path structure to group
                  type: string
      contentAiConfig:
        index: 'example-index-name'
      cdnLogsConfig:
        bucketName: 'test-bucket'
        filters: [{ key: 'test-key', value: ['test-value'] }]
        outputLocation: 'test-output-location'
    createdAt: '2023-12-15T09:30:00Z'
    updatedAt: '2024-01-19T11:20:00Z'
SiteIdentity:
  type: object
  description: |
    The minimal routing identity for a single site, returned by
    `GET /sites/{siteId}/identity`. Exposes only what a platform `site:readAll` consumer
    needs to resolve a site's owning organization and mint a customer-scoped token.
  properties:
    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    organizationId:
      description: The ID of the organization this site belongs to, or null if unresolved
      oneOf:
        - $ref: '#/Id'
        - type: 'null'
    imsOrgId:
      description: The Adobe IMS organization ID of the owning organization, or null if unresolved
      oneOf:
        - $ref: '#/ImsOrganizationId'
        - type: 'null'
    baseURL:
      description: The base URL of the site
      $ref: '#/URL'
    deliveryType:
      description: The type of the delivery this site is using
      $ref: '#/DeliveryType'
  example:
    siteId: '7511d4b9-1234-4abc-8def-0123456789ab'
    organizationId: '160da889-5678-4cde-9f01-23456789abcd'
    imsOrgId: '8C6043F15F43B6390A49401A@AdobeOrg'
    baseURL: 'https://example.com'
    deliveryType: 'aem_edge'
SiteWithLatestAudit:
  allOf:
    - $ref: '#/Site'
    - type: object
      properties:
        audits:
          description: An array with the latest audit for the given audit type
          type: array
          items:
            $ref: '#/Audit'
  example:
    id: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
    baseURL: 'https://example-site.com'
    name: 'Example Site'
    deliveryType: 'aem_edge'
    gitHubURL: 'https://github.com/example/repo'
    goLiveDate: '2024-01-20T10:00:00Z'
    createdAt: '2023-12-15T09:30:00Z'
    updatedAt: '2024-01-19T11:20:00Z'
    audits:
      - siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
        auditedAt: '2024-01-20T12:00:00Z'
        expiresAt: '2024-07-20T12:00:00Z'
        auditType: 'cwv'
        isError: false
        deliveryType: 'aem_edge'
        fullAuditRef: 'https://some-audit-system/full-report/1234'
        auditResult:
          someProperty: 'someValue'
        previousAuditResult:
          someProperty: 'somePreviousValue'
SiteList:
  type: array
  items:
    $ref: './schemas.yaml#/Site'
SiteListItem:
  type: object
  description: |
    Slim site shape returned by list endpoints (e.g. the paginated `GET /sites`).
    Mirrors `SiteDto.toListJSON` — drops the heaviest and least-used fields from the
    full `Site` shape to keep list payloads small.
  properties:
    id:
      $ref: './schemas.yaml#/Id'
    baseURL:
      $ref: './schemas.yaml#/URL'
    name:
      type: [string, 'null']
    organizationId:
      $ref: './schemas.yaml#/Id'
    deliveryType:
      type: string
      enum: [aem_edge, aem_cs, aem_ams, other]
    gitHubURL:
      type: [string, 'null']
    isLive:
      type: boolean
    isSandbox:
      type: boolean
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    region:
      type: [string, 'null']
    config:
      type: [object, 'null']
      description: |
        Slim configuration subset returned by `ConfigDto.toListJSON` (selected llmo,
        edgeOptimizeConfig, slack, brandConfig, fetchConfig, handlers fields).
      additionalProperties: true
  required:
    - id
    - baseURL
    - organizationId
    - deliveryType
    - isLive
    - isSandbox
    - createdAt
    - updatedAt
SitePagedResponse:
  type: object
  description: Paginated response for sites (returned when `limit` or `cursor` query parameter is provided)
  properties:
    sites:
      type: array
      items:
        $ref: './schemas.yaml#/SiteListItem'
    pagination:
      $ref: './schemas.yaml#/PaginationMetadata'
  required:
    - sites
    - pagination
SiteWithLatestAuditList:
  type: array
  items:
    $ref: './schemas.yaml#/SiteWithLatestAudit'
SiteCreate:
  type: object
  required:
    - baseURL
    - deliveryType
  properties:
    organizationId:
      description: The optional ID of the organization this site belongs to
      default: null
      $ref: '#/Id'
    projectId:
      description: The optional ID of the project this site belongs to
      $ref: '#/Id'
    isPrimaryLocale:
      description: Whether this site is the primary locale for the project
      type: boolean
    language:
      description: The language code in ISO 639-1 format (2 lowercase letters)
      type: string
      pattern: '^[a-z]{2}$'
      example: 'en'
    region:
      description: The region code in ISO 3166-1 alpha-2 format (2 uppercase letters)
      type: string
      pattern: '^[A-Z]{2}$'
      example: 'US'
    name:
      description: The name of the site
      type: string
    baseURL:
      description: The base URL of the site
      $ref: '#/URL'
    deliveryType:
      description: The type of the delivery this site is using
      $ref: '#/DeliveryType'
    gitHubURL:
      description: The optional GitHub URL of the site
      $ref: '#/URL'
    goLiveDate:
      description: The date and time when the site went live on AEM Edge
      nullable: true
      $ref: '#/DateTime'
  example:
    organizationId: 'o1p2q3r4-s5t6-u7v8-w9x0-yz12x34y56z'
    baseURL: 'https://www.newsite.com'
    deliveryType: 'aem_cs'
    name: 'New Site'
SiteUpdate:
  type: object
  properties:
    organizationId:
      description: The optional ID of the organization this site belongs to
      $ref: '#/Id'
    projectId:
      description: The optional ID of the project this site belongs to
      $ref: '#/Id'
    isPrimaryLocale:
      description: Whether this site is the primary locale for the project
      type: boolean
    language:
      description: The language code in ISO 639-1 format (2 lowercase letters)
      type: string
      pattern: '^[a-z]{2}$'
      example: 'en'
    region:
      description: The region code in ISO 3166-1 alpha-2 format (2 uppercase letters)
      type: string
      pattern: '^[A-Z]{2}$'
      example: 'US'
    name:
      description: The name of the site
      type: string
    deliveryType:
      description: The type of the delivery this site is using
      $ref: '#/DeliveryType'
    deliveryConfig:
      description: The delivery configuration of the site
      $ref: '#/DeliveryConfig'
    goLiveDate:
      description: The date and time when the site went live on AEM Edge
      nullable: true
      $ref: '#/DateTime'
    config:
      description: Optional. The configuration of the site
      $ref: '#/SiteConfig'
  example:
    organizationId: 'u7y6t5r4-e3w2-x1z0-z9y8-x7v6w5u4t3s2'
    deliveryType: 'other'
    name: 'New Site'
    deliveryConfig:
      programId: '12652'
      environmentId: '16854'
      authorURL: 'https://author-p12652-e16854-cmstg.adobeaemcloud.com/'
      siteId: '1234'
    goLiveDate: '2024-01-20T10:00:00Z'
CdnLogsConfigUpdate:
  type: object
  required:
    - cdnLogsConfig
  properties:
    cdnLogsConfig:
      description: The CDN logs configuration to update
      $ref: '#/CdnLogsConfig'
  example:
    cdnLogsConfig:
      bucketName: 'test-bucket'
      outputLocation: 'test-output-location'
      filters: [{ key: 'test-key', value: ['test-value'] }]
ScraperConfigUpdate:
  type: object
  required:
    - scraperConfig
  properties:
    scraperConfig:
      description: The scraper configuration to update
      $ref: '#/ScraperConfig'
  example:
    scraperConfig:
      headers:
        Accept-Language: 'en-US,en;q=0.9'
ScraperConfigResponse:
  type: object
  description: |
    Response body returned by `GET` and `PATCH /sites/{siteId}/config/scraper`.
    Intentionally narrow: returns only the affected site ID and the persisted
    scraper configuration, not the rest of the site's configuration.
  properties:
    siteId:
      description: The site ID
      $ref: '#/Id'
    scraperConfig:
      description: The persisted scraper configuration
      $ref: '#/ScraperConfig'
  example:
    siteId: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
    scraperConfig:
      headers:
        Accept-Language: 'en-US,en;q=0.9'
UpdateHandlerTypeConfig:
  type: object
  properties:
    excludedURLs:
      description: Set of URLs to exclude. If empty, previously excluded URLs will be removed. Combined with replaceExcludedURLs to control merge vs replace behavior
      type: array
      items:
        type: string
        format: uri
    replaceExcludedURLs:
      description: When true, excludedURLs fully replaces the existing list. When false (default), values are appended and deduplicated
      type: boolean
      default: false
    includedURLs:
      description: Set of URLs to include. If empty, previously included URLs will be removed. Combined with replaceIncludedURLs to control merge vs replace behavior
      type: array
      items:
        type: string
        format: uri
    replaceIncludedURLs:
      description: When true, includedURLs fully replaces the existing list. When false (default), values are appended and deduplicated
      type: boolean
      default: false
    groupedURLs:
      description: List of grouped URL patterns for categorization. Each entry should include a name and a URL pattern. If empty, previously grouped URLs will be removed
      type: array
      items:
        type: object
        properties:
          name:
            description: Name of the URL group
            type: string
          pattern:
            description: Pattern representing the URL path structure to group
            type: string
  example:
    excludedURLs:
      - 'https://www.adobe.com/some-page'
      - 'https://www.adobe.com/another-page'
    replaceExcludedURLs: true
    includedURLs:
      - 'https://www.adobe.com/included-page'
    replaceIncludedURLs: true
    groupedURLs:
      - name: 'catalog'
        pattern: '/products/'
      - name: 'blog'
        pattern: '/post/'
ConfigurationSitesAuditsUpdateResult:
  type: object
  properties:
    status:
      type: integer
      description: The HTTP status code of the operation (e.g., 200 for success)
    message:
      type: string
      description: A message indicating the result of the operation
  required:
    - status
    - message
Audit:
  type: object
  readOnly: true
  properties:
    siteId:
      description: The ID of the site this audit belongs to
      $ref: '#/Id'
    auditedAt:
      description: The date and time of the audit in ISO 8601 format
      $ref: '#/DateTime'
    expiresAt:
      description: The date and time when the audit expires in ISO 8601 format
      $ref: '#/DateTime'
    deliveryType:
      description: The type of the delivery this site is using
      $ref: '#/DeliveryType'
    fullAuditRef:
      description: |
        A reference by which the full external result of an audit can be accessed, which is dependent on the audit type.
      type: string
    auditResult:
      $ref: '#/AuditResult'
    previousAuditResult:
      $ref: '#/AuditResult'
  example:
    siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    auditedAt: '2024-01-20T12:00:00Z'
    expiresAt: '2024-07-20T12:00:00Z'
    auditType: 'cwv'
    isError: false
    deliveryType: 'aem_edge'
    fullAuditRef: 'https://some-audit-system/full-report/1234'
    auditResult:
      someProperty: 'someValue'
    previousAuditResult:
      someProperty: 'somePreviousValue'
AuditResult:
  description: The result of an audit, which is dependent on the audit type.
  oneOf:
    - type: object
      additionalProperties: true
    - type: object
      properties:
        experimentationOpportunities:
          type: array
          description: A list of experimentation opportunities
          items:
            $ref: './schemas.yaml#/ExperimentationOpportunity'
    - type: object
      description: |
        The result of broken-backlinks audit.
      properties:
        brokenBacklinks:
          type: array
          description: A list of broken backlinks.
          items:
            $ref: './schemas.yaml#/BrokenBacklink'
        fullAuditRef:
          description: |
            A reference by which the full external result of an audit can be accessed, which is dependent on the audit type.
          type: string
    - type: object
      description: |
        The result of broken-internal-links audit.
      properties:
        brokenInternalLinks:
          type: array
          description: A list of broken internal links.
          items:
            $ref: './schemas.yaml#/BrokenInternalLink'
        fullAuditRef:
          description: |
            A reference by which the full external result of an audit can be accessed, which is dependent on the audit type.
          type: string
        finalUrl:
          description: The final URL for the audited page.
          type: string
    - type: object
      description: |
        The result of money-pages audit.
      properties:
        siteUrl:
          description: The resolved site URL the money-pages audit was run against.
          type: string
        fullAuditRef:
          description: |
            A reference by which the full external result of an audit can be accessed, which is dependent on the audit type.
          type: string
    - type: array
      description: Information about the provided URLs in the Google index.
      items:
        $ref: './schemas.yaml#/StructuredData'
    - type: object
      description: |
        The result of costs audit.
      properties:
        ahrefs:
          type: object
          properties:
            usedApiUnits:
              description: |
                API units used so far in the current month.
              type: integer
            limitApiUnits:
              description: |
                Limit of API units for the current month.
              type: integer
            fullAuditRef:
              description: |
                A reference by which the full external result of an audit can be accessed, which is dependent on the audit type.
              type: string
    - type: object
      description: |
        The result of a meta-tags audit.
      properties:
        auditResult:
          type: object
          properties:
            detectedTags:
              description: |
                A mapping of URLs to their detected meta-tags issues and recommendations.
              type: object
              additionalProperties:
                type: object
                properties:
                  title:
                    type: object
                    properties:
                      seoRecommendation:
                        description: |
                          SEO recommendation for the title tag.
                        type: string
                      issue:
                        description: |
                          The issue detected in the title tag.
                        type: string
                      issueDetails:
                        description: |
                          Detailed explanation of the issue detected in the title tag.
                        type: string
                      seoImpact:
                        description: |
                          The impact of the detected issue on SEO.
                        type: string
            finalUrl:
              description: |
                The final URL for the audited page.
              type: string
    - type: object
      description: |
        The result of a product-metatags audit targeting Product Detail Pages (PDP) of commerce sites.
        This audit specifically analyzes product pages for e-commerce optimization, scraping SKU,
        thumbnail images, and catalog/store view codes for later autofixing capabilities.
      properties:
        auditResult:
          type: object
          properties:
            productDetailPages:
              description: |
                A mapping of product page URLs to their analysis results, including product metadata
                and meta tag recommendations for commerce optimization.
              type: object
              additionalProperties:
                type: object
                properties:
                  productMetadata:
                    type: object
                    description: |
                      Commerce-specific metadata scraped from the product page for autofixing.
                    properties:
                      sku:
                        description: |
                          Product SKU (Stock Keeping Unit) identifier.
                        type: string
                      thumbnail:
                        description: |
                          URL to the product thumbnail image.
                        type: string
                      catalogViewCode:
                        description: |
                          Catalog view code for multi-catalog e-commerce sites.
                        type: string
                      storeViewCode:
                        description: |
                          Store view code for multi-store e-commerce sites.
                        type: string
                  metaTagAnalysis:
                    type: object
                    description: |
                      Analysis of product-specific meta tags and SEO elements.
                    additionalProperties:
                      type: object
                      properties:
                        current:
                          description: |
                            Current value of the meta tag or element.
                          type: string
                        seoRecommendation:
                          description: |
                            SEO recommendation for this product meta element.
                          type: string
                        issue:
                          description: |
                            The issue detected in the product meta element.
                          type: string
                        issueDetails:
                          description: |
                            Detailed explanation of the issue for product pages.
                          type: string
                        seoImpact:
                          description: |
                            The impact of the detected issue on product discoverability.
                          type: string
                        autofixSuggestion:
                          description: |
                            Suggested value for automated fixing of the meta element.
                          type: string
            pdpOptimizationSummary:
              type: object
              description: |
                Summary of product detail page optimization findings.
              properties:
                totalPagesAnalyzed:
                  description: |
                    Total number of product pages analyzed.
                  type: integer
                criticalIssues:
                  description: |
                    Number of critical issues found across product pages.
                  type: integer
                mediumIssues:
                  description: |
                    Number of medium-priority issues found.
                  type: integer
                autofixableItems:
                  description: |
                    Number of issues that can be automatically fixed using scraped metadata.
                  type: integer
            finalUrl:
              description: |
                The final URL for the audited commerce site.
              type: string
    - type: object
      description: The result of LLM error pages audit.
      properties:
        success:
          type: boolean
          description: Whether the audit was successful
        totalErrors:
          type: integer
          description: Total number of LLM error requests found
        periodIdentifier:
          type: string
          description: The reporting period identifier
          example: 'w01-2025'
        summary:
          type: object
          description: Summary statistics of the audit
          properties:
            uniqueUrls:
              type: integer
              description: Number of unique URLs with errors
            uniqueUserAgents:
              type: integer
              description: Number of unique LLM user agents
        errorPages:
          type: array
          description: List of LLM error page details
          items:
            type: object
            properties:
              user_agent:
                type: string
                description: The LLM user agent string
              url:
                type: string
                description: The URL that returned an error
              status:
                type: integer
                description: HTTP status code
              total_requests:
                type: integer
                description: Number of requests for this URL/user agent combination
      additionalProperties: true
    - type: object
      description: The result of CWV audit
      properties:
        cwv:
          type: array
          description: A list of CWV metrics per device type
          items:
            type: object
            properties:
              type:
                type: string
                enum: ['group', 'url']
                description: "Specifies if the metric applies to a 'group' or an individual 'url'"
              name:
                type: string
                description: "Name of the group (only applicable when type is 'group')"
                example: 'Homepage Group'
              pattern:
                type: string
                description: "URL pattern for the group (only applicable when type is 'group')"
                example: 'https://www.aem.live/home*'
              url:
                description: "URL of the page (only applicable when type is 'url')"
                $ref: '#/URL'
              pageviews:
                type: integer
                description: 'Total pageviews for this group or URL'
                example: 4620
              organic:
                type: integer
                description: 'Total organic traffic for this group or URL'
                example: 2510
              metrics:
                type: array
                description: 'Array of performance metrics by device type'
                items:
                  $ref: './schemas.yaml#/CWVMetric'
    - type: object
      description: The result of summarization audit.
      properties:
        success:
          type: boolean
          description: Whether the audit was successful
        topPages:
          type: array
          description: A list of top pages
          items:
            type: string
    - type: object
      description: The result of FAQs audit
      properties:
        success:
          type: boolean
          description: Whether the audit was successful
        promptsByUrl:
          type: array
          description: A list of prompts grouped by URL and topic
          items:
            type: object
            properties:
              url:
                type: string
                description: The URL of the page
              topic:
                type: string
                description: The topic of the prompts
              prompts:
                type: array
                description: A list of prompts for this URL and topic
                items:
                  type: string
    - type: object
      description: The result of related-urls audit (brand presence prompts by region)
      properties:
        success:
          type: boolean
          description: Whether the audit was successful
        baseURL:
          type: string
          description: Base URL of the site (present when success is true)
        fanoutCount:
          type: integer
          description: Number of URLs to fan out for related-urls processing (present when success is true)
        promptRegions:
          type: array
          description: List of prompt and region pairs used for related-urls
          items:
            type: object
            properties:
              prompt:
                type: string
                description: The brand presence prompt
              region:
                type: string
                description: Region for the prompt (e.g. GLOBAL or region code)
AuditList:
  type: array
  items:
    $ref: './schemas.yaml#/Audit'
CWVMetric:
  type: object
  properties:
    deviceType:
      type: string
      description: 'The type of device'
      enum: ['mobile', 'desktop']
      example: 'mobile'
    pageviews:
      type: integer
      description: 'Total pageviews for this device type'
      example: 2120
    lcp:
      type: number
      format: float
      description: 'Largest Contentful Paint (LCP) metric'
      example: 2099.7
    lcpCount:
      type: integer
      description: 'The count of LCP samples'
      example: 9
    cls:
      type: number
      format: float
      description: 'Cumulative Layout Shift (CLS) metric'
      example: 0.02066
    clsCount:
      type: integer
      description: 'The count of CLS samples'
      example: 7
    inp:
      type: integer
      format: float
      description: 'Interaction to Next Paint (INP) metric'
      example: 12
    inpCount:
      type: integer
      description: 'The count of INP samples'
      example: 3
    ttfb:
      type: number
      format: float
      description: 'Time to First Byte (TTFB) metric'
      example: 520.45
    ttfbCount:
      type: integer
      description: 'The count of TTFB samples'
      example: 18
ExperimentationOpportunity:
  type: object
  readOnly: true
  properties:
    type:
      type: string
      description: Type of the experimentation opportunity
      example: 'generic'
    page:
      type: string
      description: The title of the webpage
      example: 'Retirement Calculator'
    screenshot:
      type: string
      format: url
      description: A URL pointing to the screenshot of the webpage.
      example: 'https://space.cat/screenshots/some-cool-page.png'
    trackedPageKPIName:
      type: string
      description: The name of KPI tracked.
      example: 'Bounce rate'
    trackedPageKPIValue:
      type: number
      description: The value of KPI tracked for this page.
      example: 0.80
    trackedKPISiteAverage:
      type: number
      description: The average value of KPI tracked across the site.
      example: 0.45
    pageviews:
      type: integer
      description: The total number of views this webpage has received
      example: 15000
    samples:
      type: integer
      description: The total number of samples we have for this webpage in RUM
      example: 150
    activeExperiments:
      type: string
      description: The number of active experiments on the webpage, or 'none' if there are no active experiments.
      examples:
        - 'None'
        - '2 active'
    metrics:
      type: array
      description: The metrics for the experimentation opportunity
      items:
        type: object
    recommendations:
      type: array
      description: The recommendations for the experimentation opportunity
      items:
        type: object
      example:
        - type: 'guidance'
          insight: 'The main CTAs ("Buy now", "Free trial") are not prominently visible above the fold for users coming from platforms like TikTok.'
          recommendation: 'Relocate one of the primary CTAs, such as "Buy now", to a more prominent position above the fold where it is immediately visible upon landing on the page.'
        - type: 'guidance'
          insight: 'The current design and layout of the page, while visually appealing, might be overwhelming for users coming from TikTok who prefer short and concise content.'
          recommendation: 'Simplify the page by reducing the amount of text and focusing on key features with visually engaging images or short videos, particularly near the top of the page.'
StructuredData:
  type: object
  readOnly: true
  properties:
    inspectionUrl:
      type: string
      description: The URL that was inspected
    indexStatusResult:
      type: object
      description: Result of the index status analysis.
      properties:
        verdict:
          $ref: '#/Verdict'
        lastCrawlTime:
          $ref: '#/DateTime'
    richResults:
      type: object
      description: Result of the Rich Results analysis. Absent if there are no rich results found.
      properties:
        verdict:
          $ref: '#/Verdict'
        detectedItemTypes:
          type: array
          description: A list of zero or more rich result types detected on this page.
          items:
            type: string
            example: 'Product snippets'
        detectedIssues:
          type: array
          description: A list of zero or more rich results errors detected on this page.
          items:
            type: object
            properties:
              richResultType:
                type: string
                description: Rich Results type detected on this page.
                example: 'Product snippets'
              items:
                type: array
                description: List of Rich Results items that have issues.
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The user-provided name of this item.
                      example: 'Product name'
                    issues:
                      type: array
                      description: A list of rich result issues found for this instance.
                      items:
                        type: object
                        properties:
                          issueMessage:
                            type: string
                            description: Rich Results issue type.
                            example: 'Missing field "image"'
                          severity:
                            type: string
                            description: Severity of this issue.
                            example: 'ERROR'

Verdict:
  type: string
  description: High-level verdict about whether the URL is indexed.
  enum:
    - 'VERDICT_UNSPECIFIED'
    - 'PASS'
    - 'PARTIAL'
    - 'FAIL'
    - 'NEUTRAL'
HoolihanHeaders:
  type: object
  properties:
    x-request-id:
      description: The request ID
      type: array
      items:
        $ref: '#/Id'
    miso-trace-id:
      description: The Miso trace ID
      type: array
      items:
        type: string
    com-adobe-hoolihan-source-partition:
      description: The source partition
      type: array
      items:
        type: string
    com-adobe-hoolihan-source-offset:
      description: The source offset
      type: array
      items:
        type: string
    com-adobe-hoolihan-publish-time:
      description: The time the event was published in milliseconds since the Unix Epoch
      type: array
      items:
        type: string
        example: '1705914000000'
    x-api-key:
      description: The API key of the client which published the original event
      type: array
      items:
        type: string
    com-adobe-hoolihan-publisher:
      description: The publisher of the original event
      type: array
      items:
        type: string
    com-adobe-hoolihan-source-topic:
      description: The topic that the original event was published to
      type: array
      items:
        type: string
    com-adobe-hoolihan-on-behalf-of:
      description: The client ID(s) that the event was forwarded on behalf of
      type: array
      items:
        type: string
    Content-Type:
      description: The content type of the event value
      type: array
      items:
        type: string
        example: 'application/json'
HoolihanEventValue:
  type: object
  required:
    - content
    - headers
  properties:
    content:
      description: The JSON payload of the event, encoded as a Base64 string
      type: string
    headers:
      description: Metadata headers included by Hoolihan on each event
      $ref: '#/HoolihanHeaders'
HoolihanEvent:
  type: object
  required:
    - id
    - topic
    - value
    - partition
    - offset
  properties:
    id:
      description: The Hoolihan ID of the event
      type: string
    topic:
      description: The name of the Hoolihan topic that the event was received on
      type: string
    value:
      description: Value of the event, which contains the message payload from the publishing system
      $ref: '#/HoolihanEventValue'
    partition:
      description: The partition index that the event was received on
      type: integer
    offset:
      description: The offset of the event within the partition
      type: integer
  example:
    id: 'b7fyJDj1bu5yrt82RxLX89a98a73KSqR4ptC5MRvlEoLshbgAB3emGKdjQleAMyINZcoAkM6cB7ma2aV'
    topic: 'example_fulfillment_topic'
    partition: 0
    offset: 1234
    value:
      content: |-
