    firstName: "John"
    lastName: "Doe"
    externalUserId: "1234567890"
    provider: "IMS"
    status: "INVITED"
    lastSeenAt: "2024-01-15T10:30:00Z"
    metadata:
      origin: "INVITED"
    createdAt: "2024-01-15T10:30:00Z"
    updatedAt: "2024-01-15T10:30:00Z"
    updatedBy: "system"

TrialUserActivity:
  type: object
  description: A trial user activity represents an action performed by a trial user

  properties:
    id:
      description: Unique identifier for the trial user activity
      $ref: '#/Id'
    siteId:
      description: Reference to the site where the activity occurred
      $ref: '#/Id'
    trialUserId:
      description: Reference to the trial user who performed the activity
      $ref: '#/Id'
    entitlementId:
      description: Reference to the entitlement associated with this activity
      $ref: '#/Id'
    type:
      description: The type of activity performed
      type: string
      enum: [SIGN_UP, SIGN_IN, CREATE_SITE, RUN_AUDIT, PROMPT_RUN, DOWNLOAD]
      example: 'SIGN_IN'
    details:
      description: Additional details about the activity
      type: object
      additionalProperties: true
      example:
        browser: 'Chrome'
        ip: '192.168.1.1'
    productCode:
      description: The product code associated with the activity
      type: string
      enum: [LLMO, ASO, ACO]
      example: 'LLMO'
    createdAt:
      description: When the activity was recorded
      $ref: '#/DateTime'
    updatedAt:
      description: When the activity was last updated
      $ref: '#/DateTime'
    updatedBy:
      description: Who last updated the activity
      $ref: '#/Id'
  example:
    id: "123e4567-e89b-12d3-a456-426614174000"
    siteId: "987fcdeb-51a2-43d7-9876-543210987654"
    trialUserId: "456e4567-e89b-12d3-a456-426614174000"
    entitlementId: "789e4567-e89b-12d3-a456-426614174000"
    type: "SIGN_IN"
    details:
      browser: "Chrome"
      ip: "192.168.1.1"
    productCode: "LLMO"
    createdAt: "2024-01-15T10:30:00Z"
    updatedAt: "2024-01-15T10:30:00Z"
    updatedBy: "system"

OrganizationIdentityProvider:
  type: object
  description: An organization identity provider represents the mapping between an organization and an identity provider

  properties:
