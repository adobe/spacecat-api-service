V2Topic:
  type: object
  description: A topic in the normalized topics table
  required:
    - id
    - uuid
    - name
    - status
  properties:
    id:
      type: string
      description: Topic business key (topic_id)
      example: 'baseurl-discovery-research-topic'
    uuid:
      type: string
      format: uuid
      description: UUID primary key (topics.id)
    name:
      type: string
      description: Human-readable topic name
      example: 'Discovery & Research'
    description:
      type:
        - string
        - 'null'
      description: Optional topic description
    status:
      type: string
      enum: [active, pending, deleted, ignored]
      description: Topic status
      example: 'active'
    brandId:
      type:
        - string
        - 'null'
      format: uuid
      description: Optional brand UUID this topic belongs to
    categoryUuids:
      type: array
      uniqueItems: true
      items:
        type: string
        format: uuid
      description: |
        UUIDs of non-deleted categories linked to this topic via the
        topic_categories junction table. Always present; empty array when no
        categories are linked. Never null. Entries are unique (enforced by the
        topic_categories UNIQUE(topic_id, category_id) constraint). Order is
        not guaranteed; clients that need a stable order must sort client-side.
      example:
        - '019d4464-5784-74d1-8469-e5d3cddc8e52'
        - '019d4465-2110-7c8a-9f12-7b8e8a3c4d11'
    updatedAt:
      type: string
      format: date-time
      description: Last update timestamp
    updatedBy:
      type: string
      description: User or system that last updated the topic

V2TopicInput:
  type: object
