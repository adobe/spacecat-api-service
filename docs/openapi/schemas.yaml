SuggestionStatus:
  description: Status of this suggestion; status reflects overall fix execution, flagged here for optimization
  type: string
  enum:
    - 'NEW'
    - 'APPROVED'
    - 'SKIPPED'
    - 'FIXED'
    - 'ERROR'
    - 'IN_PROGRESS'
    - 'OUTDATED'
    - 'PENDING_VALIDATION'
    - 'REJECTED'
  example: 'NEW'
SuggestionSkipReason:
  description: Reason for skipping a suggestion when status is SKIPPED
  type: string
  enum:
    - ALREADY_IMPLEMENTED
    - INACCURATE_OR_INCOMPLETE
    - TOO_RISKY
    - NO_REASON
    - OTHER
SuggestionType:
  description: |
    Type of suggestion:
    - REDIRECT_UPDATE: Add or update a redirect as suggested
    - EXPERIMENT: Run the experiment with the given suggestions
    - CONTENT_UPDATE: Update the content to the suggested
    - METADATA_UPDATE: Update the metadata to the suggested
  type: string
  enum:
    - 'REDIRECT_UPDATE'
    - 'EXPERIMENT'
    - 'CONTENT_UPDATE'
    - 'METADATA_UPDATE'
  example: 'REDIRECT_UPDATE'
Suggestion:
  type: object
  properties:
    id:
      description: UUID of this suggestion
      $ref: '#/Id'
    opportunityId:
      description: UUID of the opportunity this suggestion belongs to
      $ref: '#/Id'
    type:
      $ref: '#/SuggestionType'
    rank:
      description: Type-specific numeric rank value (e.g., "domainTraffic" for a broken-backlink) helps sorting
      type: number
      example: 45600
    data:
      description: Map containing type-specific details of what fix is suggested
      type: object
      additionalProperties: true
      oneOf:
        - $ref: '#/BrokenBacklinksRedirectData'
        - $ref: '#/BrokenInternalLinksSuggestionData'
    kpiDeltas:
      description: Map containing metrics estimated to experience lifts or losses due to the issue
      type: object
      additionalProperties: true
      oneOf:
        - $ref: '#/BrokenBacklinksKpiDeltas'
        - $ref: '#/BrokenInternalLinksKpiDeltas'
    status:
      description: Status of this suggestion; status reflects overall fix execution, flagged here for optimization
      $ref: '#/SuggestionStatus'
    skipReason:
      description: Reason for skipping when status is SKIPPED
      $ref: '#/SuggestionSkipReason'
    skipDetail:
      description: Optional detail for skip reason, max 500 characters
      type: string
      maxLength: 500
    createdAt:
      description: UTC timestamp of when the suggestion was created
      $ref: '#/DateTime'
    updatedAt:
      description: UTC timestamp of when the suggestion was last updated
      $ref: '#/DateTime'
  example:
    id: '123e4567-e89b-12d3-a456-426614174000'
    opportunityId: '123e4567-e89b-12d3-a456-426614174000'
    type: 'REDIRECT_UPDATE'
    rank: 45600
    data:
      title: 'Fix broken backlink from example.com'
      url_from: 'https://www.example.com/old-page'
      url_to: 'https://www.example.com/broken-link'
      urls_suggested:
        - 'https://www.example.com/new-page'
    kpiDeltas: {}
    status: 'NEW'
    createdAt: '2024-01-19T14:20:30Z'
    updatedAt: '2024-01-19T14:20:30Z'
  required:
    - id
    - opportunityId
    - type
    - rank
    - data
    - status
    - createdAt
    - updatedAt
SuggestionList:
  type: array
  items:
    $ref: '#/Suggestion'
SuggestionMinimal:
  type: object
  description: Minimal suggestion projection containing id, status, timestamps, and URL-related data fields for listing views
  properties:
    id:
      description: UUID of this suggestion
      $ref: '#/Id'
    status:
      description: Status of this suggestion
      $ref: '#/SuggestionStatus'
    data:
      type: object
      description: URL-related fields extracted from the full data object. Only present if any URL fields exist.
      properties:
        url:
          type: string
          example: "https://example.com/page"
        urls:
          type: array
          items:
            type: string
        urlFrom:
          type: string
          example: "https://example.com/source"
        urlTo:
          type: string
          example: "https://example.com/destination"
        url_from:
          type: string
          description: Source URL (snake_case variant for broken backlinks)
          example: "https://example.com/source"
        url_to:
          type: string
          description: Target URL (snake_case variant for broken backlinks)
          example: "https://example.com/destination"
        urlsSuggested:
          type: array
          description: Array of suggested URLs
          items:
            type: string
        sitemapUrl:
          type: string
          example: "https://example.com/sitemap.xml"
        pageUrl:
          type: string
          example: "https://example.com/page"
        pattern:
          type: string
        link:
          type: string
        path:
          type: string
        sourceUrl:
          type: string
        destinationUrl:
          type: string
        recommendations:
          type: array
          items:
            type: object
        cves:
          type: array
          items:
            type: object
        findings:
          type: array
          items:
            type: object
        form:
          type: object
        page:
          type: object
        accessibility:
          type: object
        metrics:
          type: object
          description: CWV metrics (mobileMetric, desktopMetric) for calculating totalIssues
        type:
          type: string
          description: Type indicator (e.g., 'url' vs 'group' for CWV)
        pageviews:
          type: number
          description: Page views count for display
        issues:
          type: array
          description: Issues array for Accessibility, ColorContrast, FormNonExperimental (includes occurrences field)
          items:
            type: object
    createdAt:
      description: UTC timestamp of when the suggestion was created
      $ref: '#/DateTime'
    updatedAt:
      description: UTC timestamp of when the suggestion was last updated
      $ref: '#/DateTime'
  required:
    - id
    - status
    - createdAt
    - updatedAt
SuggestionSummary:
  type: object
  description: Summary suggestion projection (superset of minimal, subset of full). Contains minimal data fields plus metadata for table displays.
  properties:
    id:
      description: UUID of this suggestion
      $ref: '#/Id'
    status:
      description: Status of this suggestion
      $ref: '#/SuggestionStatus'
    data:
      type: object
      description: URL-related fields from minimal view (same as SuggestionMinimal.data). Only present if any URL fields exist.
    opportunityId:
      description: UUID of the opportunity this suggestion belongs to
      $ref: '#/Id'
    type:
      $ref: '#/SuggestionType'
    rank:
      description: Type-specific numeric rank value (e.g., "domainTraffic" for a broken-backlink) helps sorting
      type: number
      example: 45600
    url:
      description: URL associated with the suggestion (extracted from data). May be null if no URL found.
      type: string
      example: "https://example.com/page"
    createdAt:
      description: UTC timestamp of when the suggestion was created
      $ref: '#/DateTime'
    updatedAt:
      description: UTC timestamp of when the suggestion was last updated
      $ref: '#/DateTime'
    updatedBy:
      description: Who last updated this suggestion
      type: string
      example: "user@example.com"
  required:
    - id
    - status
    - opportunityId
    - type
    - rank
PaginationMetadata:
  type: object
  description: |
    Canonical pagination envelope metadata for cursor-based list endpoints. Reuse this
    schema (rather than inlining `limit`/`cursor`/`hasMore`) in every paginated list
    response so the envelope shape stays consistent across the API. Already used by
    `SitePagedResponse` and `SuggestionPagedResponse`.
  properties:
    limit:
      description: The maximum number of items returned in this page
      type: integer
      example: 100
    cursor:
      description: The cursor to use for fetching the next page, or null if there are no more pages
      type: [string, 'null']
      example: "eyJzayI6IjIwMjQtMDEtMTVUMTI6MzA6MDBaIiwiaWQiOiIxMjNlNDU2Ny1lODliLTEyZDMtYTQ1Ni00MjY2MTQxNzQwMDAifQ=="
    hasMore:
      description: Indicates whether there are more pages available
      type: boolean
      example: true
  required:
    - limit
    - cursor
    - hasMore
SuggestionPagedResponse:
  type: object
  description: Paginated response for suggestions
  properties:
    suggestions:
