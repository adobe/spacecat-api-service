FixStatus:
  description: |
    Fix Status
    - PENDING: the fix is pending to be deployed
    - DEPLOYED: the fix was successfully applied
    - PUBLISHED: the fix is live in production
    - FAILED: failed to apply the fix
    - ROLLED_BACK: the fix has been rolled_back
  example: 'PENDING'
  type: string
  enum:
    - 'PENDING'
    - 'DEPLOYED'
    - 'PUBLISHED'
    - 'FAILED'
    - 'ROLLED_BACK'

