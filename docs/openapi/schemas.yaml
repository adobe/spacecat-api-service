PredominantTrafficRequest:
  type: object
  required:
    - urls
  properties:
    urls:
      type: array
      description: Array of URLs to analyze for predominant traffic type
      items:
        type: string
        format: uri
      minItems: 1
      example:
        - 'https://example.com/page1'
        - 'https://example.com/page2'
        - 'https://example.com/products/item'
    predominantTrafficPct:
      type: number
      description: |
        Minimum percentage threshold for a traffic type to be considered predominant.
        If any single traffic type (paid, earned, or owned) reaches or exceeds this percentage,
        it is considered the predominant type. Otherwise, traffic is classified as "mixed".
      minimum: 0
      maximum: 100
      default: 80
      example: 80

