    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    source:
      description: The source for retrieving the metric value
      type: string
    name:
      description: The name of the metric
      type: string
    value:
      description: The value of the metric
      type: integer
    time:
      description: The date and time when the metric was recorded
      $ref: '#/DateTime'
  example:
    siteId: 'a1b2c3d4-e5f6-7g8h-9i0j-k11l12m13n14'
    source: 'seo'
    name: 'organic-traffic'
    value: 37900
    time: '2024-04-29T00:00:00.000Z'
PageOrganicKeywords:
  type: object
  required:
    - siteId
    - source
    - name
    - time
    - url
    - keyword
    - traffic
  properties:
    siteId:
      description: The site ID in uuid format
      $ref: '#/Id'
    source:
      description: The source for retrieving the metric value
      type: string
    name:
      description: The name of the metric
      type: string
    time:
      description: The date and time when the metric was recorded
      $ref: '#/DateTime'
    url:
      description: The URL of the page
      $ref: '#/URL'
    keyword:
