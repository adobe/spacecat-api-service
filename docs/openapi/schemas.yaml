# ── Semrush AIO proxy ─────────────────────────────────────────────────────────
# Schemas for /v2/orgs/{spaceCatId}/brands/{brandId}/serenity/*. See
# docs/openapi/serenity-api.yaml for the operations.

SerenityPrompt:
  type: object
  description: A single Serenity prompt.
  required: [semrushPromptId, geoTargetId, languageCode, text]
  properties:
    semrushPromptId:
      type: string
      description: Upstream prompt id. Changes whenever the prompt is re-created (e.g. on PATCH).
    geoTargetId:
      type: integer
      minimum: 1
      description: Google Ads Geo Target ID for the slice this prompt belongs to.
    languageCode:
      type: string
      pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'
      description: BCP-47 primary subtag (lowercase) for the slice.
    text:
      type: string
    tagMap:
      type: object
      additionalProperties: { type: string }
      description: |
        Map of tag name → upstream tag id. Keys are the tag names (e.g.
        "category:Firefly"); values are the Semrush tag UUIDs to pass back as
        `tagIds` query params when filtering. Tags without an upstream id carry
        an empty string value and are excluded from tag_ids filter calls.
        Tag names are assumed unique per Semrush project; if duplicates exist,
        only the last entry is retained.
      example: { "category:Firefly": "uuid-1", "intent:research": "uuid-2" }

SerenityPromptListResponse:
  type: object
  required: [items, total, page, limit]
  properties:
    items:
      type: array
      items: { $ref: '#/SerenityPrompt' }
    total: { type: integer }
    page: { type: integer }
    limit: { type: integer }

SerenityPromptInput:
  type: object
  description: One row in a bulk-create prompts request.
  required: [text, geoTargetId, languageCode]
  properties:
    text: { type: string }
    tags:
      type: array
      items: { type: string }
      default: []
    geoTargetId:
      type: integer
      minimum: 1
    languageCode:
      type: string
      pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'

SerenityCreatePromptsRequest:
  type: object
  required: [prompts]
  properties:
    prompts:
      type: array
      minItems: 1
      maxItems: 500
      items: { $ref: '#/SerenityPromptInput' }

SerenityCreatePromptsResponse:
  type: object
  required: [created, skipped, failed]
  properties:
    created:
      type: array
      items: { $ref: '#/SerenityPrompt' }
    skipped:
      type: array
      description: Prompts skipped (e.g. unknown slice).
      items:
        type: object
        properties:
          text: { type: string }
          reason: { type: string }
    failed:
      type: array
      description: Prompts that hit an upstream error.
      items:
        type: object
        properties:
          text: { type: string }
          geoTargetId: { type: integer }
          languageCode: { type: string }
          status: { type: integer }
          message: { type: string }

SerenityUpdatePromptRequest:
  type: object
  description: |
    Replace the prompt's text and tags. Carries the owning slice in
    `geoTargetId` + `languageCode` so the server can resolve the upstream
    project without scanning. All four fields are required — the upstream
    provider's API has no in-place update or GET-by-id, so the server runs
    DELETE-old + POST-new and treats the body as the full next state.
    Pass `tags: []` to clear tags.
  required: [geoTargetId, languageCode, text, tags]
  properties:
    geoTargetId:
      type: integer
      minimum: 1
    languageCode:
      type: string
      pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'
    text: { type: string }
    tags:
      type: array
      items: { type: string }

SerenityBulkDeletePromptsRequest:
  type: object
  required: [prompts]
  properties:
    prompts:
      type: array
      minItems: 1
      maxItems: 500
      items:
        type: object
        required: [semrushPromptId, geoTargetId, languageCode]
        properties:
          semrushPromptId: { type: string }
          geoTargetId: { type: integer, minimum: 1 }
          languageCode:
            type: string
            pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'

SerenityBulkDeletePromptsResponse:
  type: object
  required: [deleted, failed]
  properties:
    deleted: { type: integer }
    failed:
      type: array
      items:
        type: object
        properties:
          semrushPromptId: { type: string }
          geoTargetId: { type: integer }
          languageCode: { type: string }
          status: { type: integer }
          message: { type: string }

SerenityMarket:
  type: object
  description: |
    A (brandId, geoTargetId, languageCode) slice configured for a brand.
    The row's existence is the contract that the market is active.
  required: [brandId, geoTargetId, languageCode]
  properties:
    brandId:
      type: string
      format: uuid
    geoTargetId:
      type: integer
      minimum: 1
    languageCode:
      type: string
      pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'
    createdAt:
      oneOf:
        - $ref: '#/DateTime'
        - type: 'null'
    updatedAt:
      oneOf:
        - $ref: '#/DateTime'
        - type: 'null'

SerenityMarketListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items: { $ref: '#/SerenityMarket' }

SerenityMarketDetail:
  description: |
    A single market slice, including the resolved upstream `semrushProjectId`.
    This is the ONE place on the /serenity/* surface that deliberately exposes
    the upstream project id — the list representation (SerenityMarket) stays
    provider-free (LLMO-5190). It is surfaced here only so the embedded Semrush
    AIO renderer MFE can mount the dashboard for the selected market. Consume
    `semrushProjectId` ONLY to mount that renderer; the stable handle for a
    market remains its (geoTargetId, languageCode) slice.
  allOf:
    - $ref: '#/SerenityMarket'
    - type: object
      required: [semrushProjectId]
      properties:
        semrushProjectId:
          type: string
          description: Upstream Semrush AIO project id for this slice (provider-specific by design).

SerenityCreateMarketRequest:
  type: object
  required: [market, languageCode, brandDomain, brandNames]
  properties:
    name:
      type: string
      description: |
        Display name of the new market. Optional — defaults server-side to
        `<brandDisplayName>-<6 hex>` to disambiguate re-create-after-delete
        and avoid collisions in shared workspaces.
    brandDisplayName:
      type: string
      description: Used as the prefix for the default name when `name` is omitted.
    market:
      type: string
      description: ISO 3166-1 alpha-2 country code; resolved server-side to a Geo Target ID.
      pattern: '^[A-Za-z]{2}$'
    languageCode:
      type: string
      description: Lowercase BCP-47 primary subtag (e.g. en, de, de-ch).
      pattern: '^[a-z]{2,3}(-[a-z]{2,4})?$'
    brandDomain:
      type: string
      description: Brand domain the upstream should track (e.g. adobe.com).
    brandNames:
      type: array
      minItems: 1
      items: { type: string }
      description: Brand-name variants the upstream should match in model answers.

SerenityTag:
  type: object
  required: [id, name]
  properties:
    id: { type: string }
    name: { type: string }

SerenityTagListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items: { $ref: '#/SerenityTag' }

SerenityModel:
  type: object
  required: [id, key]
  properties:
    id: { type: string }
    key:
      type: string
      description: CBF_model value the Reporting API expects.
    name:
      type: [string, 'null']
    icon:
      type: [string, 'null']

SerenityModelListResponse:
  type: object
  required: [items]
  properties:
    items:
      type: array
      items: { $ref: '#/SerenityModel' }

SerenityErrorResponse:
  type: object
  description: |
    Unified error envelope for the /serenity/* surface. `error` is a stable
    machine-readable token (`invalidRequest`, `serenityUpstreamError`,
    `sliceExists`, etc.); `message` is a sanitized human-readable summary.
    Provider-specific detail (upstream HTTP status, raw body) is deliberately
    NOT exposed — it is logged server-side instead.
  required: [error, message]
  properties:
    error: { type: string }
    message: { type: string }

# ── Referral Traffic PG schemas ───────────────────────────────────────────────

ReferralTrafficSource:
  type: string
  enum: [optel, cdn, adobe_analytics, ga4, cja]
  default: optel
  description: "Referral traffic data source. Unrecognised values are silently coerced to `optel` (the default) — the server does not reject out-of-enum values."

ReferralTrafficBusinessImpactSource:
  type: string
  enum: [adobe_analytics, ga4, cja]
  default: adobe_analytics
  description: "Business-impact data source. Unlike the generic referral-traffic endpoints, an unrecognised or non-business-impact source (optel/cdn) returns HTTP 400."

ReferralTrafficHasData:
  type: object
  description: Whether the site has referral traffic data and which sources are available
  properties:
    hasData:
      type: boolean
      example: true
    availableSources:
      type: array
      description: Available sources in priority order; items are `optel` or `cdn` only (optel first)
      items:
        type: string
        enum: [optel, cdn]
      example: ['optel', 'cdn']
  required:
    - hasData
    - availableSources

ReferralTrafficFilterDimensions:
  type: object
  description: Distinct referral traffic filter values for the selected site and date range
  properties:
    platforms:
      type: array
      items:
        type: string
      example: ['ChatGPT', 'Perplexity']
    regions:
      type: array
      items:
        type: string
      example: ['US', 'DE']
    devices:
      type: array
      items:
        type: string
      example: ['desktop', 'mobile']
    pageIntents:
      type: array
      items:
        type: string
      example: ['informational', 'transactional']
    availableSources:
      type: array
      items:
        type: string
      example: ['optel', 'cdn']
  required:
    - platforms
    - regions
    - devices
    - pageIntents
    - availableSources

ReferralTrafficKpis:
  type: object
  description: Aggregated KPI metrics for a site's referral traffic
  properties:
    totalPageviews:
      type: number
      example: 12450
    bounceRate:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for cdn / adobe_analytics / cja; meaningful for optel / ga4
      example: 42.1
    consentRate:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for cdn / adobe_analytics / cja; meaningful for optel / ga4
      example: 88.0
  required:
    - totalPageviews
    - bounceRate
    - consentRate

ReferralTrafficTrendRow:
  type: object
  description: Referral traffic metrics for a single day
  properties:
    date:
      type: string
      format: date
      example: '2026-03-02'
    pageviews:
      type: number
      example: 600
    entries:
      oneOf:
        - type: number
        - type: 'null'
      example: 540
    revenue:
      oneOf:
        - type: number
        - type: 'null'
      description: Non-null only for adobe_analytics / ga4 / cja sources
      example: 1250.5
    bounceRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 41.0
    consentRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 87.0
    avgSessionDuration:
      oneOf:
        - type: number
        - type: 'null'
      example: 132.4
    pagesPerVisit:
      oneOf:
        - type: number
        - type: 'null'
      example: 2.3
    orders:
      oneOf:
        - type: number
        - type: 'null'
      description: Non-null only for adobe_analytics / ga4 / cja sources
      example: 18
    conversionRate:
      oneOf:
        - type: number
        - type: 'null'
      description: Non-null only for adobe_analytics / ga4 / cja sources
      example: 3.1
  required:
    - date
    - pageviews

ReferralTrafficTrend:
  type: object
  description: Referral traffic KPI time series ordered by date ascending
  properties:
    trend:
      type: array
      items:
        $ref: '#/ReferralTrafficTrendRow'
  required:
    - trend

ReferralTrafficByPlatformRow:
  type: object
  properties:
    platform:
      type: string
      example: 'ChatGPT'
    pageviews:
      type: number
      example: 4200
    bounceRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 39.5
    channels:
      type: array
      items:
        type: string
      example: ['referral', 'organic']
    visits:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for optel / cdn sources
      example: 3800
    avgTimeOnSite:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for optel / cdn sources
      example: 142.0
    revenue:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for optel / cdn sources
      example: 980.0
    visitors:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for optel / cdn sources
      example: 3100
    orders:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for optel / cdn sources
      example: 12
  required:
    - platform
    - pageviews
    - channels

ReferralTrafficByPlatform:
  type: object
  description: Referral traffic grouped by platform, ordered by pageviews descending
  properties:
    rows:
      type: array
      items:
        $ref: '#/ReferralTrafficByPlatformRow'
  required:
    - rows

ReferralTrafficByRegionRow:
  type: object
  properties:
    region:
      type: string
      example: 'US'
    pageviews:
      type: number
      example: 3200
  required:
    - region
    - pageviews

ReferralTrafficByRegion:
  type: object
  description: Referral traffic grouped by region, ordered by pageviews descending
  properties:
    rows:
      type: array
      items:
        $ref: '#/ReferralTrafficByRegionRow'
  required:
    - rows

ReferralTrafficByPageIntentRow:
  type: object
  properties:
    pageIntent:
      type: string
      example: 'informational'
    pageviews:
      type: number
      example: 2100
  required:
    - pageIntent
    - pageviews

ReferralTrafficByPageIntent:
  type: object
  description: Referral traffic grouped by page intent, ordered by pageviews descending
  properties:
    rows:
      type: array
      items:
        $ref: '#/ReferralTrafficByPageIntentRow'
  required:
    - rows

ReferralTrafficByUrlRow:
  type: object
  properties:
    urlPath:
      type: string
      example: '/blog/my-post'
    host:
      type: string
      example: 'www.adobe.com'
    pageviews:
      type: number
      example: 1500
    bounceRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 38.0
    consentRate:
      oneOf:
        - type: number
        - type: 'null'
      example: 86.0
    pageIntent:
      oneOf:
        - type: string
        - type: 'null'
      example: 'informational'
    entries:
      oneOf:
        - type: number
        - type: 'null'
      example: 1320
    exits:
      oneOf:
        - type: number
        - type: 'null'
      example: 980
    avgTimeOnSite:
      oneOf:
        - type: number
        - type: 'null'
      example: 128.5
    revenue:
      oneOf:
        - type: number
        - type: 'null'
      example: 540.0
  required:
    - urlPath
    - host
    - pageviews

ReferralTrafficByUrl:
  type: object
  description: Paginated per-URL referral traffic performance analysis
  properties:
    totalCount:
      type: number
      description: Total number of URLs matching the filters (across all pages)
      example: 1240
    rows:
      type: array
      items:
        $ref: '#/ReferralTrafficByUrlRow'
      description: URLs for the requested page
  required:
    - totalCount
    - rows

ReferralTrafficUrlTrendRow:
  type: object
  properties:
    weekStart:
      type: string
      format: date
      example: '2026-03-02'
    pageviews:
      type: number
      example: 320
  required:
    - weekStart
    - pageviews

ReferralTrafficUrlTrend:
  type: object
  description: Weekly pageview trend for a single URL
  properties:
    trend:
      type: array
      items:
        $ref: '#/ReferralTrafficUrlTrendRow'
  required:
    - trend

ReferralTrafficByDeviceRow:
  type: object
  properties:
    device:
      type: string
      example: 'desktop'
    pageviews:
      type: number
      example: 5400
    bounceRate:
      oneOf:
        - type: number
        - type: 'null'
      description: Null for cdn / adobe_analytics / cja sources
      example: 40.0
  required:
    - device
    - pageviews

ReferralTrafficByDevice:
  type: object
  description: Referral traffic grouped by device, ordered by pageviews descending
  properties:
    rows:
      type: array
      items:
        $ref: '#/ReferralTrafficByDeviceRow'
  required:
    - rows

ReferralTrafficBusinessImpact:
  type: object
  description: Aggregated business impact metrics; only available for adobe_analytics / ga4 / cja sources
  properties:
    source:
      type: string
      enum: [adobe_analytics, ga4, cja]
      example: 'adobe_analytics'
    totalPageviews:
      type: number
      example: 12450
    metrics:
      type: object
      properties:
        visits:
          type: number
          example: 9800
        bounceRate:
          oneOf:
            - type: number
            - type: 'null'
          example: 41.0
        entries:
          oneOf:
            - type: number
            - type: 'null'
          example: 8900
        avgSessionDuration:
          oneOf:
            - type: number
            - type: 'null'
          example: 135.0
        pagesPerVisit:
          oneOf:
            - type: number
            - type: 'null'
          example: 2.4
        conversionRate:
          oneOf:
            - type: number
            - type: 'null'
          example: 3.0
        orders:
          type: number
          example: 120
        revenue:
          type: number
          example: 15400.0
      required:
        - visits
        - orders
        - revenue
  required:
    - source
    - totalPageviews
    - metrics

ReferralTrafficWeekEntry:
  type: object
  description: An ISO week for which the site has referral traffic data
  properties:
    week:
      type: string
      description: ISO week label (YYYY-WNN)
      example: '2026-W10'
    startDate:
      oneOf:
        - type: string
          format: date
        - type: 'null'
      example: '2026-03-02'
    endDate:
      oneOf:
        - type: string
          format: date
        - type: 'null'
      example: '2026-03-08'
  required:
    - week

ReferralTrafficWeeks:
  type: object
  description: Available ISO weeks for the site's referral traffic data
  properties:
    weeks:
      type: array
      items:
        $ref: '#/ReferralTrafficWeekEntry'
  required:
    - weeks
