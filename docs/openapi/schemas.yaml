        domain:
          type: string
          description: The domain that was processed.
        baseURL:
          type: string
          format: uri
          description: The normalized base URL (present for action=created).
        reason:
          type: string
          description: Human-readable reason for the action (present for rejected/duplicate).
    error:
      type: object
      description: The error of the site detection job if it failed with an exception. Absent when no exception occurred.
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.

