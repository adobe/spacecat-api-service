      type: string
      format: uri
      description: The URL that was analyzed
      example: 'https://example.com/page1'
    predominantTraffic:
      type: string
      description: |
        The predominant traffic type for this URL. Can be 'paid', 'earned', 'owned',
        'mixed' (no single type reaches threshold), or 'no traffic' (no data available).
      enum:
        - paid
        - earned
        - owned
        - mixed
        - no traffic
      example: 'paid'
    details:
      type: object
      description: Detailed traffic breakdown showing percentage of traffic from each type
      required:
        - paid
        - earned
        - owned
      properties:
        paid:
          type: number
          description: Percentage of traffic from paid sources
          minimum: 0
          maximum: 100
          example: 85.5
        earned:
          type: number
          description: Percentage of traffic from earned sources
          minimum: 0
          maximum: 100
          example: 10.3
        owned:
          type: number
          description: Percentage of traffic from owned sources
          minimum: 0
          maximum: 100
          example: 4.2

LlmoQuestion:
  type: object
  required:
    - key
    - question
  properties:
    key:
      description: Unique identifier for the question
      type: string
      format: uuid
      example: '123e4567-e89b-12d3-a456-426614174000'
    question:
      description: The question text
      type: string
      example: 'What is the main value proposition of this product?'
    source:
      description: Source of the question
      type: string
      example: 'human'
    country:
      description: Country context for the question
      type: string
      example: 'US'
    product:
      description: Product context for the question
      type: string
      example: 'Adobe Creative Cloud'
    volume:
      description: Volume or traffic context
      type: string
      example: 'high'
    importTime:
      description: Time when the question was imported
      type: string
      format: date-time
      example: '2024-01-20T12:00:00Z'
    keyword:
      description: Associated keyword for the question
      type: string
      example: 'creative software'
    url:
      description: URL context for the question
      type: string
      format: uri
      example: 'https://www.adobe.com/creativecloud.html'
    tags:
      description: Array of tags associated with the question
      type: array
      items:
        type: string
      example: ['product', 'pricing', 'features']
