    One topic from Semrush `GapTopicsResponse.Topic` as protobuf JSON (camelCase).
    UInt64 fields may be serialized as JSON strings.
  properties:
    hash:
      description: Topic identifier (`uint64`)
      oneOf:
        - type: string
        - type: integer
    name:
      type: string
    gapMentions:
      type: array
      description: Per-brand mention counts included in the gap for this topic
      items:
        $ref: '#/AiVisibilityV1TopicGapTopicMentionsByBrand'
    visibility:
      type: integer
      description: AI Visibility score (0–100)
    mentions:
      type: integer
      description: Prompt responses mentioning the target brand in this topic
    volume:
      description: Topic search volume (`uint64`)
      oneOf:
        - type: string
        - type: integer
    difficulty:
      type: integer
      description: Topic difficulty (0–100)
    volumeTrend:
      type: array
      description: Historical volume scores per Semrush
      items:
        oneOf:
          - type: string
          - type: integer
    intents:
      type: array
      items:
        $ref: '#/AiVisibilitySemrushTopicIntentEntry'
    country:
      description: Market (COUNTRY enum name or integer)
      oneOf:
        - $ref: '#/AiVisibilitySemrushCountry'
        - type: integer
  additionalProperties: true

AiVisibilityV1TopicGapTopicsTotalRow:
