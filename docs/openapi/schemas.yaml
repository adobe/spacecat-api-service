      type: integer
      description: Intent weight within the distribution (0–100 scale per Semrush)
  additionalProperties: true

AiVisibilityV1BrandStatsByLLMEntry:
  type: object
  description: |
    One row from Semrush `StatsByLLMResponse.LLMEntry` as protobuf JSON (camelCase).
    UInt64 fields may be serialized as JSON strings.
  properties:
    date:
      $ref: '#/AiVisibilitySemrushDate'
    llm:
      $ref: '#/AiVisibilitySemrushLlm'
    mentions:
      description: Prompt responses mentioning the target brand
      oneOf:
        - type: string
        - type: integer
    audience:
      description: Estimated audience for the brand
      oneOf:
        - type: string
        - type: integer
    citations:
      description: Citations for the brand
      oneOf:
        - type: string
        - type: integer
    ownedSources:
      description: Citations from the brand domain
      oneOf:
        - type: string
        - type: integer
    aiVisibility:
      type: integer
      description: AI Visibility score for the brand
    isoDate:
      type: string
      description: Normalized ISO date (`YYYY-MM` or `YYYY-MM-DD`)
  additionalProperties: true

AiVisibilityV1BrandStatsByLLMResponse:
  type: object
  description: |
    Brand statistics by LLM from `GET /llmo/ai-visibility/v1/brand/stats-by-llm`.
    Native Semrush v2 `StatsByLLMResponse` protobuf JSON plus `srFilters` from the API layer.
  properties:
    target:
      $ref: '#/AiVisibilitySemrushBrand'
    llm:
      type: array
      items:
        $ref: '#/AiVisibilityV1BrandStatsByLLMEntry'
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilityV1BrandStatsByCountryEntry:
  type: object
  description: |
    One row from Semrush `StatsByCountryResponse.ByCountry` as protobuf JSON (camelCase).
    UInt64 fields may be serialized as JSON strings.
  properties:
    country:
      description: Market for the grouped statistics
      oneOf:
        - $ref: '#/AiVisibilitySemrushCountry'
        - type: integer
    mentions:
      description: Prompt responses mentioning the target brand
      oneOf:
        - type: string
        - type: integer
    audience:
      description: Estimated audience for the brand
      oneOf:
        - type: string
        - type: integer
    ownedSources:
      description: Citations from the brand domain
      oneOf:
        - type: string
        - type: integer
  additionalProperties: true

AiVisibilityV1BrandStatsByCountryResponse:
  type: object
  description: |
    Brand statistics by country from `GET /llmo/ai-visibility/v1/brand/stats-by-country`.
    Native Semrush v2 `StatsByCountryResponse` protobuf JSON plus `srFilters` from the API layer.
  properties:
    byCountry:
      type: array
      items:
        $ref: '#/AiVisibilityV1BrandStatsByCountryEntry'
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilityV1TopicBrandTopicRow:
  type: object
  description: |
    One topic from Semrush `BrandTopicsResponse.Topic` as protobuf JSON (camelCase).
    UInt64 fields may be serialized as JSON strings.
  properties:
    id:
      description: Topic identifier (`uint64`)
      oneOf:
        - type: string
        - type: integer
    name:
      type: string
    visibility:
      type: integer
      description: AI Visibility score (0–100)
    difficulty:
      type: integer
      description: Topic difficulty (0–100)
    mentions:
      description: Prompt responses mentioning the target brand in this topic
      oneOf:
        - type: string
        - type: integer
    volume:
      description: Topic search volume
      oneOf:
        - type: string
        - type: integer
    volumeTrend:
      type: array
      description: Historical volume scores (0.0–1.0 scale as uint32 per Semrush)
      items:
        type: integer
    intents:
      type: array
      items:
        $ref: '#/AiVisibilitySemrushTopicIntentEntry'
    country:
      description: Market (COUNTRY enum name or integer)
      oneOf:
        - $ref: '#/AiVisibilitySemrushCountry'
        - type: integer
  additionalProperties: true

AiVisibilityV1TopicBrandTopicsResponse:
  type: object
  description: |
    Brand topics list from `GET /llmo/ai-visibility/v1/topic/brand-topics`.
    Wraps Semrush v2 topic `BrandTopics` JSON plus `srFilters` from the API layer.
    For the total count, use `GET /llmo/ai-visibility/v1/topic/brand-topics-totals`.
  properties:
    data:
      type: array
      items:
        $ref: '#/AiVisibilityV1TopicBrandTopicRow'
    srFilters:
      $ref: '#/AiVisibilitySrFilters'
  additionalProperties: true

AiVisibilityV1TopicBrandTopicsExportResponse:
