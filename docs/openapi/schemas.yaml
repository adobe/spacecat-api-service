    oneOf:
      - $ref: './schemas.yaml#/PageOrganicKeywords'
DocImportData:
  title: 'Doc Import'
  description: 'There are no data properties available for doc based imports.'
  properties: {}
DAImportData:
  title: 'DA Import'
  description: 'There are no data properties available for DA based imports.'
  properties: {}
XWalkImportData:
  title: 'Xwalk Import'
  properties:
    siteName:
      type: string
    assetFolder:
      type: string
  required:
    - siteName
    - assetFolder

BrowserOptions:
  description: Common browser options for page loading operations
  properties:
    pageLoadTimeout:
      description: The time in milliseconds to wait for the page to load
      type: integer
    enableJavascript:
      description: Whether to enable JavaScript on the page
      type: boolean
      default: true
  example:
    pageLoadTimeout: 200
    enableJavascript: true

ImportOptionsBase:
  description: Base options for import operations, extends BrowserOptions with import-specific features
  allOf:
    - $ref: '#/BrowserOptions'
    - type: object
      properties: {}
  example:
    pageLoadTimeout: 200
    enableJavascript: true

ImportOptions:
  allOf: #/ImportOptionsBase
    - $ref: '#/ImportOptionsBase'
  properties:
    type:
      enum: ['doc', 'xwalk', 'da']
      description: The type of import job. Valid options are 'doc', 'da' or 'xwalk'.
      type: string
      default: 'doc'
    data:
      description: Optional data to pass to the import job.
      type: object
      oneOf:
        - $ref: '#/DocImportData'
        - $ref: '#/XWalkImportData'
        - $ref: '#/DAImportData'

ImportJobRequest:
  type: object
  required:
    - urls
  properties:
    urls:
      description: The URLs to import
      type: array
      items:
        $ref: '#/URL'
    options:
      description: Optional configuration params, defined as a JSON object
      $ref: '#/ImportOptions'
    importScript:
      description: Optional import.js mapping file
      type: string
      format: binary
    customHeaders:
      description: Optional custom headers to send with each HTTP request
      type: object
  example:
    urls:
      - 'https://example.com/en/page1'
      - 'https://example.com/fr/page2'
    options:
      enableJavascript: true
    importScript: (binary data)
    customHeaders:
      example-header-name: 'example-header-value'
ImportJobStatus:
  type: object
  properties:
    id:
      description: The ID of the import job
      $ref: '#/Id'
    status:
      description: The status of the import job
      type: string
      enum:
        - 'RUNNING'
        - 'COMPLETE'
        - 'FAILED'
    startTime:
      description: The date and time when the import job started.
      $ref: '#/DateTime'
    endTime:
      description: The date and time when the import job ended, if finished.
      $ref: '#/DateTime'
    urlCount:
      description: The total number of URLs in the job.
      type: integer
    successCount:
      description: The number of URLs successfully imported.
      type: integer
    failedCount:
      description: The number of URLs that failed to import.
      type: integer
    redirectCount:
      description: The number of URLs that were redirected.
      type: integer
  example:
    id: '12d6ac8e-d5e4-4788-90eb-b69e10e745fd'
    status: 'RUNNING'
    startTime: '2024-01-19T14:20:30Z'
    urlCount: 25
    successCount: 15
    failedCount: 0
ImportJobProgress:
  type: object
  properties:
    pending:
      type: integer
      description: The number of pending url jobs still to process.
    redirect:
      type: integer
      description: The number of urls that resulted in a redirect.
    running:
      type: integer
      description: The number of url jobs that are running.
    completed:
      type: integer
      description: The number of url jobs that have completed.
    failed:
      type: integer
      description: The number of url jobs that have failed.
  example:
    pending: 0
    redirect: 0
    running: 0
    completed: 1
    failed: 0
ImportJobArchive:
  type: object
  properties:
    jobId:
      description: The ID of the import job
      $ref: '#/Id'
    downloadUrl:
      description: The pre-signed URL to download the archive of the import job
      $ref: '#/URL'
  example:
    jobId: '12d6ac8e-d5e4-4788-90eb-b69e10e745fd'
    downloadUrl: 'https://spacecat-example-bucket.s3.example-region.amazonaws.com/import/12d6ac8e-d5e4-4788-90eb-b69e10e745fd/import-result.zip?X-Amz-Algorithm=AWS...'
ScrapeOptions:
  description: Options specific to scraping operations, extends BrowserOptions with scraping-specific features
  allOf:
    - $ref: '#/BrowserOptions'
    - type: object
      properties:
        hideConsentBanners:
          description: Whether to hide consent banners on the page
          type: boolean
          default: false
        waitForSelector:
          description: The selector to wait for before considering the page loaded
          type: string
          pattern: '^[.#]?[a-zA-Z][a-zA-Z0-9_-]*(\.[a-zA-Z][a-zA-Z0-9_-]*)*$'
        sectionLoadWaitTime:
          description: The time in milliseconds to wait for the section to load
          type: integer
          minimum: 0
          maximum: 30000
          default: 2000
        screenshotTypes:
          description: The types of screenshots to take
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string
            enum:
              - 'fullPage'
              - 'thumbnail'
              - 'section'
              - 'block'
              - 'scroll'
        rejectRedirects:
          description: Whether to reject redirects
          type: boolean
          default: true
  example:
    pageLoadTimeout: 200
    enableJavascript: true
    hideConsentBanners: true
ScrapeRequest:
  type: object
  required:
    - urls
    - processingType
  properties:
    processingType:
      description: The name of the scrape handler to use.
      type: string
      default: 'default'
    maxScrapeAge:
      description: The maximum age of a scrape in hours. Providing the value of 0 will result in forcing the scrape (disabling this caching feature)
      type: integer
      minimum: 0
      default: 24
    options:
      description: Optional configuration params, defined as a JSON object
      $ref: '#/ScrapeOptions'
    customHeaders:
      description: Optional custom headers to send with each HTTP request
      type: object
    urls:
      description: The URLs to scrape. The URLs must be unique.
      type: array
      items:
        type: string
        format: url
      example:
        - 'https://example.com/en/page1'
        - 'https://example.com/fr/page2'

ScrapeResponse:
  type: object
  properties:
    id:
      description: The ID of the scrape job
      $ref: '#/Id'
    baseURL:
      description: The base URL of the scrape job
      type: string
      format: uri
    processingType:
      description: The scrape handler to use for the scrape job
      type: string
    startedAt:
      description: The date and time when the scrape job started
      type: string
      format: date-time
    endedAt:
      description: The date and time when the scrape job ended, if finished
      type: string
      format: date-time
    duration:
      description: The duration of the scrape job in milliseconds
      type: integer
      format: int32
    status:
      description: The status of the scrape job
      type: string
      enum:
        - 'IN_PROGRESS'
        - 'COMPLETE'
        - 'FAILED'
    urlCount:
      description: The total number of URLs in the job
      type: integer
    successCount:
      description: The number of URLs successfully scraped
      type: integer
    failedCount:
      description: The number of URLs that failed to scrape
      type: integer

  example:
    id: '12d6ac8e-d5e4-4788-90eb-b69e10e745fd'
    baseURL: 'https://myBaseUrl.com'
    processingType: 'default'
    options:
      enableJavascript: true
      hideConsentBanners: true
    startedAt: '2024-01-19T14:20:30Z'
    endedAt: '2024-01-19T14:20:30Z'
    duration: 33771,
    status: 'COMPLETE'
    urlCount: 10
    successCount: 9
    failedCount: 1

ScrapeJobUrlResultsResponse:
  type: object
