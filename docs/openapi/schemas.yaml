      format: date-time
    jobId:
      type: string
      format: uuid
      description: The ID of the newly created site detection job.
    pollUrl:
      type: string
      format: uri
      description: The URL to poll for the status of the site detection job.
    status:
      type: string
      enum: [IN_PROGRESS]
      description: Always IN_PROGRESS immediately after creation.

SiteDetectionJobResponse:
  type: object
  required: [jobId, status, createdAt, updatedAt]
  properties:
    createdAt:
      type: string
      format: date-time
    jobId:
      type: string
      format: uuid
      description: The ID of the site detection job.
    status:
      type: string
      enum: [IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
    updatedAt:
      type: string
      format: date-time
    result:
      type: object
      description: The result of the site detection job once completed or failed. Absent when the job is still IN_PROGRESS.
      properties:
        action:
          type: string
