state-access-mappings:
  get:
    tags:
      - state-access-mappings
    summary: List active state-layer access mappings
    description: |
      Returns active (non-revoked) `facs_access_mappings` rows scoped to the
      caller's IMS org and product.

      At least one of (`subjectType` + `subjectId`) or (`resourceType` +
      `resourceId`) must be supplied. Pagination is cursor-based; page size
      defaults to 50 and is hard-capped at 200.

      Authority (hybrid-model §8.3): a FACS-layer `can_manage_users` holder (or
      admin) may read org-wide. A state-layer manager may read **only**
      resource-scoped (`resourceType` + `resourceId`) and only on resources
      where they hold state `can_manage_users` — org-wide reads (no resource
      filter) are FACS-only and return `403` for a state-layer manager.
    operationId: listStateAccessMappings
    parameters:
      - in: query
        name: subjectType
        schema: { type: string, enum: [user, org] }
      - in: query
        name: subjectId
        schema: { type: string }
      - in: query
        name: resourceType
        schema: { type: string }
      - in: query
        name: resourceId
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - in: query
        name: cursor
        schema: { type: string }
    responses:
      '200':
        description: Page of access mappings.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMappingsListResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []

  post:
    tags:
      - state-access-mappings
    summary: Create (upsert) a state-layer access mapping
    description: |
      Inserts one `facs_access_mappings` binding row. Capability is
      validated against the product's capability catalog. For `subjectType:
      org`, `subjectId` must equal the caller's canonical org id.

      **Upsert semantics:** when an active binding already exists for the same
      subject + resource, its `grantedCapabilities` are **overwritten** with the
      request's set (the given capabilities *replace* the stored ones — this is
      not a merge) and the endpoint returns `200` with the updated mapping. A
      brand-new binding returns `201`.

      `grantedCapabilities` must be non-empty (a `400` is returned otherwise — to
      remove all access, use `DELETE` on the created row). The product's
      `<product>/can_view` is always added as a baseline if the request omits it,
      so the persisted set may contain one more capability than was sent.

      Authority (hybrid-model §8.3): a FACS-layer `can_manage_users` holder (or
      admin) may write on any resource. A state-layer manager may write **only**
      on resources where they hold state `can_manage_users` (`403` otherwise),
      and may never grant `can_manage_users` itself (FACS-only). The same rules
      apply to `PATCH` (evaluated against the target row's resource).
    operationId: createStateAccessMapping
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/StateAccessMappingCreateRequest'
    responses:
      '200':
        description: >-
          An active mapping already existed for this subject and resource; its
          granted capabilities were overwritten with the request's set (upsert).
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMapping'
      '201':
        description: Mapping created.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMapping'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '409':
        description: >-
          Rare race: an active mapping existed at insert time but was revoked
          before its capabilities could be overwritten. Safe to retry.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMappingConflictResponse'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []

state-access-mappings-history:
  get:
    tags:
      - state-access-mappings
    summary: List state-layer access mappings (active + revoked)
    description: |
      Audit-trail view. Same filters and pagination as
      `GET /state/access-mappings` but includes tombstoned (revoked) rows.
    operationId: listStateAccessMappingHistory
    parameters:
      - in: query
        name: subjectType
        schema: { type: string, enum: [user, org] }
      - in: query
        name: subjectId
        schema: { type: string }
      - in: query
        name: resourceType
        schema: { type: string }
      - in: query
        name: resourceId
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - in: query
        name: cursor
        schema: { type: string }
    responses:
      '200':
        description: Page of access mappings (active + revoked).
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMappingsListResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []

state-access-mapping-by-id:
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  patch:
    tags:
      - state-access-mappings
    summary: Replace the granted capabilities on a mapping
    description: |
      Single-field mutation: replaces the row's `grantedCapabilities` array.
      The array must be **non-empty** — to remove access (empty the set) use
      `DELETE` on this resource. The product's `<product>/can_view` is always
      included: if the request omits it, it is added automatically. 404 when the
      row does not exist, has been revoked, or belongs to a different
      org / product.
    operationId: patchStateAccessMapping
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/StateAccessMappingPatchRequest'
    responses:
      '200':
        description: Updated mapping.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMapping'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []
  delete:
    tags:
      - state-access-mappings
    summary: Remove access (empty the granted capabilities)
    description: |
      Empties the row's `grantedCapabilities` (sets it to `[]`), leaving the
      binding active but granting nothing — the supported way to remove access.
      The row is **not** tombstoned/revoked; capabilities can be re-added later
      via `PATCH`. Idempotent: calling `DELETE` on an already-empty row returns
      `200` with the unchanged row. 404 when the row does not exist, has been
      revoked, or belongs to a different org / product.
    operationId: deleteStateAccessMapping
    responses:
      '200':
        description: The mapping with its capabilities emptied.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StateAccessMapping'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []

product-capabilities:
  get:
    tags:
      - state-access-mappings
    summary: List the capabilities the caller may assign
    description: |
      Returns the de-duplicated, sorted catalog of capability strings the
      caller may **assign** to others under the product, shaped by the
      caller's management authority (hybrid-model §8.3):

        - FACS-layer manager (or admin) → the full catalog, including
          `<product>/can_manage_users`.
        - Otherwise (state-layer manager / any other caller) → the full
          catalog **minus** `<product>/can_manage_users` — a state-layer
          manager can assign every other capability but cannot mint new
          managers.
    operationId: getProductCapabilities
    responses:
      '200':
        description: Product capability catalog.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/ProductCapabilitiesResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - ims_key: []

user-capabilities-by-resource:
  get:
    tags:
      - state-access-mappings
    summary: Caller's effective capability set for one resource
    description: |
      Computes the union of:
        - JWT `facs_permissions` (filtered to the product), and
        - state-layer `granted_capabilities` for `(user, resource)` and
          `(org, resource)`.

      Reports per-capability provenance with tags from `jwt`, `state:user`,
      `state:org`. When the product has multiple FACS resource types, the
      caller must supply `?resourceType=<type>`.
    operationId: getUserCapabilities
    parameters:
      - in: path
        name: resourceId
        required: true
        schema: { type: string }
      - in: query
        name: resourceType
        required: false
        schema: { type: string }
    responses:
      '200':
        description: Effective capability set with provenance.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UserCapabilitiesResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []

permission-audit-logs:
  parameters:
    - in: path
      name: organizationId
      required: true
      description: SpaceCat organization UUID. Its IMS org id is resolved server-side and used as the tenant-isolation key.
      schema: { type: string, format: uuid }
  get:
    tags:
      - state-access-mappings
    summary: List the FACS state-mapping audit log for an organization
    description: |
      Returns the `facs_access_mapping_audit_events` for the org, scoped to the
      caller's product. Every create / patch / delete / revoke on a state-layer
      binding is logged with its outcome; this is the operation history behind
      the hybrid permission model.

      Authority (hybrid-model §3): this is an **org-wide** read, admitted for a
      FACS-layer `<product>/can_manage_users` holder (or admin) only — a
      resource-scoped state-layer manager has no org-wide audit view and is
      denied. Tenant isolation: a non-admin caller may read only their OWN org's
      audit (the resolved org's IMS id must equal the caller's).

      Pagination is cursor-based; page size defaults to 50 and is hard-capped at
      200. Optional filters narrow the log by operation, outcome, resource,
      actor, mapping, and time window.
    operationId: listFacsPermissionAuditLogs
    parameters:
      - in: query
        name: operation
        description: Filter by operation kind (e.g. `create`, `patch`, `delete`, `revoke`).
        schema: { type: string }
      - in: query
        name: outcome
        description: Filter by outcome (e.g. `allowed`, `denied`).
        schema: { type: string }
      - in: query
        name: resourceType
        schema: { type: string }
      - in: query
        name: resourceId
        schema: { type: string }
      - in: query
        name: actorId
        description: Filter by the IMS ident of the acting caller.
        schema: { type: string }
      - in: query
        name: mappingId
        description: Filter by the affected access-mapping row id.
        schema: { type: string, format: uuid }
      - in: query
        name: since
        description: Lower bound (inclusive) on event time, ISO 8601.
        schema: { type: string, format: date-time }
      - in: query
        name: until
        description: Upper bound (exclusive) on event time, ISO 8601.
        schema: { type: string, format: date-time }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      - in: query
        name: cursor
        schema: { type: string }
    responses:
      '200':
        description: Page of audit events.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/FacsAuditLogsResponse'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: []
