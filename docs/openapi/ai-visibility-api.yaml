ai-visibility-v1-topic-brand-topics:
  get:
    tags: [ai-visibility]
    summary: Get brand topics (Topic v2 JSON)
    description: |
      Returns brand-associated topics using Semrush `TopicService` v2 `BrandTopics` and
      `BrandTopicsTotals`. Unlike `/llmo/ai-visibility/brands/topics`, this route fixes prompt
      categories to `MENTIONS_TARGET` and `CITES_TARGET`, returns each topic as **native protobuf JSON**
      (camelCase), and supports `sortBy` / `sortDirection` on `BRAND_TOPICS_ORDER_BY` (default
      `VISIBILITY` descending). Row fields include `visibility`, `difficulty`, `volumeTrend`, and
      `intents` (`TOPIC_INTENT` distribution). The response body is `{ data, total }` plus `srFilters`;
      `offset` and `limit` are not echoed (use the query parameters).

      ### Filters

      The endpoint accepts optional filters that are forwarded as Semrush QL strings on both the
      list and totals requests:

      - `searchQuery` → `dimension_filter_ql: topic CONTAINS "<searchQuery>"` (backslash and
        double-quote characters in the value are escaped automatically).
      - `volumeFrom` / `volumeTo` → `metric_filter_ql` on `volume`. Supplying only one bound emits
        `volume >= volumeFrom` or `volume <= volumeTo`; supplying both emits the closed range
        `volume >= volumeFrom AND volume <= volumeTo`. Non-negative integers only —
        invalid values return HTTP 400 `invalid_volume`.
      - `visibilityFrom` / `visibilityTo` → `metric_filter_ql` on `visibility` with the same
        single-bound semantics. Integers in `[0, 100]` only — invalid values return HTTP 400
        `invalid_visibility`.

      When both volume and visibility ranges are supplied they are joined with ` AND ` into a
      single `metric_filter_ql` value.
    operationId: getAiVisibilityV1TopicBrandTopics
    parameters:
      - *domainParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1BrandTopicsSortByParam
      - *sortDirectionParam
      - *v1BrandTopicsSearchQueryParam
      - *v1BrandTopicsVolumeFromParam
      - *v1BrandTopicsVolumeToParam
      - *v1BrandTopicsVisibilityFromParam
      - *v1BrandTopicsVisibilityToParam
      - *limitParam
      - *offsetParam
    responses:
      '200':
        description: Brand topics (v2 topic payload) retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AiVisibilityV1TopicBrandTopicsResponse'
      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-topic-brand-topics-totals:
  get:
    tags: [ai-visibility]
    summary: Get brand topics count (Topic v2)
    description: |
      Returns only the total count of brand-associated topics matching the request filters,
      using Semrush `TopicService` v2 `BrandTopicsTotals`. Accepts the same filter parameters
      as `GET /llmo/ai-visibility/v1/topic/brand-topics` (`searchQuery`, `volumeFrom`/`volumeTo`,
      `visibilityFrom`/`visibilityTo`) but no pagination or sort parameters.

      Use this endpoint to populate tab badge counts without fetching full paginated data.
    operationId: getAiVisibilityV1TopicBrandTopicsTotals
    parameters:
      - *domainParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1BrandTopicsSearchQueryParam
      - *v1BrandTopicsVolumeFromParam
      - *v1BrandTopicsVolumeToParam
      - *v1BrandTopicsVisibilityFromParam
      - *v1BrandTopicsVisibilityToParam
    responses:
      '200':
        description: Brand topics count retrieved successfully
        content:
          application/json:
            schema:
