      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-topic-gap-topics:
  get:
    tags: [ai-visibility]
    summary: Get gap topics (Topic v2 JSON)
    description: |
      Returns topics with the gap between the target brand and its competitors using Semrush
      `TopicService` v2 `GapTopics`. Returns each topic as **native protobuf JSON** (camelCase)
      including `gapMentions` per competitor brand. Supports `sortBy` / `sortDirection` on
      `TOPICS_REQUEST_ORDER_BY` (default `TOTAL_COMPETITOR_MENTIONS` descending).
      The response body is `{ data }` plus `srFilters`; `offset` and `limit` are not echoed
      (use the query parameters). For per-kind totals, use
      `GET /llmo/ai-visibility/v1/topic/gap-topics-totals`.

      ### Filters

      The endpoint accepts optional filters that are forwarded as Semrush QL strings:

      - `searchQuery` → `dimension_filter_ql: topic CONTAINS "<searchQuery>"` (backslash and
        double-quote characters in the value are escaped automatically).
      - `volumeFrom` / `volumeTo` → `metric_filter_ql` on `volume`. Supplying only one bound
        emits `volume >= volumeFrom` or `volume <= volumeTo`; supplying both emits the closed
        range `volume >= volumeFrom AND volume <= volumeTo`. Non-negative integers only —
        invalid values return HTTP 400 `invalid_volume`.
      - `gapKinds` → Semrush v2 `GapTopicsRequest.kind[]` (default `ALL`).
    operationId: getAiVisibilityV1TopicGapTopics
    parameters:
      - *domainParam
      - *competitorsParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1GapTopicsSortByParam
      - *sortDirectionParam
      - *v1GapTopicsGapKindsParam
      - *v1BrandTopicsSearchQueryParam
      - *v1BrandTopicsVolumeFromParam
      - *v1BrandTopicsVolumeToParam
      - *limitParam
      - *offsetParam
    responses:
      '200':
        description: Gap topics (v2 topic payload) retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AiVisibilityV1TopicGapTopicsResponse'
      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-topic-gap-topics-totals:
  get:
    tags: [ai-visibility]
    summary: Get gap topics per-kind counts (Topic v2)
    description: |
      Returns only the per-kind totals for gap topics using Semrush `TopicService` v2
      `GapTopicsTotals`. Accepts `searchQuery` and `volumeFrom`/`volumeTo` filter parameters
      (same semantics as `GET /llmo/ai-visibility/v1/topic/gap-topics`) but no pagination,
      sort, or `gapKinds` parameters. The response always includes totals for all gap kinds —
      `GapTopicsTotals` returns a per-kind breakdown unconditionally.

      Use this endpoint to populate the Topic Opportunities tab badge count without fetching
      full paginated data.
    operationId: getAiVisibilityV1TopicGapTopicsTotals
    parameters:
      - *domainParam
      - *competitorsParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1BrandTopicsSearchQueryParam
      - *v1BrandTopicsVolumeFromParam
      - *v1BrandTopicsVolumeToParam
    responses:
      '200':
        description: Gap topics per-kind counts retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AiVisibilityV1TopicGapTopicsTotalsResponse'
      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-prompt-brand-prompts:
  get:
    tags: [ai-visibility]
    summary: Get brand prompts (Prompt v2 JSON)
    description: |
      Returns prompts for the target domain using Semrush `PromptService` v2 `Prompts` and
      `PromptsTotals`. Unlike `/llmo/ai-visibility/brands/prompts`, this route fixes prompt
      categories to `MENTIONS_TARGET` and `CITES_TARGET`, returns each row as **native protobuf JSON**
      (camelCase) with `PROMPT_CATEGORY` in `categories`, and supports `sortBy` / `sortDirection` on
      `PROMPTS_REQUEST_ORDER_BY` (default `MENTIONED_BRANDS_COUNT` descending). Responds with
      `{ data, total }` plus `srFilters`; `offset` and `limit` are not echoed (use the query parameters).
      Optional `topicId` applies a `topic_hash = <topicId>` dimension filter.
    operationId: getAiVisibilityV1PromptBrandPrompts
    parameters:
      - *domainParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1PromptsSortByParam
      - *sortDirectionParam
