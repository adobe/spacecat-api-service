        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AiVisibilityV1PromptBrandPromptsResponse'
      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-prompt-gap-prompts:
  get:
    tags: [ai-visibility]
    summary: Get gap prompts (Prompt v2 JSON)
    description: |
      Returns prompts with the gap between the target brand and its competitors using Semrush
      `PromptService` v2 `GapPrompts` and `GapPromptsTotals`. Returns each row as **native
      protobuf JSON** (camelCase) including `gapMentions` per competitor brand. Supports
      `sortBy` / `sortDirection` on `GAP_PROMPTS_REQUEST_ORDER_BY` (default
      `MENTIONED_BRANDS_COUNT` descending). The response body is `{ data, totals }` plus
      `srFilters`; `offset` and `limit` are not echoed (use the query parameters).

      ### Filters

      The endpoint accepts the following optional filters, forwarded as native protobuf fields
      on both the list and totals requests (no QL filters):

      - `gapKinds` → Semrush v2 `GapPromptsRequest.kinds[]` (default `ALL`).
      - `topicId` → native `GapPromptsRequest.topic_hash` (uint64) — narrows results to a single topic.
      - `sourceDomain` → native `GapPromptsRequest.source_domain` — narrows results to a single source domain.
    operationId: getAiVisibilityV1PromptGapPrompts
    parameters:
      - *domainParam
      - *competitorsParam
      - *countryParam
      - *regionParam
      - *engineParam
      - *v1GapPromptsSortByParam
      - *sortDirectionParam
      - *v1GapTopicsGapKindsParam
      - *topicIdOptionalParam
      - *v1GapPromptsSourceDomainParam
      - *limitParam
      - *offsetParam
    responses:
      '200':
        description: Gap prompts (v2 prompt payload) retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AiVisibilityV1PromptGapPromptsResponse'
      <<: *errorResponses
    security:
      - api_key: []

ai-visibility-v1-prompt-prompt-response:
  get:
    tags: [ai-visibility]
    summary: Get full prompt response (Relations v1 JSON)
    description: |
      Returns the full LLM response for a single prompt via Semrush `Relations/Prompt`
