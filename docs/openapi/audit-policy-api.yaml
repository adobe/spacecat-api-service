# ─────────────────────────────── schemas ──────────────────────────────

AuditPolicy:
  type: object
  properties:
    siteId: { type: string, format: uuid }
    version: { type: integer }
    budget: { type: integer, minimum: 1, maximum: 500000 }
    strategyName: { type: string, enum: [tiered] }
    exclusionGlobs: { type: array, items: { type: string, maxLength: 2048 }, maxItems: 200 }
    manualUrls: { type: array, items: { type: string, maxLength: 2048 }, maxItems: 2000 }
    scopeConfig: { type: object }
    lifecycleOverrides: { type: object }
    createdBy: { type: [string, 'null'] }
    updatedBy: { type: [string, 'null'] }
    reason: { type: [string, 'null'] }
    note: { type: [string, 'null'] }
    createdAt: { type: [string, 'null'], format: date-time }
    updatedAt: { type: [string, 'null'], format: date-time }

AuditPolicyMutateRequest:
  type: object
  required: [values, reason]
  properties:
    values:
      type: array
      minItems: 1
      items: { type: string, maxLength: 2048 }
      description: >-
        Exclusion globs or manually-declared URLs to add or remove, one call may carry many.
        The maximum array length is resource-dependent and enforced server-side (not
        expressible as a single `maxItems` here, since this schema is shared by both
        resources): up to 200 entries per request against the `exclusions`/`exclusions/delete`
        endpoints, and up to 2000 against the `inclusions`/`inclusions/delete` endpoints,
        matching the `exclusionGlobs`/`manualUrls` caps on the `AuditPolicy` resource itself.
        A request exceeding the applicable cap returns `400`.
    reason: { type: string, minLength: 1, maxLength: 2000 }
    note: { type: [string, 'null'], maxLength: 2000 }

AuditPolicyConflict:
  type: object
  properties:
    message: { type: string }
    currentVersion: { type: integer }

AuditPolicyRevision:
  type: object
  properties:
    version: { type: integer }
    budget: { type: integer }
    strategyName: { type: string, enum: [tiered] }
    exclusionGlobs: { type: array, items: { type: string } }
    manualUrls: { type: array, items: { type: string } }
    scopeConfig: { type: object }
    lifecycleOverrides: { type: object }
    updatedBy: { type: [string, 'null'] }
    reason: { type: [string, 'null'] }
    note: { type: [string, 'null'] }
    effectiveAt: { type: [string, 'null'], format: date-time }
    supersededAt: { type: [string, 'null'], format: date-time }

AuditPolicyRevisionList:
  type: object
  properties:
    items: { type: array, items: { $ref: '#/AuditPolicyRevision' } }
    cursor: { type: string }
