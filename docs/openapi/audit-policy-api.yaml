            $ref: '#/AuditPolicyMutateRequest'
    responses:
      '200':
        description: Updated audit policy
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicy'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '409':
        description: Version conflict after exhausting internal retries
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicyConflict'
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]

audit-policy-inclusions-delete:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    tags:
      - site
      - audit policy
    summary: >-
      Remove one or more manually-declared URLs (set-difference; absent values are a no-op). POST,
      not DELETE with a body (ADR-001).
    operationId: removeAuditPolicyInclusions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/AuditPolicyMutateRequest'
    responses:
      '200':
        description: Updated audit policy
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicy'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '409':
        description: Version conflict after exhausting internal retries
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicyConflict'
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]

audit-policy-revisions:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - name: limit
      in: query
      required: false
      description: Maximum number of revisions to return. Default 50, clamped to a maximum of 200.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    - name: cursor
      in: query
      required: false
      description: >-
        Opaque pagination cursor from a previous response's `cursor` field. Omit to fetch the
        first page. Cursors encode a revision version number and are not valid indefinitely across
        a very long revision history.
      schema:
        type: string
  get:
    tags:
      - site
      - audit policy
    summary: List audit policy revisions, newest-first, cursor-paginated
    operationId: listAuditPolicyRevisions
    responses:
      '200':
        description: Revision history
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicyRevisionList'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]

