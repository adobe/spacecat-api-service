# Audit Policy CRUD + scope reconciliation stubs.
# `audit-policy` / `audit-policy-revisions` are fully implemented (SITES-47301
# write-seam + SITES-47306 contract). The `audit-scope-*` paths are 501 stubs
# pending B4 (SITES-46351, page list) and B7 (SITES-47089, reconciliation
# counts + section aggregation).

audit-policy:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    tags:
      - site
      - audit policy
    summary: Get the current audit policy for a site (synthetic version 0 default when unset)
    operationId: getAuditPolicy
    responses:
      '200':
        description: Current audit policy
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicy'
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]
audit-policy-exclusions:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    tags:
      - site
      - audit policy
    summary: Add one or more exclusion globs (set-union; already-present values are a no-op)
    operationId: addAuditPolicyExclusions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/AuditPolicyMutateRequest'
    responses:
      '200':
        description: Updated audit policy
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicy'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '409':
        description: Version conflict after exhausting internal retries
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicyConflict'
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]

audit-policy-exclusions-delete:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    tags:
      - site
      - audit policy
    summary: >-
      Remove one or more exclusion globs (set-difference; absent values are a no-op). POST, not
      DELETE with a body — this repo's body-parsing middleware does not parse DELETE bodies
      (ADR-001).
    operationId: removeAuditPolicyExclusions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/AuditPolicyMutateRequest'
    responses:
      '200':
        description: Updated audit policy
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicy'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '404': { $ref: './responses.yaml#/404-site-not-found-with-id' }
      '409':
        description: Version conflict after exhausting internal retries
        content:
          application/json:
            schema:
              $ref: '#/AuditPolicyConflict'
      '500': { $ref: './responses.yaml#/500' }
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]

audit-policy-inclusions:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    tags:
      - site
      - audit policy
    summary: Add one or more manually-declared URLs (set-union; already-present values are a no-op)
    operationId: addAuditPolicyInclusions
    requestBody:
      required: true
      content:
        application/json:
