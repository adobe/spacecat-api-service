v2-semrush-workspace-projects:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID, config id, or brand name)
      schema:
        type: string
    - name: workspaceId
      in: path
      required: true
      schema: { type: string, format: uuid }
  get:
    tags: [semrush]
    summary: List published AIO projects in a Semrush workspace
    description: |
      Pass-through to `GET /v2/workspaces/{ws}/projects?type=AIO&publish_status=live,live_with_unpublished_updates&limit=100`.
    operationId: listSemrushWorkspaceProjects
    security:
      - ims_key: []
