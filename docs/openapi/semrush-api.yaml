      '200':
        description: Workspace projects retrieved.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SemrushWorkspaceProjectListResponse' }
      '400': { $ref: './responses.yaml#/400' }
      '404':
        description: Workspace not accessible.
      '502':
        description: Semrush upstream returned a non-2xx response.
        content:
          application/json:
            schema: { $ref: './schemas.yaml#/SemrushUpstreamError' }
      '500': { $ref: './responses.yaml#/500' }
