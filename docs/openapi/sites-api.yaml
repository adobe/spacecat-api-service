sites-resolve:
  get:
    tags:
      - site
    summary: Resolve site and organization data
    description: |
      This endpoint resolves site and organization data based on flexible query parameters.
      It supports resolution by organization ID, IMS organization ID, or specific site ID.
      The endpoint validates entitlements and enrollments for the specified product code.
      
      **Resolution Logic:**
      1. If `siteId` is provided, validates the site against the organization
      2. Otherwise, resolves by `organizationId` or `imsOrg`
      3. Returns the first enrolled site with matching entitlement
      
    operationId: resolveSite
    parameters:
      - name: organizationId
        in: query
        required: false
        description: UUID of the organization (mutually exclusive with imsOrg)
        schema:
          $ref: './schemas.yaml#/Id'
      - name: imsOrg
        in: query
        required: false
        description: IMS Organization ID (mutually exclusive with organizationId)
        schema:
          $ref: './schemas.yaml#/ImsOrganizationId'
      - name: siteId
        in: query
        required: false
        description: UUID of a specific site to validate against the organization
        schema:
          $ref: './schemas.yaml#/Id'
      - name: callerImsOrg
        in: query
        required: false
        description: |
          IMS Organization ID of the *caller* (the org their AEC shell is currently in),
          independent of which org's data is being requested via organizationId/imsOrg.
          When provided, it is translated to a Spacecat UUID and used to determine if
          the caller is an internal/demo org listed in `ASO_PLG_EXCLUDED_ORGS`. For
          internal callers, PLG-wizard-triggering resolveStatuses
          (`no_entitlement_for_product`, `aso_pre_onboard`) are remapped to
          `site_not_enrolled` so the UI shows "No site onboarded" instead of the PLG
          onboarding wizard.
        schema:
          $ref: './schemas.yaml#/ImsOrganizationId'
    responses:
      '200':
        description: Successfully resolved site and organization data
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    organization:
                      $ref: './schemas.yaml#/Organization'
                    site:
                      $ref: './schemas.yaml#/Site'
                    isSummitPlgEnabled:
                      type: boolean
                      description: Whether the summit-plg audit is enabled for the resolved site
              example:
                data:
                  organization:
                    id: '9033554c-de8a-44ac-a356-09b51af8cc28'
                    name: 'Example Organization'
                    imsOrgId: '1234567890ABCDEF12345678@AdobeOrg'
                    config: {}
                  site:
                    id: '0b4dcf79-fe5f-410b-b11f-641f0bf56da3'
                    baseURL: 'https://example.com'
                    organizationId: '9033554c-de8a-44ac-a356-09b51af8cc28'
                    deliveryType: 'aem_edge'
                    isLive: true
                  isSummitPlgEnabled: true
      '400':
        description: Bad request - missing required parameters or invalid input
        headers:
          X-Error:
            $ref: './headers.yaml#/xError'
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
            examples:
              missing-product-code:
                summary: Missing x-product header
                value:
                  message: 'Product code required in x-product header'
              missing-org-params:
                summary: Missing organization parameters
                value:
                  message: 'Either organizationId or imsOrg must be provided'
              resolution-failed:
                summary: Failed to resolve site
                value:
                  message: 'Failed to resolve site'
      '404':
        description: |
          Not found - no site could be resolved.

          When the failure is reached via the `siteId` resolution path, the body
          carries a structured `resolveStatus` discriminator so clients can
          distinguish "not enrolled" from "site doesn't exist" without
          re-querying entitlements:

          - `no_entitlement_for_product` — org has no entitlement for the
            resolved product.
          - `aso_pre_onboard` — entitlement tier is not in
            `CUSTOMER_VISIBLE_TIERS` (e.g. `PRE_ONBOARD`).
          - `site_not_enrolled` — entitlement is visible but no `SiteEnrollment`
            links the site.

          Generic 404s (e.g. site / org not found) omit `resolveStatus` and
          `details`.
        headers:
          X-Error:
            $ref: './headers.yaml#/xError'
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                resolveStatus:
                  type: string
                  enum:
                    - no_entitlement_for_product
                    - aso_pre_onboard
                    - site_not_enrolled
                  description: |
                    Structured resolution status. Present only on the
                    `siteId`-resolution path; absent on generic 404s.
                details:
                  type: object
                  description: |
                    Context for the resolution failure. Always
                    `{ productCode, siteId, organizationId }` when
                    `resolveStatus` is set (these branches are reached only
                    via the `siteId` resolution path).
                  properties:
                    productCode:
                      type: string
                      example: 'ASO'
                    siteId:
                      $ref: './schemas.yaml#/Id'
                    organizationId:
                      $ref: './schemas.yaml#/Id'
            examples:
              no-entitlement-for-product:
                summary: Org has no entitlement for the resolved product
                value:
                  message: 'No site found for the provided parameters'
                  resolveStatus: 'no_entitlement_for_product'
                  details:
                    productCode: 'ASO'
                    siteId: '0b4dcf79-fe5f-410b-b11f-641f0bf56da3'
                    organizationId: '9033554c-de8a-44ac-a356-09b51af8cc28'
              aso-pre-onboard:
                summary: Entitlement tier is not in CUSTOMER_VISIBLE_TIERS
                value:
                  message: 'No site found for the provided parameters'
                  resolveStatus: 'aso_pre_onboard'
                  details:
                    productCode: 'ASO'
                    siteId: '0b4dcf79-fe5f-410b-b11f-641f0bf56da3'
                    organizationId: '9033554c-de8a-44ac-a356-09b51af8cc28'
              site-not-enrolled:
                summary: Visible entitlement but site has no enrollment
                value:
                  message: 'No site found for the provided parameters'
                  resolveStatus: 'site_not_enrolled'
                  details:
                    productCode: 'ASO'
                    siteId: '0b4dcf79-fe5f-410b-b11f-641f0bf56da3'
                    organizationId: '9033554c-de8a-44ac-a356-09b51af8cc28'
              generic-not-found:
                summary: Generic 404 (no resolveStatus discriminator)
                value:
                  message: 'No site found for the provided parameters'
      '500':
        description: Internal server error
        headers:
          X-Error:
            $ref: './headers.yaml#/xError'
    security:
      - ims_key: [ ]
      - scoped_api_key: [ ]
