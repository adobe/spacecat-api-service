# ── Brand-scoped GSC prompts state (Aurora) ──
# Per-brand state for GSC-sourced prompt suggestions. Today the UI writes rows
# with status='ignored' (suppress this suggestion) or status='added' (user
# tracked the prompt; a parallel row also exists in `prompts` with source='gsc').
# Future states (rejected, new, ...) will be added when the GSC suggestion
# pipeline moves into PG as part of the HLX→PG migration project.

v2-gsc-prompts-by-brand:
  parameters:
    - name: spaceCatId
      in: path
      required: true
      description: SpaceCat Organization ID (UUID)
      schema:
        type: string
        format: uuid
    - name: brandId
      in: path
      required: true
      description: Brand ID (UUID, config id, or brand name)
      schema:
        type: string
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [ignored, added]
      description: |
        Filter by status. Omit to return all states.
    - name: source
      in: query
      required: false
      schema:
        type: string
      description: |
        Filter by source (e.g. `gsc`). Source values are normalized lowercase before comparison.
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5000
        default: 1000
      description: Page size
    - name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (1-based)
  get:
    tags:
      - customer-config
    summary: List gsc_prompts rows for a brand
    description: |
      Returns a paginated list of gsc_prompts rows the user has acted on
      (status='ignored' or 'added'). The UI uses this to know which GSC
      suggestions to suppress and which are already tracked. Default page
      size is 1000 since lists are small per brand.
    operationId: listGscPromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    responses:
      '200':
        description: gsc_prompts rows retrieved successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2GscPromptListResponse'
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable (DATA_SERVICE_PROVIDER=postgres required)
      '500':
        $ref: './responses.yaml#/500'
  post:
    tags:
      - customer-config
    summary: Upsert gsc_prompts rows (bulk)
    description: |
      Records up to 500 (text, region, source, status) tuples. Idempotent on
      `(brand_id, lower(text), region, source)`: if a row already exists, its
      status is updated in place; otherwise a new row is inserted. Same status
      as the existing row → counted as `skipped` (no-op). Region values are
      normalized to a 2-char lowercase code before insert.
    operationId: upsertGscPromptsByBrand
    security:
      - ims_key: [ ]
      - api_key: [ ]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/V2GscPromptUpsertRequest'
    responses:
      '201':
        description: gsc_prompts rows recorded
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/V2GscPromptUpsertResponse'
      '400':
        $ref: './responses.yaml#/400'
      '404':
        description: Organization or brand not found
      '503':
        description: PostgREST unavailable
      '500':
        $ref: './responses.yaml#/500'
