site-traffic-email-campaign:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - $ref: './parameters.yaml#/weekNumber'
    - $ref: './parameters.yaml#/month'
    - $ref: './parameters.yaml#/year'
  get:
    tags:
      - site
      - email
    summary: Get email traffic data grouped by campaign
    description: Returns email traffic data for a site, grouped by utm_campaign for a given week or month and year.
    operationId: getEmailTrafficByCampaign
    responses:
      '302':
        description: Redirect to signed S3 URL containing the result data.
        headers:
          Location:
            description: The signed S3 URL where the result data can be downloaded
            schema:
              type: string
      '400':
        $ref: './responses.yaml#/400'
      '404':
        $ref: './responses.yaml#/404-site-not-found-with-id'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: []

