site-llmo-edge-optimize-config:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    operationId: createOrUpdateSiteLlmoEdgeConfig
    summary: |
      Create or update edge optimization configuration for an LLMO site
    description: |
      Creates or updates edge optimization configuration for the specified LLMO-enabled site.

      **Behavior:**
      - If metaconfig doesn't exist or has no API keys: Generates a unique API key and creates metaconfig in S3
      - If metaconfig exists with API keys: Updates the metaconfig in S3
      - Updates the site's edgeOptimizeConfig.enabled flag in the database

      The API key is generated using: SHA256(UUID + domain) encoded as base64url.

      **Note:** This endpoint requires LLMO access for the site.
    tags:
      - llmo
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      '200':
        description: Edge config created/updated successfully. Returns the metaconfig object properties at root level.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: The metaconfig object stored in S3
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '429':
        $ref: './responses.yaml#/429'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: [ ]

  get:
    operationId: getSiteLlmoEdgeConfig
    summary: |
      Retrieve edge optimization configuration for an LLMO site
    description: |
      Fetches the existing edge optimization configuration for the specified LLMO-enabled site.
      Returns the metaconfig from S3.

      Returns an empty object if no edge config has been created for this site yet.

      **Note:** This endpoint requires LLMO access for the site.
    tags:
      - llmo
    responses:
      '200':
        description: Returns the metaconfig object
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: The metaconfig object stored in S3
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '429':
        $ref: './responses.yaml#/429'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        $ref: './responses.yaml#/503'
    security:
      - ims_key: [ ]

site-llmo-edge-optimize-config-stage:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  post:
    operationId: createOrUpdateStageEdgeConfig
    summary: Add staging domains for edge optimize (stage environment support)
    description: |
      Adds one or more staging domains for the specified LLMO prod site. For each domain:

      - Validates that the apex of the staging domain matches the apex of the prod site base URL.
      - Creates or finds a stage site in Spacecat in the same organization.
      - Creates edge optimize metaconfig for the stage site with prerender enabled for the whole domain.
      - Persists the staging domain to site ID mapping in the prod site's edgeOptimizeConfig.

      Returns the complete metaconfig for each stage site in an array (stageConfigs). Each item includes domain, siteId, and all metaconfig properties (apiKeys, enabled, prerender, etc.).

      The staging domains list can be retrieved via GET /sites/{siteId} under config.edgeOptimizeConfig.stagingDomains.

      **Note:** This endpoint requires LLMO administrator access for the site.
    tags:
      - llmo
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/StageDomainsRequest'
    responses:
      '200':
        description: Staging domains added successfully. Returns an array of stage configs; each element is the staging domain plus full metaconfig (siteId, apiKeys, enabled, enhancements, patches, prerender) for that stage site.
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/StageConfigsResponse'
      '400':
        description: Invalid request (e.g. empty stagingDomains, apex mismatch)
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
