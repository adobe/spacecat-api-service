llmo-probe-edge-optimize:
  get:
    tags:
      - llmo
      - llmo-probes
    summary: Edge Optimize connectivity probe — detect WAF/Bot Manager blocking
    description: |
      Checks whether a WAF or Bot Manager is silently blocking the
      `AdobeEdgeOptimize/1.0` user-agent at the customer's origin.

      This is the first entry in the **`/llmo/probes/`** namespace.  Each LLMO
      feature that depends on origin reachability can expose its own probe
      endpoint here.

      **How it works**:
      The request is proxied through the Optimize at Edge worker
      (`live.edgeoptimize.net`), which originates the fetch using the
      production `AdobeEdgeOptimize/1.0` user-agent from the same edge IPs
      as real optimizer traffic. This is critical because WAFs that combine
      UA-matching with IP-reputation (e.g. Akamai BOTMAN) only trigger on
      traffic from the optimizer's actual edge IPs.

      **Detection logic**:
      | Outcome | Condition | Result |
      |---------|-----------|--------|
      | Hard block | HTTP 401, 403, 406, 429, or 503 | `reachable: false, blocked: true` |
      | CF challenge | `cf-mitigated: challenge` header (any status) | `reachable: false, blocked: true` |
      | Soft block | 2xx HTML body containing WAF/bot-challenge keywords | `reachable: false, blocked: true` |
      | Clean pass | 2xx with real content | `reachable: true, blocked: false` |
      | Network/timeout | Fetch fails or times out | `reachable: false, blocked: null` |
    operationId: probeEdgeOptimizeConnectivity
    parameters:
      - $ref: './parameters.yaml#/siteId'
    responses:
      '200':
        description: >
          Probe result (always 200 — inspect `reachable` and `blocked` fields
          for the actual connectivity status).
        content:
          application/json:
            schema:
              type: object
              required:
                - probedUrl
                - reachable
              properties:
                reachable:
                  type: boolean
                  description: Whether the origin returned real content (not a WAF block).
                blocked:
                  type:
                    - boolean
                    - 'null'
                  description: >
                    `true` — WAF/Bot Manager is blocking the UA.
                    `false` — not blocked.
                    `null` — could not determine (network/timeout error).
                statusCode:
                  type: integer
                  description: HTTP status code observed from the origin (absent on network errors).
                  example: 403
                probedUrl:
                  type: string
                  description: The URL that was probed.
                  example: 'https://www.acme.com/'
            examples:
              hardBlock:
                summary: WAF hard block (403)
                value:
                  reachable: false
                  blocked: true
                  statusCode: 403
                  probedUrl: 'https://www.acme.com/'
              softBlock:
                summary: Soft block — bot-challenge page (200)
                value:
                  reachable: false
                  blocked: true
                  statusCode: 200
                  probedUrl: 'https://www.acme.com/'
              cleanPass:
                summary: No WAF blocking
                value:
                  reachable: true
                  blocked: false
                  statusCode: 200
                  probedUrl: 'https://www.acme.com/'
              networkTimeout:
                summary: Origin unreachable (network/timeout)
                value:
                  reachable: false
                  blocked: null
                  probedUrl: 'https://www.acme.com/'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []

llmo-agentic-traffic-url-brand-presence:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    tags:
      - llmo
    summary: Brand presence citation detail for a URL
    description: |
      Returns brand presence citation data for a specific URL from the Postgres-backed
      mysticat data service (`rpc_brand_presence_url_detail`). Used by the Agentic
      Traffic PG dashboard URL details dialog.

      Finds all brand presence LLM executions where the given URL was cited as a source,
      then aggregates citation stats, a weekly trend, and the top 50 prompts that cited it.

      URL matching tries four variants (with/without `https://`, with/without trailing slash)
      so the caller can pass the URL exactly as it appears in the agentic traffic table.

      Query parameters:
      - `url` (**required**): full URL to look up, e.g. `https://www.adobe.com/express/page`
      - `startDate`: date range start (`YYYY-MM-DD`); defaults to 28 days ago
      - `endDate`: date range end (`YYYY-MM-DD`); defaults to today
      - `platform`: UI platform code (e.g. `openai`, `perplexity`); omit for all models
    operationId: getAgenticTrafficUrlBrandPresence
    parameters:
      - name: url
        in: query
        required: true
        description: Full URL to look up brand presence citations for
        schema:
          type: string
          example: 'https://www.adobe.com/express/create/poster'
      - name: startDate
        in: query
        required: false
        schema:
          type: string
          format: date
          example: '2026-01-01'
      - name: endDate
        in: query
        required: false
        schema:
          type: string
          format: date
          example: '2026-03-31'
      - name: platform
        in: query
        required: false
        description: UI platform code mapped to the DB model value
        schema:
          type: string
          example: 'openai'
    responses:
      '200':
        description: Brand presence citation detail for the URL
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AgenticTrafficUrlBrandPresence'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]

