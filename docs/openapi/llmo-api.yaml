llmo-agentic-traffic-global:
  get:
    tags:
      - llmo
    summary: List global weekly agentic traffic totals
    description: |
      Returns weekly aggregate global agentic traffic rows from mysticat `agentic_traffic_global`,
      ordered by newest `(year, week)` first.

      Query parameters:
      - `year`: optional 4-digit year filter
      - `week`: optional ISO week filter (`1-53`)
      - `limit`: optional max rows to return (`1-520`, defaults to `52`)

      Human access requires either admin access or membership in an organization with LLMO access.
      S2S consumers may call this endpoint when granted the mapped route capability.
    operationId: getLlmoAgenticTrafficGlobal
    parameters:
      - name: year
        in: query
        required: false
        schema:
          type: integer
          minimum: 2000
          maximum: 9999
      - name: week
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 53
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 520
    responses:
      '200':
        description: Weekly global agentic traffic rows
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AgenticTrafficGlobalWeekList'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]
  post:
    tags:
      - llmo
    summary: Create or update a weekly global agentic traffic row
    description: |
      Idempotently upserts a weekly aggregate row in mysticat `agentic_traffic_global`
      using the unique `(year, week)` key.

      If the week already exists, `hits` and `updatedBy` are updated in place.
      Human access is admin-only. S2S consumers may call this endpoint when granted the mapped route capability.
    operationId: postLlmoAgenticTrafficGlobal
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/AgenticTrafficGlobalWeekUpsert'
    responses:
      '200':
        description: Upserted weekly global agentic traffic row
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AgenticTrafficGlobalWeek'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: [ ]
      - ims_key: [ ]
      - scoped_api_key: [ ]

llmo-config:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - $ref: './parameters.yaml#/llmoConfigVersion'
  get:
    tags:
      - llmo
    summary: Get LLMO configuration
    description: |
      Retrieves the LLMO (Large Language Model Optimizer) configuration for a specific site.
      This endpoint retrieves the configuration directly from S3 storage. The configuration
      includes entities (categories, topics, aiTopics), brand aliases, and competitor information.
      Categories may include optional URLs for content matching.

      If a version parameter is provided, the specific version of the configuration will be
      retrieved. If the version does not exist, a 404 error will be returned. If no version
      is provided, the latest version will be returned, or a default configuration if none
      exists.
    operationId: getLlmoConfig
    responses:
      '200':
        description: LLMO configuration retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: './schemas.yaml#/LlmoConfig'
                version:
                  oneOf:
                    - type: string
                      example: "abc123def456"
                    - type: "null"
                  description: The S3 object version ID of the configuration, or null if default configuration is returned
              required:
                - config
                - version
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '404':
        $ref: './responses.yaml#/404-configuration-not-found-with-version'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]
  post:
    tags:
      - llmo
    summary: Update LLMO configuration
    description: |
      Updates the LLMO (Large Language Model Optimizer) configuration for a specific site.
      This operation completely overwrites the existing configuration with the provided payload.
      The payload is validated against the LLMO configuration schema before being stored in S3.
      The configuration must include entities, brands, and competitors sections.

      Categories can optionally include URLs that can be either exact URLs or URL prefixes
      (ending with /*) to match against specific content areas.
    operationId: postLlmoConfig
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/LlmoConfig'
    responses:
      '200':
        description: LLMO configuration updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: string
                  description: The S3 object version ID of the updated configuration
                  example: "abc123def456"
              required:
                - version
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]

llmo-onboard:
  post:
    tags:
      - llmo
    summary: Onboard new customer to LLMO
    description: |
      Onboards a net new customer to LLMO (Large Language Model Optimizer).
      This endpoint handles the complete onboarding process including organization validation,
      site creation/validation, LLMO configuration setup, and initial analysis trigger.
      The IMS Organization ID is automatically extracted from the user's JWT token (sub property).
    operationId: onboardCustomer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              domain:
                type: string
                format: hostname
                description: The domain name to onboard (without protocol)
                example: "example.com"
              brandName:
                type: string
                description: The brand name for the site
                example: "Example Brand"
              temp-onboarding:
                type: boolean
                description: |
                  When true, skips updating helix-query.yaml in the project-elmo-ui-data GitHub repo
                  (temporary onboarding; default is false).
            required:
              - domain
              - brandName
    responses:
      '200':
        description: LLMO onboarding initiated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Success message
                  example: "LLMO onboarding initiated successfully"
                domain:
                  type: string
                  format: hostname
                  description: The domain name
                  example: "example.com"
                brandName:
                  type: string
                  description: The brand name
                  example: "Example Brand"
                imsOrgId:
                  type: string
                  description: The IMS Organization ID
                  example: "1234567890ABCDEF@AdobeOrg"
                organizationId:
                  type: string
                  format: uuid
                  description: The organization ID (created or existing)
                  example: "123e4567-e89b-12d3-a456-426614174000"
                siteId:
                  type: string
                  format: uuid
                  description: The created or existing site ID
                  example: "987fcdeb-51a2-43d1-9f12-345678901234"
                detectedCdn:
                  type:
                    - string
                    - 'null'
                  enum:
                    - aem-cs-fastly
                    - commerce-fastly
                    - byocdn-fastly
                    - byocdn-akamai
                    - byocdn-cloudfront
                    - byocdn-cloudflare
                    - byocdn-imperva
                    - byocdn-other
                    - ams-cloudfront
                    - ams-frontdoor
                  description: |
                    CDN provider detected during onboarding. The enum is the
                    canonical `CDN_TYPES` vocabulary shared with the radio
                    selector UI (see
                    `src/controllers/llmo/llmo-utils.js#CDN_TYPES`), so the
                    value can drive the UI auto-select directly.

                    Emitted by the detector today (7 of the 10 tokens):
                      - `aem-cs-fastly` / `commerce-fastly` — Adobe-managed
                        CDNs identified by the DNS fast-path.
                      - `byocdn-fastly` / `byocdn-akamai` /
                        `byocdn-cloudflare` / `byocdn-imperva` — direct
                        BYOCDN matches from the multi-signal probe (HTTP
                        headers, CNAME chain, ASN, PTR).
                      - `byocdn-other` — catch-all. Emitted when Phase 1 +
                        Phase 2 both run cleanly and no specific signature
                        matches, OR when the probe identifies a third-party
                        CDN (CloudFront, Azure Front Door / Azure CDN,
                        Vercel, Netlify, Bunny, Sucuri, Alibaba, etc.) that
                        LLMO does not model as a first-class BYOCDN.
                        CloudFront and Azure Front Door land here today
                        because the detector cannot disambiguate AMS vs BYO
                        tenancy from network signals alone.

                    Reserved for future detector revisions (not emitted
                    today):
                      - `byocdn-cloudfront`, `ams-cloudfront`,
                        `ams-frontdoor` — will replace the `byocdn-other`
                        collapse above once AMS-aware signatures ship;
                        listed here so consumers don't need a schema bump
                        at that point.

                    `null` — at least one probe was inconclusive (DNS or
                    HTTP failure), so the UI auto-select stays neutral.
                  example: "aem-cs-fastly"
                status:
                  type: string
                  enum: ["initiated", "in_progress", "completed", "failed"]
                  description: The onboarding status
                  example: "initiated"
                createdAt:
                  type: string
                  format: date-time
                  description: The timestamp when onboarding was initiated
                  example: "2025-01-15T10:30:00Z"
              required:
                - message
                - domain
                - brandName
                - imsOrgId
                - status
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '500':
        $ref: './responses.yaml#/500'
    security: []

