              $ref: './schemas.yaml#/AgenticTrafficByUserAgent'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []

llmo-agentic-traffic-by-url:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    tags:
      - llmo
    summary: Per-URL agentic traffic performance analysis (paginated)
    description: |
      Queries `rpc_agentic_traffic_by_url`. Powers the URL Performance table with
      infinite-scroll pagination. Returns a page of `pageSize` rows (default 50, max 500)
      plus `totalCount` for pagination context.
      Supports server-side substring search via `urlPathSearch`.
    operationId: getAgenticTrafficByUrl
    parameters:
      - { name: startDate, in: query, schema: { type: string, format: date } }
      - { name: endDate, in: query, schema: { type: string, format: date } }
      - { name: platform, in: query, schema: { type: string } }
      - { name: categoryName, in: query, schema: { type: string } }
      - { name: agentType, in: query, schema: { type: string } }
      - { name: userAgent, in: query, schema: { type: string } }
      - { name: contentType, in: query, schema: { type: string } }
      - name: pageSize
        in: query
        description: Number of rows per page (default 50, max 500)
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      - name: pageOffset
        in: query
        description: Zero-based row offset for pagination
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: urlPathSearch
        in: query
        description: Substring filter applied to `url_path` server-side
        schema:
          type: string
          example: '/express/create'
      - name: sortBy
        in: query
        schema:
          type: string
          enum: [host, url_path, unique_agents, success_rate, avg_ttfb_ms, category_name, total_hits]
          default: total_hits
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      '200':
        description: Paginated per-URL performance analysis
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AgenticTrafficByUrl'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []

llmo-agentic-traffic-filter-dimensions:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    tags:
      - llmo
    summary: Distinct filter dimension values for agentic traffic
    description: |
      Returns cascading distinct filter values for the agentic traffic dashboard dropdowns.
