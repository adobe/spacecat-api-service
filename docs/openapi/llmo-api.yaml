llmo-rationale:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - name: topic
      in: query
      required: true
      description: The topic to filter by (case-insensitive partial match)
      schema:
        type: string
        example: 'Convert PDF_Informational'
    - name: category
      in: query
      required: false
      description: Optional category to filter topics by (case-insensitive partial match)
      schema:
        type: string
        example: 'Acrobat'
    - name: region
      in: query
      required: false
      description: Optional region to filter topics by (case-insensitive partial match)
      schema:
        type: string
        example: 'US'
    - name: origin
      in: query
      required: false
      description: Optional origin to filter topics by (case-insensitive partial match)
      schema:
        type: string
        example: 'HUMAN'
    - name: popularity
      in: query
      required: false
      description: Optional popularity level to filter topics by (case-insensitive partial match)
      schema:
        type: string
        example: 'High'
  get:
    tags:
      - llmo
    summary: Get LLMO rationale data
    description: |
      Retrieves filtered LLMO rationale data for a specific site. This endpoint fetches topics
      popularity reasoning data from the cached S3 file and applies filtering based on the provided query parameters.

      The endpoint requires mandatory 'topic' parameter for filtering, with optional
      'category', 'region', 'origin', and 'popularity' parameters for additional filtering. All text matching is case-insensitive
      and uses partial matching (contains).

      The data is sourced from the topics popularity reasoning cache file stored in S3 at:
      `llm_cache/{siteId}/topics_popularity_reasoning_cache.json`
    operationId: getLlmoRationale
    responses:
      '200':
        description: LLMO rationale data retrieved and filtered successfully
        content:
          application/json:
            schema:
              type: array
              description: Array of filtered topic objects matching the query criteria
              items:
                type: object
                properties:
                  topic:
                    type: string
                    description: The topic name
                    example: 'Convert PDF_Informational'
                  category:
                    type: string
                    description: The category of the topic
                    example: 'Acrobat'
                  region:
                    type: string
                    description: The region associated with the topic
                    example: 'BR'
                  origin:
                    type: string
                    description: The origin of the topic
                    example: 'HUMAN'
                  popularity:
                    type: string
                    description: The popularity level of the topic
                    example: 'Low'
                  volume:
                    type: number
                    description: The volume metric for the topic
                    example: -10
                  reasoning:
                    type: string
                    description: The reasoning for the topic's popularity classification
                    example: 'Specific informational query with minimal organic searches.'
                  added_date:
                    type: string
                    format: date-time
                    description: The date when the topic was added
                    example: '2025-12-03T09:21:31.673898'
                additionalProperties: true
      '400':
        description: Bad request - missing required parameters or invalid request
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  examples:
                    missing_topic:
                      value: 'topic parameter is required'
                    s3_not_configured:
                      value: 'S3 storage is not configured for this environment'
                    invalid_json:
                      value: 'Invalid JSON format in rationale file'
                    bucket_not_found:
                      value: 'Storage bucket not found: spacecat-env-mystique-assets'
      '401':
        $ref: './responses.yaml#/401'
      '404':
        description: Rationale file not found for the specified site
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'Rationale file not found for site 123e4567-e89b-12d3-a456-426614174000'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]

llmo-brand-claims:
  parameters:
    - $ref: './parameters.yaml#/siteId'
    - name: model
      in: query
      required: false
      description: AI model name to retrieve brand claims for. If omitted, returns the default model's data.
      schema:
        type: string
        example: 'gpt-4.1'
  get:
    tags:
      - llmo
    summary: Get brand claims presigned URL
    description: |
      Returns a presigned S3 URL for downloading brand claims data for a specific site.
      The data files are `.json.gz` compressed and can be very large (100MB+ uncompressed),
      so this endpoint returns a presigned URL rather than the data directly.

      The optional `model` query parameter selects which AI model's data to retrieve.
      If omitted, the default model's data file is returned.

      S3 key convention:
      - Default model: `brand_claims/llmo/{siteId}/data.json.gz`
      - Specific model: `brand_claims/llmo/{siteId}/{model}.json.gz`
    operationId: getBrandClaims
    responses:
      '200':
        description: Presigned URL for brand claims data generated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                siteId:
                  type: string
                  format: uuid
                  description: The site ID
                  example: '9ae8877a-bbf3-407d-9adb-d6a72ce3c5e3'
                model:
                  type: string
                  description: The AI model name, or 'default' if no model was specified
                  example: 'gpt-4.1'
                presignedUrl:
                  type: string
                  format: uri
                  description: Presigned S3 URL to download the brand claims data file
                expiresAt:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp when the presigned URL expires
                  example: '2025-06-15T12:00:00.000Z'
              required:
                - siteId
                - model
                - presignedUrl
                - expiresAt
      '400':
        description: Bad request - S3 not configured or other error
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'S3 bucket is not configured for this environment'
      '401':
        $ref: './responses.yaml#/401'
      '404':
        description: Brand claims data not found for the specified site
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
                  example: 'Brand claims data not found for site 9ae8877a-bbf3-407d-9adb-d6a72ce3c5e3'
      '500':
        $ref: './responses.yaml#/500'
    security:
      - api_key: [ ]

