      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []

llmo-agentic-traffic-weeks:
  parameters:
