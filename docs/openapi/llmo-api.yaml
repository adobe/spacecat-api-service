# ── URL Inspector endpoints ────────────────────────────────────────────────────
# Org-scoped, site-filtered via query param. Queries mysticat PostgreSQL RPCs.

url-inspector-common-params: &url-inspector-common-params
  - name: spaceCatId
    in: path
    required: true
    description: Organization (SpaceCat) ID
    schema:
      type: string
      format: uuid
  - name: brandId
    in: path
    required: true
    description: |
      Brand UUID to filter by, or the literal string `all` to aggregate across
      all brands for the given organization. The routing layer registers both
      `/brands/{brandId}` (UUID) and the concrete `/brands/all/...` path; both
      resolve to the same operation and this single path parameter
      (LLMO-4525 review — architect finding).
    schema:
      type: string
      oneOf:
        - type: string
          format: uuid
        - type: string
          enum: [all]

url-inspector-common-query-params: &url-inspector-common-query-params
  - name: siteId
    in: query
    required: true
    description: Site ID to scope the query
    schema:
      type: string
      format: uuid
  - name: startDate
    in: query
    required: false
    schema:
      type: string
      format: date
      example: '2026-01-01'
  - name: endDate
    in: query
    required: false
    schema:
      type: string
      format: date
      example: '2026-03-31'
  - name: platform
    in: query
    required: false
    description: |
      LLM platform / model identifier. Omit (or pass one of the `shouldApplyFilter`
      "no filter" sentinels) to return data for ALL models. Accepts either the
      canonical `llmo_execution_model` enum value OR a known alias mapped by
      `MODEL_QUERY_ALIASES` — e.g. `openai` → `chatgpt-paid`.
      LLMO-4525 review note: do NOT pin `enum` here because aliases are
      deliberately accepted. The canonical values (enum mapped by `validateModel`)
      are listed below for reference.
    schema:
      type: string
      x-canonical-values:
        - chatgpt-free
        - chatgpt-paid
        - perplexity
        - google-ai-mode
        - google-ai-overview
        - gemini
        - copilot
      x-known-aliases:
        openai: chatgpt-paid
  - name: categoryId
    in: query
    required: false
    description: Category ID or name to filter by
    schema:
      type: string
  - name: regionCode
    in: query
    required: false
    description: Region code to filter by (e.g. US, DE)
    schema:
      type: string

url-inspector-stats:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: URL Inspector aggregate stats and weekly sparklines
    description: |
      Returns aggregate citation statistics and weekly trend breakdown for the site.
      Site ID is required via query parameter. Platform is optional — when absent,
      no model filter is applied.
    operationId: getUrlInspectorStats
    parameters: *url-inspector-common-query-params
    responses:
      '200':
        description: Aggregate stats and weekly trends
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorStats'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-owned-urls:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Paginated owned URL citations
    description: |
      Returns paginated per-URL citation aggregates with JSONB weekly arrays
      for week-over-week trends. Owned URLs are those belonging to the site.
    operationId: getUrlInspectorOwnedUrls
    parameters:
      - name: siteId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        schema: { type: string }
      - name: categoryId
        in: query
        required: false
        schema: { type: string }
      - name: regionCode
        in: query
        required: false
        schema: { type: string }
      - name: page
        in: query
        required: false
        description: Zero-based page number
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: pageSize
        in: query
        required: false
        description: Items per page (max 1000)
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 1000
    responses:
      '200':
        description: Paginated owned URL citations
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorOwnedUrls'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-trending-urls:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Paginated non-owned (trending) URL citations
    description: |
      Returns paginated non-owned URL citations with per-prompt breakdown.
      The RPC returns flat rows (one per URL+prompt); this endpoint groups
      them by URL and calculates totalCitations per URL.
      Rows with null URLs are filtered out.
    operationId: getUrlInspectorTrendingUrls
    parameters:
      - name: siteId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        schema: { type: string }
      - name: categoryId
        in: query
        required: false
        schema: { type: string }
      - name: regionCode
        in: query
        required: false
        schema: { type: string }
      - name: channel
        in: query
        required: false
        description: Content channel filter (e.g. earned, social)
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 1000
    responses:
      '200':
        description: Paginated trending URL citations grouped by URL
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorTrendingUrls'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-cited-domains:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Paginated domain-level citation aggregations
    description: |
      Returns paginated domain-level citation aggregations with dominant
      content type per domain.
    operationId: getUrlInspectorCitedDomains
    parameters:
      - name: siteId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        schema: { type: string }
      - name: categoryId
        in: query
        required: false
        schema: { type: string }
      - name: regionCode
        in: query
        required: false
        schema: { type: string }
      - name: channel
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 1000
    responses:
      '200':
        description: Paginated cited domain aggregations
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorCitedDomains'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-domain-urls:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Paginated URLs within a cited domain (Phase 2 drilldown)
    description: |
      Returns paginated URLs within a specific domain. Used as a Phase 2 drilldown
      from the cited-domains view. The underlying RPC does not accept brand, category,
      or region filters — domain-level drilldown is already scoped by hostname.
    operationId: getUrlInspectorDomainUrls
    parameters:
      - name: siteId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: hostname
        in: query
        required: true
        description: Domain hostname to drill into
        schema:
          type: string
          example: 'competitor.com'
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        schema: { type: string }
      - name: channel
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 1000
    responses:
      '200':
        description: Paginated URLs within the domain
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorDomainUrls'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-url-prompts:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Prompt breakdown for a specific URL (Phase 3 drilldown)
    description: |
      Returns the prompts that cited a specific URL. Used as a Phase 3 drilldown
      from the domain-urls view. The underlying RPC does not accept brand, category,
      or region filters — URL-level drilldown is scoped by url_id.
    operationId: getUrlInspectorUrlPrompts
    parameters:
      - name: siteId
        in: query
        required: true
        schema: { type: string, format: uuid }
      - name: urlId
        in: query
        required: true
        description: URL identifier from the domain-urls response
        schema:
          type: string
          example: '44444444-4444-4444-4444-444444444444'
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        schema: { type: string }
    responses:
      '200':
        description: Prompt breakdown for the URL
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorUrlPrompts'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

url-inspector-filter-dimensions:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Filter dimensions for the URL Inspector PG dashboard
    description: |
      Returns the distinct categories, regions, and content types present in
      `url_inspector_domain_stats` for the given site and date range. Used to
      populate the top-of-page Category, Region, and Channel filter dropdowns.

      Brand scoping is driven by the `brandId` path segment:
        * `brands/{brandId}` → filter by that specific brand
        * `brands/all`       → aggregate across all brands (p_brand_id = NULL)

      LLMO-4525 review note: this endpoint is intentionally NOT filtered by
      category / region / channel — it defines the option universe that those
      dropdowns choose from.
    operationId: getUrlInspectorFilterDimensions
    parameters:
      - name: siteId
        in: query
        required: true
        description: Site ID to scope the query. Required — RPC is site-scoped.
        schema: { type: string, format: uuid }
      - name: startDate
        in: query
        required: false
        description: |
          ISO date (inclusive) lower bound. Defaults to 28 days before today
          when omitted.
        schema: { type: string, format: date }
      - name: endDate
        in: query
        required: false
        description: |
          ISO date (inclusive) upper bound. Defaults to today when omitted.
        schema: { type: string, format: date }
      - name: platform
        in: query
        required: false
        description: |
          LLM platform / model identifier. Omit to return dimensions across
          all models. Accepts canonical `llmo_execution_model` values OR
          known aliases (e.g. `openai` → `chatgpt-paid`).
        schema:
          type: string
          x-canonical-values:
            - chatgpt-free
            - chatgpt-paid
            - perplexity
            - google-ai-mode
            - google-ai-overview
            - gemini
            - copilot
          x-known-aliases:
            openai: chatgpt-paid
    responses:
      '200':
        description: Filter dimensions for the URL Inspector page
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/UrlInspectorFilterDimensions'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
    security:
      - api_key: []
      - ims_key: []

llmo-agentic-traffic-movers:
  parameters:
    - $ref: './parameters.yaml#/siteId'
  get:
    tags:
      - llmo
    summary: Top and bottom agentic traffic URL movers
    description: |
      Returns URLs with the largest hit changes between the oldest and newest traffic
      dates in the selected range. Queries `rpc_agentic_traffic_movers`.
      Returns up to `limit` rows each for `direction=up` (top movers) and
      `direction=down` (bottom movers). Requires at least 2 distinct dates in the range.
    operationId: getAgenticTrafficMovers
    parameters:
      - { name: startDate, in: query, schema: { type: string, format: date } }
      - { name: endDate, in: query, schema: { type: string, format: date } }
      - { name: platform, in: query, schema: { type: string } }
      - { name: categoryName, in: query, schema: { type: string } }
      - { name: agentType, in: query, schema: { type: string } }
      - { name: userAgent, in: query, schema: { type: string } }
      - { name: contentType, in: query, schema: { type: string } }
      - name: limit
        in: query
        description: Max rows per direction (default 5, max 50)
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 5
    responses:
      '200':
        description: Top and bottom URL movers
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/AgenticTrafficMovers'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []

brand-presence-prompt-execution-status:
  parameters: *url-inspector-common-params
  get:
    tags:
      - llmo
    summary: Aggregated prompt execution status for a batch of topics
    description: |
      Returns one `{ topicId, prompt, regionCode, matchedModels[] }` item per unique
      (topic, prompt, region) combination found in execution data for the given date
      range and topic IDs. A single call replaces the previous N×7 per-model
      topic-prompts fan-out used by the Prompts Management status column.
    operationId: getPromptExecutionStatus
    parameters:
      - name: promptIds
        in: query
        required: true
        description: Comma-separated list of prompt UUIDs (V2Prompt.id) currently visible on the page (at least one required)
        schema:
          type: string
          example: 'aaaaaaaa-0000-7000-8000-000000000001,bbbbbbbb-0000-7000-8000-000000000002'
      - name: startDate
        in: query
        required: false
        schema: { type: string, format: date }
        description: Start of date range (defaults to 28 days ago)
      - name: endDate
        in: query
        required: false
        schema: { type: string, format: date }
        description: End of date range (defaults to today)
      - name: siteId
        in: query
        required: false
        schema: { type: string, format: uuid }
        description: Optional site UUID to narrow results to a single site
    responses:
      '200':
        description: Aggregated execution status items
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/PromptExecutionStatusResponse'
      '400': { $ref: './responses.yaml#/400' }
      '401': { $ref: './responses.yaml#/401' }
      '403': { $ref: './responses.yaml#/403' }
      '500': { $ref: './responses.yaml#/500' }
      '503':
        description: PostgREST / mysticat not configured for this deployment
    security:
      - api_key: []
      - ims_key: []
      - scoped_api_key: []
