preflight-jobs:
  parameters:
    - $ref: './parameters.yaml#/xPromiseToken'
  post:
    tags:
      - preflight
    security:
      - api_key: [ ]
      - ims_key: [ ]
    summary: Submit a new preflight async job
    description: |
      Submits a new preflight async job. The job processes the provided URL(s); use the
      returned `jobId` to poll for status.
      For promise-based authoring types (CS, CS_CW, AMS), include the `x-promise-token`
      header (IMS session-based promise token from `POST /auth/v2/promise`).
    operationId: submitPreflightJob
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              urls:
                type: array
                items:
                  type: string
                  format: uri
                description: Array of URLs to be processed by the job
                minItems: 1
              step:
                type: string
                enum: [identify, suggest]
                description: The audit step to be performed
            required:
              - urls
              - step
    responses:
      '202':
        description: Job accepted
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/CreatePreflightJobResponse'
      '400':
        description: |
          Invalid request — e.g. missing `urls` or `step`, invalid body fields, or (for CS,
          CS_CW, AMS sites) missing `x-promise-token` header.
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '401':
        $ref: './responses.yaml#/401'
      '500':
        $ref: './responses.yaml#/500'
preflight-job-status:
  parameters:
    - $ref: './parameters.yaml#/jobId'
  get:
    tags:
      - preflight
    security:
      - api_key: [ ]
      - ims_key: [ ]
    summary: Get preflight job status and result
    description: |
      This endpoint is used to retrieve the status and results of a preflight async job.
      The jobId must be provided in the path parameter.
      If the job is completed, the result will be included in the response.
      If the job is still in progress, a 200 response will be returned.
    operationId: getPreflightJobStatus
    responses:
      '200':
        description: Job status and (if available) result
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/PreflightJobResponse'
      '400':
        description: Invalid jobId format
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '401':
        $ref: './responses.yaml#/401'
      '404':
        description: Job not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      '500':
        $ref: './responses.yaml#/500'
