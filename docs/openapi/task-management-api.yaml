task-management-create-ticket:
  post:
    tags:
      - task-management
    summary: Create a Jira ticket
    description: |
      Creates one or more Jira tickets for an opportunity or suggestion set.

      **Modes:**
      - `individual` (default): one ticket per suggestion (up to 15). Returns 207 Multi-Status when N > 1.
      - `grouped`: all suggestions collapsed into a single ticket (up to 1500). Returns 201.

      Requires an `Idempotency-Key` header derived server-side from opportunityId + suggestionIds.
    operationId: createTicket
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum: [jira_cloud]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yaml#/TicketCreateRequest'
    responses:
      '201':
        description: Ticket created (single or grouped mode)
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/Ticket'
      '207':
        description: Multi-status — individual batch result per suggestion
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      suggestionId:
                        type: string
                      status:
                        type: integer
                      ticket:
                        $ref: './schemas.yaml#/Ticket'
                      error:
                        type: string
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
      '409':
        description: Duplicate request (idempotency) or connection requires re-authorization
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
    security:
      - api_key: []

