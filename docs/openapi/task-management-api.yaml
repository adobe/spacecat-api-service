task-management-connections:
  get:
    tags:
      - task-management
    summary: List task-management connections for an organization
    description: |
      Returns all Jira connections configured for the given organization.
      Optionally filter by provider using the `?provider=` query parameter.
    operationId: listTaskManagementConnections
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: provider
        in: query
        required: false
        schema:
          type: string
          enum: [jira_cloud]
    responses:
      '200':
        description: List of connections
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: './schemas.yaml#/TaskManagementConnection'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - api_key: []

task-management-connection-by-id:
  get:
    tags:
      - task-management
    summary: Get a task-management connection by ID
    operationId: getTaskManagementConnection
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: connectionId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
    responses:
      '200':
        description: Connection object
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/TaskManagementConnection'
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - api_key: []

task-management-connection-projects:
  get:
    tags:
      - task-management
    summary: List Jira projects for a connection
    description: |
      Returns all Jira projects accessible via the given connection.
      Used by the UI project picker when creating a ticket.
    operationId: listTaskManagementProjects
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: connectionId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
    responses:
      '200':
        description: List of Jira projects
        content:
          application/json:
            schema:
              type: object
              properties:
                projects:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      key:
                        type: string
                      name:
                        type: string
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - api_key: []

task-management-connection-issue-types:
  get:
    tags:
      - task-management
    summary: List Jira issue types for a project
    description: |
      Returns non-subtask issue types for the given Jira project.
      `projectId` is the numeric Jira project ID (returned by the projects endpoint).
    operationId: listTaskManagementIssueTypes
    parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: connectionId
        in: path
        required: true
        schema:
          $ref: './schemas.yaml#/Id'
      - name: projectId
        in: query
        required: true
        schema:
          type: string
          pattern: '^\d+$'
        description: Numeric Jira project ID
    responses:
      '200':
        description: List of issue types
        content:
          application/json:
            schema:
              type: object
              properties:
                issueTypes:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      subtask:
                        type: boolean
      '400':
        $ref: './responses.yaml#/400'
      '401':
        $ref: './responses.yaml#/401'
      '403':
        $ref: './responses.yaml#/403'
      '404':
        $ref: './responses.yaml#/404'
    security:
      - api_key: []

task-management-tickets:
