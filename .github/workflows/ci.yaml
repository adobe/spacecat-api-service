name: CI

permissions:
  id-token: write
  contents: write
  issues: read
  pull-requests: read

on:
  push:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, edited]

jobs:
  ci:
    uses: adobe/mysticat-ci/.github/workflows/service-ci.yaml@v1
    with:
      service-name: api-service
      validate-pr-title: true
      docs-lint: true
      it-dynamo: true
      it-postgres: true
    secrets: inherit
